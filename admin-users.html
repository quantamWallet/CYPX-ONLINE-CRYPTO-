<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CYPX HOLDINGS - User Management</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#000814;
color:white;
}

.header{
padding:18px;
background:linear-gradient(90deg,#001d3d,#003566);
display:flex;
align-items:center;
gap:15px;
}

.header a{
color:white;
text-decoration:none;
}

.container{
padding:15px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-bottom:15px;
font-size:15px;
}

.user-card{
background:#001a33;
padding:15px;
border-radius:15px;
margin-bottom:12px;
border:1px solid #003566;
}

.user-card p{
margin:6px 0;
font-size:14px;
}

.stats-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin:10px 0;
padding:10px;
background:#000d1a;
border-radius:10px;
}

.stat-item{
font-size:13px;
}
.stat-item b{
color:#4da3ff;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
font-weight:bold;
color:white;
cursor:pointer;
}

.suspend{
background:#dc2626;
}

.activate{
background:#16a34a;
}

.vip{
color:#ffd700;
font-weight:700;
}

.earnings{
color:#22c55e;
font-weight:700;
}
.edit-icon{
    float:right;
    color:#4da3ff;
    cursor:pointer;
    font-size:13px;
    transition:.2s;
}

.edit-icon:hover{
    color:#7ec8ff;
    transform:scale(1.15);
  }
</style>

</head>

<body>

<div class="header">

<a href="admin.html">
<i class="fas fa-arrow-left"></i>
</a>

<b>
<i class="fas fa-users"></i>
User Management
</b>

</div>

<div class="container">

<input
id="search"
placeholder="Search email or username..."
onkeyup="searchUsers()">

<div id="users">
Loading users...
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.firebasestorage.app",
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
  measurementId: "G-4RSQXZJX44"
};

if(!firebase.apps.length){
firebase.initializeApp(firebaseConfig);
}

const auth=firebase.auth();
const db=firebase.database();

let allUsers=[];
let adminEmail="";
let adminUID="";

// ADMIN CHECK
auth.onAuthStateChanged(user=>{
if(!user){
window.location.href="auth.html";
return;
}

adminEmail=user.email;
adminUID=user.uid;

db.ref("admins/"+user.uid)
.once("value")
.then(admin=>{
if(!admin.exists()){
alert("Admin only");
window.location.href="auth.html";
return;
}
loadUsers();
});
});

// LOAD USERS
function loadUsers(){
    db.ref("users").on(
        "value",
        snap => {
            allUsers = [];
            snap.forEach(child => {
                let data = child.val() || {};
                data.uid = child.key;
                allUsers.push(data);
            });
            displayUsers(allUsers);
        },
        error => {
            console.error(error);
            document.getElementById("users").innerHTML =
                "Firebase Error: " + error.message;
        }
    );
}

function displayUsers(users){
let html="";

users.forEach(user=>{
let status=user.status || "active";

// Calculate total earnings
let totalEarnings =
    Number(user.totalReferralBonus || 0) +
    Number(user.totalTaskIncome || 0);

html += `
<div class="user-card">

<p>
<b>UID:</b> ${user.uid}
</p>

<p>
<b>Username:</b>
${user.username || "N/A"}

<i class="fas fa-pen edit-icon"
onclick="openEdit('${user.uid}','username','${user.username || ""}')"></i>
</p>

<p>
<b>Email:</b>
${user.email || "N/A"}

<i class="fas fa-pen edit-icon"
onclick="openEdit('${user.uid}','email','${user.email || ""}')"></i>
</p>

<p>
<b>Phone:</b>
${user.phone || "N/A"}

<i class="fas fa-pen edit-icon"
onclick="openEdit('${user.uid}','phone','${user.phone || ""}')"></i>
</p>

<div class="stats-grid">

<div class="stat-item">
<b>Balance:</b>
$${Number(user.balance || 0).toFixed(2)}

<i class="fas fa-pen edit-icon"
onclick="openEdit('${user.uid}','balance','${user.balance || 0}')"></i>
</div>

<div class="stat-item">
<b>Earnings:</b>
$${totalEarnings.toFixed(2)}

<i class="fas fa-pen edit-icon"
onclick="openEdit('${user.uid}','totalTaskIncome','${user.totalTaskIncome || 0}')"></i>
</div>

<div class="stat-item">
<b>Deposits:</b>
$${Number(user.totalDeposit || 0).toFixed(2)}

<i class="fas fa-pen edit-icon"
onclick="openEdit('${user.uid}','totalDeposit','${user.totalDeposit || 0}')"></i>
</div>

<div class="stat-item">
<b>Withdrawals:</b>
$${Number(user.totalWithdrawn || 0).toFixed(2)}

<i class="fas fa-pen edit-icon"
onclick="openEdit('${user.uid}','totalWithdrawn','${user.totalWithdrawn || 0}')"></i>
</div>

</div>

<p>
<b>Referral Bonus:</b>
$${Number(user.totalReferralBonus || 0).toFixed(2)}

<i class="fas fa-pen edit-icon"
onclick="openEdit('${user.uid}','totalReferralBonus','${user.totalReferralBonus || 0}')"></i>
</p>

<p>
<b>Task Income:</b>
$${Number(user.totalTaskIncome || 0).toFixed(2)}

<i class="fas fa-pen edit-icon"
onclick="openEdit('${user.uid}','totalTaskIncome','${user.totalTaskIncome || 0}')"></i>
</p>

<p>
<b>VIP:</b>
<span class="vip">${getVip(user)}</span>

<i class="fas fa-pen edit-icon"
onclick="openEdit('${user.uid}','vipLevel','${user.vipLevel || 0}')"></i>
</p>

<p>
<b>KYC:</b>
${user.kycStatus || "none"}

<i class="fas fa-pen edit-icon"
onclick="openEdit('${user.uid}','kycStatus','${user.kycStatus || "none"}')"></i>
</p>

<p>
<b>Status:</b>
${status}

<i class="fas fa-pen edit-icon"
onclick="openEdit('${user.uid}','status','${status}')"></i>
</p>

${
status=="active"
?
`<button class="suspend" onclick="changeStatus('${user.uid}','suspended')">Suspend</button>`
:
`<button class="activate" onclick="changeStatus('${user.uid}','active')">Activate</button>`
}

</div>
`;

}); // closes users.forEach()

document.getElementById("users").innerHTML = html || "No users found";
    }
function searchUsers(){
let text = document.getElementById("search").value.toLowerCase();
let filtered = allUsers.filter(user=>{
return (
(user.email||"").toLowerCase().includes(text) ||
(user.username||"").toLowerCase().includes(text)
);
});
displayUsers(filtered);
}

function getVip(data){
let max=0;
if(data.vipLevels){
Object.keys(data.vipLevels).forEach(k=>{
if(data.vipLevels[k]){
let lvl=parseInt(k);
if(lvl>max) max=lvl;
}
});
}
return "VIP"+max;
}

function changeStatus(uid,status){

    db.ref("users/" + uid).update({
        status: status,
        statusUpdatedAt: firebase.database.ServerValue.TIMESTAMP,
        statusUpdatedBy: adminEmail
    }).then(() => {

        db.ref("adminLogs").push({
            action: "User " + status,
            user: uid,
            admin: adminEmail,
            adminUID: adminUID,
            time: Date.now()
        });

        showToast(
            status === "active"
            ? "User activated successfully"
            : "User suspended successfully",
            "success"
        );

    });

} // <-- ADD THIS

    db.ref("users/" + uid)
    .update({
        balance: balance
    })
    .then(()=>{

        db.ref("adminLogs").push({
            action: "Balance Updated",
            user: uid,
            newBalance: balance,
            admin: adminEmail,
            adminUID: adminUID,
            time: Date.now()
        });

        showToast("Balance updated successfully.","success");
loadUsers();

    });

          }
    function openEdit(uid, field, currentValue){

    const value = prompt("Enter new " + field, currentValue);

    if(value === null) return;

    db.ref("users/" + uid).update({
        [field]: isNaN(value) ? value : Number(value)
    }).then(()=>{

        db.ref("adminLogs").push({
            action: "Updated " + field,
            user: uid,
            value: value,
            admin: adminEmail,
            adminUID: adminUID,
            time: Date.now()
        });

        showToast(field + " updated","success");
    });

    }
    function showToast(message,type="success"){

    let toast=document.createElement("div");

    toast.innerHTML=message;

    toast.style.cssText=`
    position:fixed;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    background:${type==="success" ? "#16a34a" : "#dc2626"};
    color:#fff;
    padding:14px 22px;
    border-radius:12px;
    z-index:9999;
    font-weight:600;
    box-shadow:0 8px 25px rgba(0,0,0,.35);
    `;

    document.body.appendChild(toast);

    setTimeout(()=>toast.remove(),2500);

    }
</script>

</body>
</html>
