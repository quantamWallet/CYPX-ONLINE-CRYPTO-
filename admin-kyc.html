<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CYPX HOLDINGS - KYC Management</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


<style>

body{

margin:0;
font-family:'Segoe UI',sans-serif;
background:#000814;
color:white;

}


.header{

padding:18px;
background:linear-gradient(90deg,#001d3d,#003566);
display:flex;
justify-content:space-between;
align-items:center;

}


.header a{

color:white;
text-decoration:none;

}


.container{

padding:15px;

}


.kyc-card{

background:#001a33;
padding:15px;
border-radius:15px;
margin-bottom:12px;

}


.kyc-card p{

margin:7px 0;

}


button{

padding:10px 15px;
border:none;
border-radius:10px;
font-weight:bold;
color:white;
margin-right:8px;

}


.approve{

background:#16a34a;

}


.reject{

background:#dc2626;

}


.badge{

padding:5px 10px;
border-radius:20px;
font-size:12px;

}


</style>

</head>


<body>


<div class="header">


<a href="admin.html">

<i class="fas fa-arrow-left"></i>

</a>



<b>

<i class="fas fa-id-card"></i>

KYC Management

</b>


</div>



<div class="container">


<div id="kycList">

Loading KYC requests...

</div>


</div>





<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>




<script>


const firebaseConfig = {

apiKey:"AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",

authDomain:"quantum-rio.firebaseapp.com",

databaseURL:"https://quantum-rio-default-rtdb.firebaseio.com",

projectId:"quantum-rio",

storageBucket:"quantum-rio.firebasestorage.app",

messagingSenderId:"805433999377",

appId:"1:805433999377:web:d0efa8c46ec4a0fa30f1b0"

};



firebase.initializeApp(firebaseConfig);


const auth=firebase.auth();

const db=firebase.database();





// ADMIN CHECK


auth.onAuthStateChanged(user=>{


if(!user){

window.location.href="auth.html";

return;

}



db.ref("admins/"+user.uid)
.once("value")

.then(admin=>{


if(!admin.exists()){


alert("Admin access required");

window.location.href="auth.html";

return;


}



loadKyc();


});


});









function loadKyc(){


db.ref("users")

.on("value",snap=>{


let html="";



snap.forEach(child=>{


let uid=child.key;

let user=child.val();



let status=user.kycStatus || "none";



if(status==="verified"){

return;

}





html += `


<div class="kyc-card">


<p>
<b>User UID:</b><br>
${uid}
</p>



<p>
<b>Email:</b><br>
${user.email || "N/A"}
</p>




<p>
<b>Username:</b><br>
${user.username || "N/A"}
</p>




<p>
<b>KYC Status:</b>

<span class="badge"

style="
background:
${status=="pending"?
"#f59e0b":
"#555"};

">

${status}

</span>


</p>





${status!="none" ? `


<button 
class="approve"

onclick="updateKyc('${uid}','verified')">

Approve

</button>



<button 
class="reject"

onclick="updateKyc('${uid}','rejected')">

Reject

</button>


`:"<p>No KYC submission yet</p>"}



</div>



`;



});



document.getElementById("kycList").innerHTML =
html || "No pending KYC requests";


});


}









function updateKyc(uid,status){



db.ref("users/"+uid)

.update({

kycStatus:status,

kycUpdatedAt:
firebase.database.ServerValue.TIMESTAMP


})

.then(()=>{


alert(
"KYC updated: "+status
);


});



}



</script>


</body>

  </html>
