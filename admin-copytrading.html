<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYPX Admin - Copy Trading Control</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
    * { box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0a0f1a; margin: 0; padding: 20px; color: #fff; }
.container { max-width: 1300px; margin: 0 auto; }
.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px }
  h1 { color: #ffd700; margin:0 }
.btn-logout { padding:8px 16px; background:#ef4444; border:none; border-radius:8px; color:#fff; cursor:pointer; font-weight:700 }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width:900px){.grid{ grid-template-columns: 1fr; } }
.card { background: linear-gradient(145deg,#0a1a2f,#0f2942); padding: 20px; border-radius: 16px; box-shadow: 0 0 20px rgba(0,200,255,0.1); border: 1px solid rgba(0,200,255,0.15); }
.card h2 { color: #00C896; margin-top: 0; font-size: 18px; }
.form-group { margin-bottom: 15px; }
.form-group label { font-size: 12px; color: #94e2cc; display: block; margin-bottom: 5px; }
.form-group input { width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; font-size: 14px; outline:none }
.form-group input:focus { border-color:#00C896 }
.btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; background: linear-gradient(90deg,#00C896,#007A54); color: white; font-size: 15px; transition:0.2s }
.btn:hover { opacity: 0.9; transform:translateY(-1px) }
.btn-red { background: linear-gradient(90deg,#ef4444,#dc2626); }
.btn-profit { background:linear-gradient(90deg,#16a34a,#15803d) }
.btn-loss { background:linear-gradient(90deg,#ef4444,#dc2626) }
.toast { position: fixed; top: 20px; right: 20px; background: #00C896; color: white; padding: 14px 18px; border-radius: 10px; transform: translateX(400px); transition: 0.3s; z-index: 9999; }
.toast.show { transform: translateX(0); }
.toast.error { background:#ef4444 }
.hide { display:none }
.trader-stat { background:rgba(0,0,0,0.2); padding:10px; border-radius:8px; margin-bottom:8px; font-size:13px }
.trader-stat b{color:#00C896}
.copier-list { margin-top:8px; padding-left:10px; border-left:2px solid #00C896; font-size:12px }
.active-trade-card { background:rgba(59,130,246,0.1); border:1px solid #3b82f6; padding:15px; border-radius:10px; margin-bottom:15px }
.pnl-buttons { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px }
.lock-screen { text-align:center; margin-top:150px; color:#ef4444 }
.badge { padding:3px 8px; border-radius:4px; font-size:11px; font-weight:700 }
.loading { text-align:center; color:#94a3b8; padding:20px }
</style>
</head>
<body>

<div id="lockScreen" class="lock-screen hide">
  <h1><i class="fas fa-lock"></i> Access Denied</h1>
  <p>You are not an admin. Please login with an admin account.</p>
</div>

<div id="mainApp" class="container hide">
  <div class="header">
    <h1><i class="fas fa-copy"></i> CYPX Admin - Copy Trading Control</h1>
    <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>

  <div class="grid">
    <div>
      <div class="card">
        <h2><i class="fas fa-chart-line"></i> Ongoing Copied Trades</h2>
        <div id="activeTradesList"><div class="loading">Connecting to Firebase...</div></div>
      </div>
    </div>
    <div>
      <div class="card" style="margin-bottom:20px"><h2><i class="fas fa-users"></i> Traders & Copiers</h2><div id="traderStats"><div class="loading">Loading...</div></div></div>
      <div class="card"><h2><i class="fas fa-history"></i> Trade History</h2><div id="tradeLog"><div class="loading">Loading...</div></div></div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
// FIX 1: CORRECT STORAGEBUCKET
const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.appspot.com", // FIXED
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
  measurementId: "G-4RSQXZJX44"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

const traders = [
  { id: 'kenyan_prince', name: 'Kenyan Prince', profitShare: 20 },
  { id: 'alpha_trader', name: 'Alpha Trader', profitShare: 15 },
  { id: 'states_ke', name: 'States Ke', profitShare: 25 },
  { id: 'vidollar', name: 'Vidollar', profitShare: 18 },
  { id: 'ziwa_fx', name: 'Ziwa Fx', profitShare: 12 },
  { id: 'pizzo_fx', name: 'Pizzo Fx', profitShare: 20 }
];

let copyData = {};
let usernames = {};
let pnlIsProfit = true;
let isAdmin = false;
let dataLoaded = {users: false, copy: false};

auth.onAuthStateChanged(user=>{
  if(user){
    db.ref(`admins/${user.uid}`).once('value').then(snap=>{
      if(snap.exists() && (snap.val().role === 'admin' || snap.val().role === 'superadmin')){
        isAdmin = true;
        document.getElementById('lockScreen').classList.add('hide');
        document.getElementById('mainApp').classList.remove('hide');
        initApp();
      } else {
        isAdmin = false;
        document.getElementById('mainApp').classList.add('hide');
        document.getElementById('lockScreen').classList.remove('hide');
        showToast("Access Denied: Not an admin", true);
      }
    }).catch(e => showToast("DB Error: " + e.message, true));
  } else {
    isAdmin = false;
    document.getElementById('mainApp').classList.add('hide');
    document.getElementById('lockScreen').classList.remove('hide');
    showToast("Please login first", true);
  }
});

function logout(){ auth.signOut(); }

function initApp(){
  loadRealtimeData();
}

// FIX 2: WAIT FOR BOTH USERS AND COPY_TRADING TO LOAD
function checkAndRender(){
  if(dataLoaded.users && dataLoaded.copy){
    renderTraderStats();
    renderActiveTrades();
  }
}

function loadRealtimeData(){
  // 1. LOAD USERNAMES
  db.ref("users").on("value", userSnap=>{
    usernames = {};
    userSnap.forEach(u=>{
      const data = u.val();
      usernames[u.key] = data.username || data.email?.split('@')[0] || u.key.substring(0,6);
    });
    dataLoaded.users = true;
    checkAndRender();
  }, err => console.error("Users load error:", err));

  // 2. LOAD ALL COPIES - REALTIME
  db.ref("copy_trading").on("value", snap=>{
    copyData = snap.val() || {};
    dataLoaded.copy = true;
    checkAndRender();
  }, err => console.error("Copy load error:", err));

  // 3. TRADE HISTORY
  db.ref("admin_trades").limitToLast(10).on("value", snap=>{
    let html = "";
    snap.forEach(traderSnap=>{
      traderSnap.forEach(tradeSnap=>{
        const tr = tradeSnap.val();
        html = `<div style="font-size:12px; margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid #222">
          <b>${traders.find(t=>t.id===traderSnap.key)?.name}</b> | P&L:
          <span style="color:${tr.profit>=0?'#22c55e':'#ef4444'}">${tr.profit>=0?'+':''}$${Number(tr.profit||0).toFixed(2)}</span>
        </div>` + html;
      });
    });
    document.getElementById("tradeLog").innerHTML = html || "No trades yet";
  });
}

function renderTraderStats(){
  let html = "";
  traders.forEach(t=>{
    let copiers = [];
    for(let uid in copyData){
      if(copyData[uid][t.id] && copyData[uid][t.id].status === "active"){
        copiers.push(usernames[uid] || uid.substring(0,6));
      }
    }
    html += `<div class="trader-stat">
      <b>${t.name}</b> - ${copiers.length} Copiers | ${t.profitShare}% Fee
      <div class="copier-list">${copiers.length? copiers.join(', ') : 'No copiers yet'}</div>
    </div>`;
  });
  document.getElementById("traderStats").innerHTML = html || "No copiers yet";
}

function renderActiveTrades(){
  const container = document.getElementById('activeTradesList');
  let html = '';
  let hasTrades = false;

  traders.forEach(t=>{
    let copiers = [];
    let totalCopied = 0;
    for(let uid in copyData){
      if(copyData[uid][t.id] && copyData[uid][t.id].status === "active"){
        hasTrades = true;
        const c = copyData[uid][t.id];
        copiers.push({uid,...c, username: usernames[uid] || uid.substring(0,6)});
        totalCopied += Number(c.amount || 0);
      }
    }

    if(copiers.length > 0){
      html += `<div class="active-trade-card">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px">
          <div><b>${t.name}</b></div>
          <div style="font-size:12px; color:#94a3b8">${copiers.length} Copiers | Total: $${totalCopied.toFixed(2)}</div>
        </div>
        <div style="font-size:12px; margin-bottom:10px">Copiers: ${copiers.map(c=>c.username).join(', ')}</div>

        <div class="form-group"><label>Final P&L to Award for ALL ${copiers.length} Copiers $</label>
          <div class="pnl-buttons">
            <button type="button" class="btn btn-profit" onclick="setPnL('${t.id}', true)">+ PROFIT</button>
            <button type="button" class="btn btn-loss" onclick="setPnL('${t.id}', false)">- LOSS</button>
          </div>
          <input id="closeProfit_${t.id}" type="number" placeholder="25">
        </div>
        <button class="btn btn-red" onclick="closeTrade('${t.id}')">Close & Pay ${copiers.length} Copiers</button>
      </div>`;
    }
  });

  if(!hasTrades) html = '<div style="text-align:center; color:#94a3b8; padding:20px">No active copiers</div>';
  container.innerHTML = html;
}

function setPnL(traderId, isProfit){
  pnlIsProfit = isProfit;
  const el = document.getElementById(`closeProfit_${traderId}`);
  if(el){
    el.parentElement.querySelector('.btn-profit').style.opacity = isProfit? '1' : '0.5';
    el.parentElement.querySelector('.btn-loss').style.opacity =!isProfit? '1' : '0.5';
  }
}

async function closeTrade(traderId){
  if(!isAdmin) return showToast("Unauthorized", true);
  let profit = parseFloat(document.getElementById(`closeProfit_${traderId}`).value);
  if(isNaN(profit)) return showToast("Enter P&L amount");
  if(!pnlIsProfit) profit = -Math.abs(profit);

  const trader = traders.find(t=>t.id===traderId);
  const tradeData = { traderId, profit, status: "CLOSED", closedAt: Date.now() };
  const traderFee = trader.profitShare;

  try {
    await db.ref("admin_trades/" + traderId).push(tradeData);
    const updates = {};
    let count = 0;

    for(let uid in copyData){
      if(copyData[uid][traderId] && copyData[uid][traderId].status === "active"){
        const copyInfo = copyData[uid][traderId];
        const grossProfit = profit * (Number(copyInfo.amount) / 1000);
        const userProfit = grossProfit * (1 - traderFee/100);

        updates[`users/${uid}/balance`] = firebase.database.ServerValue.increment(userProfit);
        updates[`copy_trading/${uid}/${traderId}/pnl`] = (Number(copyInfo.pnl) || 0) + userProfit;
        updates[`copy_trading/${uid}/${traderId}/lastUpdate`] = Date.now();
        updates[`copy_trading/${uid}/${traderId}/status`] = "closed";
        updates[`users/${uid}/history/trade_${Date.now()}_${uid}`] = {...tradeData, userProfit, traderName: trader.name };
        updates[`users/${uid}/trade_notifications/${Date.now()}`] = {
          msg: `${profit>=0?'Profit':'Loss'} Hit: $${userProfit.toFixed(2)}`,
          type: profit>=0? "ok" : "bad"
        }
        count++;
      }
    }

    if(Object.keys(updates).length > 0) await db.ref().update(updates);
    showToast(`Trade Closed. P&L: $${profit}. ${count} Copiers Paid & Closed!`);
  } catch(e) { showToast("Error: " + e.message, true); }
}

function showToast(message, isError = false){
  const toast = document.getElementById('toast');
  toast.innerText = message;
  toast.className = 'toast ' + (isError? 'error show' : 'show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}
</script>
</body>
   </html>
