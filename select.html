<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Referral Options - CYPX</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #003366, #001f3f);
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: linear-gradient(90deg, #002f6c, #004aad);
      padding: 14px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    /* MAIN */
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px 10px;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #00e0ff;
    }

    /* CARD (SMALLER) */
    .card {
      background: linear-gradient(145deg, #003a78, #002b5c);
      border-radius: 12px;
      padding: 14px;
      width: 100%;
      max-width: 280px; /* reduced */
      margin: 8px 0;
      text-align: center;
      box-shadow: 0 6px 18px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.05);
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 14px rgba(0, 200, 255, 0.35);
    }

    .card h2 {
      font-size: 16px;
      margin-bottom: 6px;
      color: #ffd700;
    }

    .card p {
      font-size: 12px;
      margin-bottom: 12px;
      color: rgba(255,255,255,0.85);
      line-height: 1.4;
    }

    /* BUTTON */
    .card button {
      background: linear-gradient(145deg, #ffcc00, #ffaa00);
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      color: #000;
      transition: 0.2s;
    }

    .card button:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 10px rgba(255, 204, 0, 0.6);
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 10px;
      background: #001a33;
      font-size: 11px;
      color: #aaa;
    }
  </style>
</head>

<body>

<header>
  CYPX ONLINE CRYPTO
</header>

<div class="container">

  <h1>Choose Your Referral Option</h1>

  <div class="card">
    <h2>Purchase Referrals</h2>
    <p>Buy ready-made referrals and start growing faster. Choose from different packages.</p>
    <button onclick="redirectTo('refpackages.html')">Purchase</button>
  </div>

  <div class="card">
    <h2>Refer Friends</h2>
    <p>Share your referral link with friends and earn bonuses when they join and invest.</p>
    <button onclick="redirectTo('team.html')">Refer Friends</button>
  </div>

</div>

<footer>
  © 2026 CYPX ONLINE CRYPTO — Referral System
</footer>

<!-- Firebase (AUTH ONLY, NO DATABASE WRITES) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
    authDomain: "quantum-rio.firebaseapp.com",
    projectId: "quantum-rio",
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "index.html";
    }
  });

  function redirectTo(url) {
    window.location.href = url;
  }
</script>

</body>
</html>
