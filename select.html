<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>Referral Options</title>  

  <style>  
    body {  
      font-family: Arial, sans-serif;  
      background: radial-gradient(circle at top, #003366, #001f3f);  
      color: #fff;  
      margin: 0;  
      height: 100vh;  
      overflow: hidden; /* no scroll */
      display: flex;
      flex-direction: column;
    }

    /* CENTER CONTENT */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {  
      font-size: 22px;  
      margin-bottom: 15px;  
      text-align: center;
      color: #00e0ff;
      text-shadow: 0 0 8px rgba(0,224,255,0.6);
    }  

    /* CARD */
    .card {  
      background: linear-gradient(145deg, #003a78, #002b5c);  
      border-radius: 14px;  
      padding: 14px;  
      width: 80%;  
      max-width: 300px;  
      margin: 8px 0;  
      text-align: center;  
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.05);
      transition: 0.25s;  
    }  

    .card:hover {  
      transform: translateY(-3px);  
      box-shadow: 0 0 18px rgba(0, 200, 255, 0.4);  
    }  

    .card h2 {  
      font-size: 16px;  
      margin-bottom: 6px;
      color: #ffd700;
    }  

    .card p {  
      font-size: 12px;  
      margin-bottom: 10px;  
      opacity: 0.85;
      line-height: 1.4;
    }  

    /* BUTTON */
    .card button {  
      background: linear-gradient(145deg, #ffcc00, #ffaa00);  
      border: none;  
      padding: 8px 14px;  
      border-radius: 8px;  
      cursor: pointer;  
      font-size: 13px;  
      font-weight: bold;  
      color: #000;  
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }  

    .card button:hover {  
      transform: translateY(-1px);
      box-shadow: 0 0 10px rgba(255, 204, 0, 0.7);  
    }  

    .loading {  
      opacity: 0.6;  
      pointer-events: none;  
    }  

    /* FOOTER */
    footer {
      text-align: center;
      padding: 10px;
      font-size: 12px;
      color: #aaa;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(6px);
    }

  </style>  
</head>  

<body>  

<div class="main">
  <h1>Choose Your Referral Option</h1>  

  <div class="card">  
    <h2>Purchase Referrals</h2>  
    <p>Buy ready-made referrals and start growing faster. Choose from different packages.</p>  
    <button id="purchaseBtn" onclick="chooseOption('refpackages.html')">Purchase</button>  
  </div>  

  <div class="card">  
    <h2>Refer Friends</h2>  
    <p>Share your referral link with friends and earn bonuses when they join and invest.</p>  
    <button id="referBtn" onclick="chooseOption('team.html')">Refer Friends</button>  
  </div>  
</div>

<!-- FOOTER -->
<footer>
  © 2026 CYPX ONLINE CRYPTO — Secure Referral System
</footer>

<!-- Firebase (AUTH ONLY, no DB writes) -->
<script type="module">  
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";  
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";  

  const firebaseConfig = {  
    apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",  
    authDomain: "quantum-rio.firebaseapp.com",  
    projectId: "quantum-rio",  
  };  

  const app = initializeApp(firebaseConfig);  
  const auth = getAuth(app);  

  // Auth check only
  onAuthStateChanged(auth, (user) => {  
    if (!user) {  
      window.location.href = "index.html";  
    }  
  });  

  // SIMPLE REDIRECT (no database sync)
  window.chooseOption = function(redirectUrl) {  
    document.getElementById("purchaseBtn").classList.add("loading");  
    document.getElementById("referBtn").classList.add("loading");  

    setTimeout(() => {
      window.location.href = redirectUrl;
    }, 300);
  }  
</script>  

</body>  
</html>
