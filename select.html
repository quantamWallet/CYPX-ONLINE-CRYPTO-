<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Referral Options</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #001f3f, #003366);
      color: #fff;
      margin: 0;
      height: 100vh;
      overflow: hidden; /* ❌ no scrolling */

      display: flex;
      flex-direction: column;
      justify-content: space-between; /* push footer down */
      align-items: center;
    }

    /* MAIN CONTENT */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 10px;
      text-align: center;
    }

    /* CARD */
    .card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 12px;
      width: 80%;
      max-width: 260px;
      margin: 8px 0;
      text-align: center;
      box-shadow: 0 4px 12px rgba(0, 123, 255, 0.35);
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 14px rgba(0, 150, 255, 0.5);
    }

    .card h2 {
      font-size: 15px;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 12px;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .card button {
      background: #ffcc00;
      border: none;
      padding: 7px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
    }

    .card button:hover {
      background: #ff9900;
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }

    /* FOOTER */
    footer {
      width: 100%;
      text-align: center;
      padding: 10px;
      font-size: 11px;
      background: rgba(0, 0, 0, 0.2);
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="content">
  <h1>Choose Your Referral Option</h1>

  <div class="card">
    <h2>Purchase Referrals</h2>
    <p>Buy ready-made referrals and grow faster.</p>
    <button id="purchaseBtn" onclick="chooseOption('purchase', 'refpackages.html')">
      Purchase
    </button>
  </div>

  <div class="card">
    <h2>Refer Friends</h2>
    <p>Invite friends and earn bonuses.</p>
    <button id="referBtn" onclick="chooseOption('refer', 'team.html')">
      Refer
    </button>
  </div>
</div>

<footer>
  © 2026 CYPX ONLINE CRYPTO
</footer>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
  import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
    authDomain: "quantum-rio.firebaseapp.com",
    databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
    projectId: "quantum-rio",
    storageBucket: "quantum-rio.firebasestorage.app",
    messagingSenderId: "805433999377",
    appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  let currentUID = null;

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUID = user.uid;
    } else {
      window.location.href = "index.html";
    }
  });

  window.chooseOption = function(type, redirectUrl) {
    if (!currentUID) return;

    document.getElementById("purchaseBtn").classList.add("loading");
    document.getElementById("referBtn").classList.add("loading");

    const actionRef = push(ref(db, "referralChoices/" + currentUID));
    set(actionRef, {
      type: type,
      timestamp: new Date().toISOString()
    }).then(() => {
      window.location.href = redirectUrl;
    }).catch(() => {
      window.location.href = redirectUrl;
    });
  }
</script>

</body>
</html>
