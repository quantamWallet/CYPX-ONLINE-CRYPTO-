<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CYPX HOLDINGS - KYC Verification</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --brand:#2563eb;--ok:#16a34a;--warn:#f59e0b;--bad:#dc2626;
  --ink:#0f172a;--muted:#475569;--line:#e2e8f0;--bg:#f8fafc;
  --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;-webkit-tap-highlight-color:transparent}
body{
  background:linear-gradient(rgba(10,18,35,.72),rgba(10,18,35,.72)),url("forex-bg.jpg") center/cover fixed;
  min-height:100dvh;display:grid;place-items:center;padding:16px;color:var(--ink)
}
.container{width:100%;max-width:560px}
.card{background:rgba(255,255,255,.98);backdrop-filter:saturate(180%) blur(8px);border-radius:22px;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.header{text-align:center;margin-bottom:14px}
.header i{font-size:44px;color:var(--brand)}
.header h1{font-size:22px;margin-top:6px}
.header p{color:var(--muted);font-size:13px}

.steps{display:flex;gap:8px;margin:14px 0 18px}
.step{flex:1;height:6px;background:var(--line);border-radius:99px;overflow:hidden}
.step > span{display:block;height:100%;width:0;background:var(--brand);transition:width.3s ease}

.stepper{display:none}
.stepper.active{display:block;animation:fade.2s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none}}

label.field{display:block;margin-bottom:12px}
label.field span{display:block;font-size:12px;color:var(--muted);margin:0 0 6px 2px}
.input{width:100%;padding:14px 14px;border:1px solid var(--line);border-radius:12px;font-size:16px;outline:none;background:#fff}
.input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.12)}

.upload-box{
  border:2px dashed var(--line);border-radius:16px;padding:18px;text-align:center;cursor:pointer;
  transition:.2s;background:#fff;display:block
}
.upload-box:active{transform:scale(.99)}
.upload-box:hover{border-color:var(--brand);background:#eff6ff}
.upload-box i{font-size:30px;color:var(--muted);margin-bottom:6px}
.upload-box p{font-size:14px;color:var(--muted)}
.upload-box img{max-width:100%;max-height:220px;border-radius:12px;margin-top:10px;display:none;border:1px solid var(--line)}

.btn{width:100%;padding:14px;background:var(--brand);color:#fff;border:none;border-radius:12px;font-weight:600;cursor:pointer;font-size:16px;transition:.15s}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn.ghost{background:#fff;color:var(--brand);border:1px solid var(--line)}

.row{display:flex;gap:10px}
.progress{height:8px;background:var(--line);border-radius:99px;margin-top:10px;overflow:hidden;display:none}
.progress > span{display:block;height:100%;width:0;background:var(--brand);transition:width.2s}

.toast{position:fixed;top:calc(16px + env(safe-area-inset-top));right:16px;left:16px;max-width:520px;margin:0 auto;
  padding:12px 16px;border-radius:12px;color:#fff;font-size:14px;z-index:9999;display:none;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.toast.ok{background:var(--ok)}.toast.bad{background:var(--bad)}

.badge{padding:6px 12px;border-radius:999px;font-size:12px;font-weight:600;color:#fff;display:inline-block}
.badge.pending{background:var(--warn)}.badge.ok{background:var(--ok)}.badge.bad{background:var(--bad)}

.status-card{background:var(--bg);border:1px solid var(--line);padding:14px;border-radius:14px;text-align:center;margin-bottom:14px}
.helper{font-size:13px;color:var(--muted);margin-top:6px}

.success{text-align:center;padding:20px}
.success i{font-size:64px;color:#fff;background:var(--ok);width:96px;height:96px;border-radius:50%;display:grid;place-items:center;margin:0 auto 12px}

.sticky-actions{position:sticky;bottom:-22px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);padding-top:10px;margin:0 -22px -22px;padding:12px 22px 22px;border-radius:0 0 22px 22px}
</style>
</head>
<body>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<main class="container">
  <div class="card">
    <header class="header">
      <i class="fa-solid fa-shield-check" aria-hidden="true"></i>
      <h1>Identity Verification</h1>
      <p>Secure KYC powered by CYPX Holdings</p>
    </header>

    <div id="statusWrap" class="status-card" style="display:none" aria-live="polite">
      <span id="statusBadge" class="badge pending">Pending</span>
      <p id="statusMsg" class="helper"></p>
    </div>

    <nav class="steps" aria-label="KYC steps">
      <div class="step"><span id="s1"></span></div>
      <div class="step"><span id="s2"></span></div>
      <div class="step"><span id="s3"></span></div>
      <div class="step"><span id="s4"></span></div>
    </nav>

    <!-- STEP 1: DETAILS -->
    <section class="stepper active" id="step1" aria-label="Step 1 Details">
      <label class="field">
        <span>Full Name as on ID</span>
        <input class="input" id="fullName" autocomplete="name" inputmode="text" placeholder="Jane A. Doe">
      </label>
      <label class="field">
        <span>Date of Birth</span>
        <input class="input" id="dob" type="date" max="2010-12-31">
      </label>
      <label class="field">
        <span>Country</span>
        <input class="input" id="country" placeholder="Kenya" autocomplete="country-name">
      </label>
      <label class="field">
        <span>ID Type</span>
        <select class="input" id="idType">
          <option value="">Select ID Type</option>
          <option>National ID</option><option>Passport</option><option>Driving Licence</option>
        </select>
      </label>
      <label class="field">
        <span>ID Number</span>
        <input class="input" id="idNumber" placeholder="A1234567" autocomplete="off">
      </label>
      <button class="btn" id="next1" type="button">Continue</button>
    </section>

    <!-- STEP 2: FRONT ID -->
    <section class="stepper" id="step2" aria-label="Step 2 Front ID">
      <h3 style="margin-bottom:8px;font-size:16px">Step 2/4: Front of ID</h3>
      <label class="upload-box" for="frontImage">
        <i class="fa-solid fa-id-card"></i>
        <p>Tap to capture or upload Front ID</p>
        <img id="frontPreview" alt="Front ID preview">
      </label>
      <input type="file" id="frontImage" accept="image/*,image/heic" capture="environment" style="display:none">
      <div class="progress" id="p1"><span></span></div>
      <div class="sticky-actions">
        <div class="row">
          <button class="btn ghost" type="button" id="back1">Back</button>
          <button class="btn" type="button" id="next2" disabled>Upload & Continue</button>
        </div>
      </div>
    </section>

    <!-- STEP 3: BACK ID -->
    <section class="stepper" id="step3" aria-label="Step 3 Back ID">
      <h3 style="margin-bottom:8px;font-size:16px">Step 3/4: Back of ID</h3>
      <label class="upload-box" for="backImage">
        <i class="fa-solid fa-id-card"></i>
        <p>Optional: Tap to capture Back ID</p>
        <img id="backPreview" alt="Back ID preview">
      </label>
      <input type="file" id="backImage" accept="image/*,image/heic" capture="environment" style="display:none">
      <div class="progress" id="p2"><span></span></div>
      <div class="sticky-actions">
        <div class="row">
          <button class="btn ghost" type="button" id="back2">Back</button>
          <button class="btn" type="button" id="next3">Skip & Continue</button>
        </div>
      </div>
    </section>

    <!-- STEP 4: SELFIE -->
    <section class="stepper" id="step4" aria-label="Step 4 Selfie">
      <h3 style="margin-bottom:8px;font-size:16px">Step 4/4: Liveness Selfie</h3>
      <label class="upload-box" for="selfieImage">
        <i class="fa-solid fa-camera"></i>
        <p>Tap to take a clear selfie in good light</p>
        <img id="selfiePreview" alt="Selfie preview">
      </label>
      <input type="file" id="selfieImage" accept="image/*,image/heic" capture="user" style="display:none">
      <div class="progress" id="p3"><span></span></div>
      <div class="sticky-actions">
        <div class="row">
          <button class="btn ghost" type="button" id="back3">Back</button>
          <button class="btn" type="button" id="submitKyc">Submit for Review</button>
        </div>
      </div>
    </section>

    <!-- SUCCESS -->
    <section class="stepper" id="done" aria-label="Submitted">
      <div class="success">
        <i class="fa-solid fa-check" aria-hidden="true"></i>
        <h2>Submitted Successfully</h2>
        <p class="helper">Your documents are under review. We’ll notify you once verified.</p>
        <a href="profile.html" class="btn" style="display:inline-block;margin-top:12px;text-decoration:none">Go to Profile</a>
      </div>
    </section>

  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, update, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
    apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
    authDomain: "quantum-rio.firebaseapp.com",
    databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
    projectId: "quantum-rio",
    storageBucket: "quantum-rio.appspot.com",
    messagingSenderId: "805433999377",
    appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const storage = getStorage(app);

/* DOM */
const $ = id => document.getElementById(id);
const toast = $('toast');
const statusWrap = $('statusWrap'), statusBadge = $('statusBadge'), statusMsg = $('statusMsg');
const steps = [$('s1'),$('s2'),$('s3'),$('s4')];
const stepEls = [$('step1'),$('step2'),$('step3'),$('step4'),$('done')];

const fullName = $('fullName'), dob = $('dob'), country = $('country'), idType = $('idType'), idNumber = $('idNumber');
const frontImage = $('frontImage'), backImage = $('backImage'), selfieImage = $('selfieImage');
const frontPreview = $('frontPreview'), backPreview = $('backPreview'), selfiePreview = $('selfiePreview');
const p1 = $('p1').firstElementChild, p2 = $('p2').firstElementChild, p3 = $('p3').firstElementChild;

let uid = null;
let kycData = {};

/* Utils */
const showToast = (msg,type="ok")=>{
  toast.textContent = msg;
  toast.className = "toast " + (type==="ok"?"ok":"bad");
  toast.style.display = "block";
  setTimeout(()=>toast.style.display="none",3500);
}
const goStep = (n)=>{
  stepEls.forEach((el,i)=>el.classList.toggle("active", i===n));
  steps.forEach((el,i)=>{ el.style.width = i<n? "100%" : "0%"; });
  window.scrollTo({top:0,behavior:"smooth"});
}
const saveProgress = async (patch)=>{
  if(!uid) return;
  kycData = {...kycData,...patch};
  await update(ref(db, `kyc/${uid}`), {...kycData, updatedAt: serverTimestamp()});
}

/* Image: HEIC -> JPEG via canvas, target <=120KB */
async function compressImage(file){
  if(file.type === 'image/heic'){
    throw new Error("HEIC not supported on web. Use JPG/PNG or take photo in-app.");
  }
  return new Promise((resolve, reject)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    const timer = setTimeout(()=>{URL.revokeObjectURL(url); reject(new Error("Image failed to load. Try JPG/PNG."));}, 10000);
    img.onerror = ()=>{clearTimeout(timer); URL.revokeObjectURL(url); reject(new Error("Invalid image"));};
    img.onload = ()=>{
      clearTimeout(timer);
      let {width, height} = img;
      const max = 900;
      if(width > max){ height *= max/width; width = max; }
      const canvas = document.createElement('canvas');
      canvas.width=width; canvas.height=height;
      canvas.getContext('2d',{willReadFrequently:false}).drawImage(img,0,0,width,height);
      URL.revokeObjectURL(url);

      let quality = 0.55;
      const encode = ()=>{
        canvas.toBlob(b=>{
          if(!b) return reject(new Error("Compression failed"));
          if(b.size > 120000 && quality > 0.3){ quality -= 0.1; return encode(); }
          resolve(new File([b], "kyc.jpg", {type:'image/jpeg', lastModified:Date.now()}));
        }, 'image/jpeg', quality);
      }
      encode();
    };
    img.src = url;
  });
}

/* Upload with timeout + progress */
function uploadOne(path, file, progressEl){
  return new Promise((resolve, reject)=>{
    const ref = storageRef(storage, path);
    const task = uploadBytesResumable(ref, file);
    const t = setTimeout(()=>{task.cancel(); reject(new Error("Upload too slow. Switch to WiFi."));}, 60000);
    progressEl.parentElement.style.display='block';
    task.on('state_changed',
      s=>{ progressEl.style.width = Math.round(s.bytesTransferred/s.totalBytes*100)+'%'; },
      e=>{ clearTimeout(t); progressEl.parentElement.style.display='none'; reject(e); },
      async ()=>{ clearTimeout(t); progressEl.parentElement.style.display='none'; resolve(await getDownloadURL(task.snapshot.ref)); }
    );
  });
}

/* Bind file inputs */
function bindFile(input, preview, btn){
  input.addEventListener("change", ()=>{
    const file = input.files?.[0];
    if(!file) return;
    preview.src = URL.createObjectURL(file);
    preview.style.display='block';
    btn.disabled = false;
  });
}
bindFile(frontImage, frontPreview, $('next2'));
bindFile(backImage, backPreview, $('next3'));
bindFile(selfieImage, selfiePreview, $('submitKyc'));

/* Auth + Resume */
onAuthStateChanged(auth, async (user)=>{
  if(!user){ window.location.href="auth.html"; return; }
  uid = user.uid;
  const snap = await get(ref(db, `kyc/${uid}`));
  if(snap.exists()){
    kycData = snap.val() || {};
    const status = kycData.status;
    if(status === "verified"){
      statusWrap.style.display='block';
      statusBadge.className='badge ok'; statusBadge.textContent='Verified';
      statusMsg.textContent='Your KYC has been approved.';
      goStep(4); return;
    }
    if(status === "rejected"){
      statusWrap.style.display='block';
      statusBadge.className='badge bad'; statusBadge.textContent='Rejected';
      statusMsg.textContent=kycData.reason || 'Please resubmit with clearer images.';
    }
    if(status === "pending"){
      statusWrap.style.display='block';
      statusBadge.className='badge pending'; statusBadge.textContent='Pending';
      statusMsg.textContent='Under review. This usually takes <24 hours.';
    }
    // Resume logic
    if(!kycData.fullName){ goStep(0); return; }
    if(!kycData.frontImage){ goStep(1); return; }
    if(!kycData.selfieImage){ goStep(3); return; }
    goStep(3);
  }
});

/* STEP 1 */
$('next1').addEventListener("click", async ()=>{
  if(!fullName.value.trim() ||!dob.value ||!country.value.trim() ||!idType.value ||!idNumber.value.trim()){
    return showToast("Fill all fields", "bad");
  }
  await saveProgress({
    fullName: fullName.value.trim(),
    dob: dob.value,
    country: country.value.trim(),
    idType: idType.value,
    idNumber: idNumber.value.trim(),
    status: "draft"
  });
  goStep(1);
});

/* STEP 2 */
$('next2').addEventListener("click", async ()=>{
  const file = frontImage.files?.[0];
  if(!file) return;
  $('next2').disabled=true;
  try{
    const f = await compressImage(file);
    const url = await uploadOne(`kyc/${uid}/front.jpg`, f, p1);
    await saveProgress({frontImage: url});
    showToast("Front ID saved");
    goStep(2);
  }catch(e){ showToast(e.message, "bad"); $('next2').disabled=false; }
});

/* STEP 3 */
$('next3').addEventListener("click", async ()=>{
  const file = backImage.files?.[0];
  if(file){
    $('next3').disabled=true;
    try{
      const f = await compressImage(file);
      const url = await uploadOne(`kyc/${uid}/back.jpg`, f, p2);
      await saveProgress({backImage: url});
      showToast("Back ID saved");
    }catch(e){ $('next3').disabled=false; return showToast(e.message, "bad"); }
  }
  goStep(3);
});
$('back1').onclick = ()=>goStep(0);
$('back2').onclick = ()=>goStep(1);

/* STEP 4 */
$('submitKyc').addEventListener("click", async ()=>{
  const file = selfieImage.files?.[0];
  if(!file) return showToast("Selfie required", "bad");
  $('submitKyc').disabled=true;
  try{
    const f = await compressImage(file);
    const url = await uploadOne(`kyc/${uid}/selfie.jpg`, f, p3);
    await saveProgress({ selfieImage: url, status: "pending", submittedAt: serverTimestamp() });
    await update(ref(db, `users/${uid}`), {kycStatus:"pending", kycSubmitted:true});
    goStep(4);
    showToast("Submitted successfully");
  }catch(e){ showToast(e.message, "bad"); $('submitKyc').disabled=false; }
});
$('back3').onclick = ()=>goStep(2);
</script>
</body>
  </html>
