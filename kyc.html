<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYPX HOLDINGS - KYC Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--brand:#2563eb;--ok:#16a34a;--warn:#f59e0b;--bad:#dc2626;--ink:#0f172a;--muted:#475569;--line:#e2e8f0;--bg:#f8fafc}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:linear-gradient(rgba(10,18,35,.72),rgba(10,18,35,.72)),url("forex-bg.jpg");background-size:cover;min-height:100vh;display:grid;place-items:center;padding:16px}
.container{width:100%;max-width:560px}
.card{background:rgba(255,255,255,.97);border-radius:22px;padding:24px;box-shadow:0 15px 45px rgba(0,0,0,.35)}
.header{text-align:center;margin-bottom:16px}
.header i{font-size:48px;color:var(--brand)}
.header h1{font-size:24px;color:var(--ink);margin-top:8px}
.steps{display:flex;gap:8px;margin:16px 0 20px}
.step{flex:1;height:6px;background:var(--line);border-radius:99px;overflow:hidden}
.step > span{display:block;height:100%;width:0;background:var(--brand);transition:width.3s}
.stepper{display:none}
.stepper.active{display:block}
.input-field{margin-bottom:12px}
.input-field input,.input-field select{width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;font-size:16px;outline:none}
.input-field input:focus{border-color:var(--brand)}
.upload-box{border:2px dashed var(--line);border-radius:16px;padding:18px;text-align:center;cursor:pointer;transition:.2s}
.upload-box:hover{border-color:var(--brand);background:#eff6ff}
.upload-box img{max-width:100%;max-height:240px;border-radius:12px;margin-top:10px;display:none}
.upload-box i{font-size:32px;color:var(--muted)}
.btn{width:100%;padding:14px;background:var(--brand);color:#fff;border:none;border-radius:12px;font-weight:600;cursor:pointer;font-size:16px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.ghost{background:#fff;color:var(--brand);border:1px solid var(--line)}
.row{display:flex;gap:10px}
.progress{height:8px;background:var(--line);border-radius:99px;margin-top:10px;overflow:hidden;display:none}
.progress > span{display:block;height:100%;width:0;background:var(--brand);transition:width.2s}
.toast{position:fixed;top:16px;right:16px;padding:12px 16px;border-radius:12px;color:#fff;font-size:14px;z-index:9999;display:none}
.toast.ok{background:var(--ok)}.toast.bad{background:var(--bad)}
.badge{padding:6px 12px;border-radius:999px;font-size:12px;font-weight:600;color:#fff;display:inline-block}
.badge.pending{background:var(--warn)}.badge.ok{background:var(--ok)}.badge.bad{background:var(--bad)}
.status-card{background:var(--bg);border:1px solid var(--line);padding:14px;border-radius:14px;text-align:center;margin-bottom:16px}
.helper{font-size:13px;color:var(--muted);margin-top:6px}
.success{text-align:center;padding:20px}
.success i{font-size:64px;color:#fff;background:var(--ok);width:96px;height:96px;border-radius:50%;display:grid;place-items:center;margin:0 auto 12px}
.size-hint{font-size:12px;color:var(--muted);margin-top:4px}
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="container">
  <div class="card">
    <div class="header">
      <i class="fa-solid fa-shield-check"></i>
      <h1>Identity Verification</h1>
      <p class="helper">Secure KYC powered by CYPX Holdings</p>
    </div>

    <div id="statusWrap" class="status-card" style="display:none">
      <span id="statusBadge" class="badge pending">Pending</span>
      <p id="statusMsg" class="helper" style="margin-top:6px"></p>
    </div>

    <div class="steps">
      <div class="step"><span id="s1"></span></div>
      <div class="step"><span id="s2"></span></div>
      <div class="step"><span id="s3"></span></div>
      <div class="step"><span id="s4"></span></div>
    </div>

    <!-- STEP 1: DETAILS -->
    <div class="stepper active" id="step1">
      <div class="input-field"><input id="fullName" placeholder="Full Name as on ID" autocomplete="name"></div>
      <div class="input-field"><input id="dob" type="date"></div>
      <div class="input-field"><input id="country" placeholder="Country"></div>
      <div class="input-field">
        <select id="idType">
          <option value="">Select ID Type</option>
          <option>National ID</option><option>Passport</option><option>Driving Licence</option>
        </select>
      </div>
      <div class="input-field"><input id="idNumber" placeholder="ID Number"></div>
      <button class="btn" id="next1" type="button">Continue</button>
    </div>

    <!-- STEP 2: FRONT ID -->
    <div class="stepper" id="step2">
      <h3 style="margin-bottom:8px">Step 2/4: Front of ID</h3>
      <label class="upload-box" for="frontImage">
        <i class="fa-solid fa-id-card"></i>
        <p>Tap to capture Front ID</p>
        <p class="size-hint">JPG only. Keep it under 1MB</p>
        <img id="frontPreview">
      </label>
      <input type="file" id="frontImage" accept="image/jpeg" capture="environment" style="display:none">
      <div class="progress" id="p1"><span></span></div>
      <div class="row" style="margin-top:12px">
        <button class="btn ghost" type="button" id="back1">Back</button>
        <button class="btn" type="button" id="next2" disabled>Upload & Continue</button>
      </div>
    </div>

    <!-- STEP 3: BACK ID -->
    <div class="stepper" id="step3">
      <h3 style="margin-bottom:8px">Step 3/4: Back of ID</h3>
      <label class="upload-box" for="backImage">
        <i class="fa-solid fa-id-card"></i>
        <p>Tap to capture Back ID</p>
        <p class="size-hint">Optional</p>
        <img id="backPreview">
      </label>
      <input type="file" id="backImage" accept="image/jpeg" capture="environment" style="display:none">
      <div class="progress" id="p2"><span></span></div>
      <div class="row" style="margin-top:12px">
        <button class="btn ghost" type="button" id="back2">Back</button>
        <button class="btn" type="button" id="next3">Skip & Continue</button>
      </div>
    </div>

    <!-- STEP 4: SELFIE -->
    <div class="stepper" id="step4">
      <h3 style="margin-bottom:8px">Step 4/4: Liveness Selfie</h3>
      <label class="upload-box" for="selfieImage">
        <i class="fa-solid fa-camera"></i>
        <p>Tap to take a clear selfie</p>
        <p class="size-hint">No sunglasses, good light</p>
        <img id="selfiePreview">
      </label>
      <input type="file" id="selfieImage" accept="image/jpeg" capture="user" style="display:none">
      <div class="progress" id="p3"><span></span></div>
      <div class="row" style="margin-top:12px">
        <button class="btn ghost" type="button" id="back3">Back</button>
        <button class="btn" type="button" id="submitKyc">Submit for Review</button>
      </div>
    </div>

    <!-- SUCCESS -->
    <div class="stepper" id="done">
      <div class="success">
        <i class="fa-solid fa-check"></i>
        <h2>Submitted Successfully</h2>
        <p class="helper">Your documents are under review. We’ll notify you once verified.</p>
        <a href="profile.html" class="btn" style="display:inline-block;margin-top:12px;text-decoration:none">Go to Profile</a>
      </div>
    </div>

  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, update, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.firebasestorage.app",
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
  measurementId: "G-4RSQXZJX44"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const storage = getStorage(app);

/* DOM */
const toast = document.getElementById("toast");
const statusWrap = document.getElementById("statusWrap");
const statusBadge = document.getElementById("statusBadge");
const statusMsg = document.getElementById("statusMsg");
const steps = [document.getElementById("s1"),document.getElementById("s2"),document.getElementById("s3"),document.getElementById("s4")];
const stepEls = [document.getElementById("step1"),document.getElementById("step2"),document.getElementById("step3"),document.getElementById("step4"),document.getElementById("done")];

const fullName = document.getElementById("fullName");
const dob = document.getElementById("dob");
const country = document.getElementById("country");
const idType = document.getElementById("idType");
const idNumber = document.getElementById("idNumber");

const frontImage = document.getElementById("frontImage");
const backImage = document.getElementById("backImage");
const selfieImage = document.getElementById("selfieImage");

const frontPreview = document.getElementById("frontPreview");
const backPreview = document.getElementById("backPreview");
const selfiePreview = document.getElementById("selfiePreview");

const p1 = document.querySelector("#p1 span");
const p2 = document.querySelector("#p2 span");
const p3 = document.querySelector("#p3 span");

let uid = null;
let kycData = {};

/* Utils */
const showToast = (msg,type="ok")=>{
  toast.textContent = msg;
  toast.className = "toast " + (type==="ok"?"ok":"bad");
  toast.style.display = "block";
  setTimeout(()=>toast.style.display="none",3500);
}
const goStep = (n)=>{
  stepEls.forEach((el,i)=>el.classList.toggle("active", i===n));
  steps.forEach((el,i)=>el.style.width = i<n? "100%" : "0%");
}
const saveProgress = async (patch)=>{
  if(!uid) return;
  kycData = {...kycData,...patch};
  await update(ref(db, "kyc/"+uid), {...kycData, updatedAt: serverTimestamp()});
}

/* Fast compress: skip canvas if <500KB. Target <140KB */
async function compressImage(file){
  if(file.size < 500000 && file.type === "image/jpeg"){
    return new File([file], "kyc.jpg", {type:'image/jpeg'});
  }
  return new Promise((resolve, reject)=>{
    const img = new Image();
    const timer = setTimeout(()=>reject(new Error("Image too large. Retake photo.")), 15000);
    img.onerror = ()=>{clearTimeout(timer); reject(new Error("Invalid image"));};
    img.onload = ()=>{
      clearTimeout(timer);
      let {width, height} = img;
      const max = 720; // 720p is enough for KYC
      if(width > max){ height *= max/width; width = max; }
      const c = document.createElement('canvas');
      c.width=width; c.height=height;
      const ctx = c.getContext('2d', {alpha:false, willReadFrequently:false});
      ctx.drawImage(img,0,0,width,height);
      let quality = 0.6;
      const tryBlob = ()=>{
        c.toBlob(b=>{
          if(!b) return reject(new Error("Compression failed"));
          if(b.size > 140000 && quality > 0.4){ // keep under 140KB
            quality -= 0.1;
            return tryBlob();
          }
          resolve(new File([b], "kyc.jpg", {type:'image/jpeg'}));
        }, 'image/jpeg', quality);
      }
      tryBlob();
    };
    img.src = URL.createObjectURL(file);
  });
}

/* Upload 1 file with 2min timeout for mobile data */
function uploadOne(path, file, progressEl){
  return new Promise((resolve, reject)=>{
    const ref = storageRef(storage, path);
    const task = uploadBytesResumable(ref, file);

    console.log("Bucket:", storage.app.options.storageBucket);
    console.log("File size:", file.size);
    console.log("File type:", file.type);

    const t = setTimeout(()=>{
      task.cancel();
      reject(new Error("Network error. Tap Retry."));
    },120000);

    progressEl.parentElement.style.display = "block";

    task.on(
      "state_changed",
      snapshot=>{
        console.log("Uploaded:", snapshot.bytesTransferred, "/", snapshot.totalBytes);

        progressEl.style.width =
          Math.round(snapshot.bytesTransferred / snapshot.totalBytes * 100) + "%";
      },
      error=>{
        clearTimeout(t);
        console.error("Upload Error:", error.code, error.message);
        reject(error);
      },
      async ()=>{
        clearTimeout(t);
        console.log("Upload complete");
        resolve(await getDownloadURL(task.snapshot.ref));
          );
  });
  }
/* File pick + preview + block HEIC */
function bindFile(input, preview, btn){
  input.addEventListener("change", ()=>{
    const file = input.files[0];
    if(!file) return;
    if(!file.type.includes("jpeg")){
      showToast("Use JPG only. Retake photo.", "bad");
      input.value = "";
      return;
    }
    preview.src = URL.createObjectURL(file);
    preview.style.display='block';
    btn.disabled = false;
    btn.textContent = "Upload & Continue";
  });
}
bindFile(frontImage, frontPreview, document.getElementById("next2"));
bindFile(backImage, backPreview, document.getElementById("next3"));
bindFile(selfieImage, selfiePreview, document.getElementById("submitKyc"));

/* Auth + Resume logic */
onAuthStateChanged(auth, async (user)=>{
  if(!user){ window.location.href="auth.html"; return; }
  uid = user.uid;
  const snap = await get(ref(db, "kyc/"+uid));
  if(snap.exists()){
    kycData = snap.val();
    if(kycData.status === "verified"){
      statusWrap.style.display='block';
      statusBadge.className='badge ok'; statusBadge.textContent='Verified';
      statusMsg.textContent='Your KYC has been approved.';
      goStep(4);
      return;
    }
    if(kycData.status === "rejected"){
      statusWrap.style.display='block';
      statusBadge.className='badge bad'; statusBadge.textContent='Rejected';
      statusMsg.textContent=kycData.reason || 'Please resubmit.';
    }
    if(kycData.status === "pending"){
      statusWrap.style.display='block';
      statusBadge.className='badge pending'; statusBadge.textContent='Pending';
      statusMsg.textContent='Under review.';
    }
    if(!kycData.fullName){ goStep(0); return; }
    if(!kycData.frontImage){ goStep(1); return; }
    if(!kycData.selfieImage){ goStep(3); return; }
    goStep(3);
  }
});

/* STEP 1: Save details */
document.getElementById("next1").addEventListener("click", async ()=>{
  if(!fullName.value.trim() ||!dob.value ||!country.value.trim() ||!idType.value ||!idNumber.value.trim()){
    return showToast("Fill all fields", "bad");
  }
  await saveProgress({
    fullName: fullName.value.trim(),
    dob: dob.value,
    country: country.value.trim(),
    idType: idType.value,
    idNumber: idNumber.value.trim(),
    status: "draft"
  });
  goStep(1);
});

/* STEP 2: Upload Front */
document.getElementById("next2").addEventListener("click", async () => {
  const file = frontImage.files[0];
  if (!file) return;

  const btn = document.getElementById("next2");
  btn.disabled = true;
  btn.textContent = "Uploading...";

  try {
    const f = await compressImage(file);
    const url = await uploadOne(`kyc/${uid}/front.jpg`, f, p1);

    await saveProgress({ frontImage: url });

    showToast("Front ID saved");
    goStep(2);

  } catch (e) {
    console.error(e);
    alert((e.code || "Error") + "\n" + e.message);

    btn.disabled = false;
    btn.textContent = "Retry Upload";
  }
});

/* STEP 3: Upload Back or Skip */
document.getElementById("next3").addEventListener("click", async ()=>{
  const file = backImage.files[0];
  const btn = document.getElementById("next3");
  if(file){
    btn.disabled=true; btn.textContent="Uploading...";
    try{
      const f = await compressImage(file);
      const url = await uploadOne(`kyc/${uid}/back.jpg`, f, p2);
      await saveProgress({backImage: url});
      showToast("Back ID saved");
    }catch(e){ showToast(e.message, "bad"); btn.disabled=false; btn.textContent="Retry Upload"; return; }
  }
  goStep(3);
});
document.getElementById("back1").onclick = ()=>goStep(0);
document.getElementById("back2").onclick = ()=>goStep(1);

/* STEP 4: Upload Selfie + Final Submit */
document.getElementById("submitKyc").addEventListener("click", async ()=>{
  const file = selfieImage.files[0];
  if(!file) return showToast("Selfie required", "bad");
  const btn = document.getElementById("submitKyc");
  btn.disabled=true; btn.textContent="Submitting...";
  try{
    const f = await compressImage(file);
    const url = await uploadOne(`kyc/${uid}/selfie.jpg`, f, p3);
    await saveProgress({
      selfieImage: url,
      status: "pending",
      submittedAt: serverTimestamp()
    });
    await update(ref(db, "users/"+uid), {kycStatus:"pending", kycSubmitted:true});
    goStep(4);
    showToast("Submitted successfully");
  }catch(e){ showToast(e.message, "bad"); btn.disabled=false; btn.textContent="Retry Submit"; }
});
document.getElementById("back3").onclick = ()=>goStep(2);
</script>
</body>
</html>
