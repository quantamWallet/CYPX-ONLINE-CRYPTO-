<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYPX KYC VERIFICATION</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f5f7fa; display: flex; justify-content: center; padding: 20px; margin: 0; }
.container { background: white; max-width: 600px; width: 100%; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    h1 { color: #0A2540; margin: 0 0 8px; font-size: 24px; }
.subtitle { color: #64748b; margin-bottom: 20px; font-size: 14px; }
.progress { background: #e2e8f0; height: 6px; border-radius: 10px; margin-bottom: 24px; overflow: hidden; }
.progress-bar { background: #00C896; height: 100%; border-radius: 10px; transition: width 0.3s ease; }
    input, button, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 15px; outline: none; }
    input:focus, select:focus { border-color: #00C896; }
    button { background: #00C896; color: white; border: none; cursor: pointer; font-weight: 600; }
    button:disabled { background: #94e2cc; cursor: not-allowed; }
    button.secondary { background: #e2e8f0; color: #0A2540; }
    button.outline { background: white; color: #00C896; border: 1px solid #00C896; }
.step { display: none; }
.step.active { display: block; }
    label { font-weight: 600; display: block; margin-top: 12px; font-size: 14px; color: #334155; }
.upload-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.preview,.camera-view { width: 100%; max-height: 240px; object-fit: cover; border-radius: 10px; margin-top: 8px; border: 1px solid #e2e8f0; background: #000; }
.file-name { font-size: 12px; color: #00C896; margin-top: 4px; }
.upload-progress { height: 4px; background: #e2e8f0; border-radius: 4px; margin-top: 4px; overflow: hidden; display: none; }
.upload-progress span { display: block; height: 100%; background: #00C896; width: 0%; transition: width.2s; }
.toast { position: fixed; top: 20px; right: 20px; background: #0A2540; color: white; padding: 14px 18px; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); transform: translateX(400px); transition: transform 0.3s ease; z-index: 9999; font-size: 14px; }
.toast.show { transform: translateX(0); }
.toast.error { background: #ef4444; }
.toast.success { background: #00C896; }
.disabled-section { opacity: 0.5; pointer-events: none; }
  </style>
</head>
<body>

<div class="container">
  <h1>CYPX KYC VERIFICATION</h1>
  <p class="subtitle">Secure. Encrypted. Takes 3 minutes.</p>

  <div class="progress"><div id="progressBar" class="progress-bar" style="width: 20%"></div></div>

  <!-- STEP 1 -->
  <div class="step active" id="step1">
    <input type="text" id="fullName" placeholder="Full Name" required>
    <input type="date" id="dob" required>
    <select id="idType" required>
      <option value="">Select ID Type</option>
      <option value="passport">Passport</option>
      <option value="national_id">National ID Card</option>
      <option value="drivers_license">Driver's License</option>
    </select>
    <input type="text" id="country" placeholder="Country" required>
    <button onclick="validateAndNext(2)">Continue</button>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="step2">
    <label>ID Front</label>
    <div class="upload-group">
      <button type="button" class="outline" id="idFrontUploadBtn" onclick="triggerUpload('idFrontUpload')">Upload</button>
      <button type="button" class="outline" id="idFrontCamBtn" onclick="openCamera('idFront')">Take Photo</button>
    </div>
    <input type="file" id="idFrontUpload" accept="image/*" style="display:none">
    <video id="idFrontCam" class="camera-view" style="display:none" autoplay playsinline muted></video>
    <canvas id="idFrontCanvas" style="display:none"></canvas>
    <img id="idFrontPreview" class="preview" style="display:none">
    <div id="idFrontName" class="file-name"></div>
    <div class="upload-progress" id="idFrontProg"><span></span></div>

    <div id="backIdSection" class="disabled-section">
      <label>ID Back</label>
      <div class="upload-group">
        <button type="button" class="outline" id="idBackUploadBtn" onclick="triggerUpload('idBackUpload')">Upload</button>
        <button type="button" class="outline" id="idBackCamBtn" onclick="openCamera('idBack')">Take Photo</button>
      </div>
      <input type="file" id="idBackUpload" accept="image/*" style="display:none">
      <video id="idBackCam" class="camera-view" style="display:none" autoplay playsinline muted></video>
      <canvas id="idBackCanvas" style="display:none"></canvas>
      <img id="idBackPreview" class="preview" style="display:none">
      <div id="idBackName" class="file-name"></div>
      <div class="upload-progress" id="idBackProg"><span></span></div>
    </div>

    <button class="secondary" onclick="nextStep(1)">Back</button>
    <button id="step2Continue" onclick="validateAndNext(3)" disabled>Upload Back to Continue</button>
  </div>

  <!-- STEP 3 -->
  <div class="step" id="step3">
    <label>Selfie</label>
    <div class="upload-group">
      <button type="button" class="outline" onclick="triggerUpload('selfieUpload')">Upload</button>
      <button type="button" class="outline" onclick="openCamera('selfie')">Take Selfie</button>
    </div>
    <input type="file" id="selfieUpload" accept="image/*" style="display:none">
    <video id="selfieCam" class="camera-view" style="display:none" autoplay playsinline muted></video>
    <canvas id="selfieCanvas" style="display:none"></canvas>
    <img id="selfiePreview" class="preview" style="display:none">
    <div id="selfieName" class="file-name"></div>
    <div class="upload-progress" id="selfieProg"><span></span></div>

    <button class="secondary" onclick="nextStep(2)">Back</button>
    <button onclick="validateAndNext(4)">Continue</button>
  </div>

  <!-- STEP 4 -->
  <div class="step" id="step4">
    <input type="text" id="address" placeholder="Home Address" required>
    <label>Proof of Address <input type="file" id="proof" accept="image/*,application/pdf"></label>
    <div class="upload-progress" id="proofProg"><span></span></div>
    <button class="secondary" onclick="nextStep(3)">Back</button>
    <button id="submitBtn" onclick="submitKYC()">Submit for Review</button>
  </div>

  <!-- STEP 5 -->
  <div class="step" id="step5">
    <h2 style="color:#00C896;">Submitted ✅</h2>
    <p>Your CYPX KYC is under review. We'll email you within 24 hours.</p>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
    authDomain: "quantum-rio.firebaseapp.com",
    projectId: "quantum-rio",
    storageBucket: "quantum-rio.firebasestorage.app",
    messagingSenderId: "805433999377",
    appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);
  let currentUser = null;
  let currentStream = null;
  const fileStore = {};
  let frontUploaded = false; // NEW: track if front is done

  onAuthStateChanged(auth, (user) => {
    if(user) currentUser = user;
    else showToast("Please login to CYPX first", "error");
  });

  let step = 1;
  window.nextStep = (n) => {
    stopCamera();
    document.getElementById(`step${step}`).classList.remove('active');
    step = n;
    document.getElementById(`step${step}`).classList.add('active');
    document.getElementById('progressBar').style.width = `${step*20}%`;
    window.scrollTo(0,0);
  }

  window.triggerUpload = (id) => {
    document.getElementById(id).value = '';
    document.getElementById(id).click();
  }

  window.openCamera = async (target) => {
    if(!window.isSecureContext) return showToast("Camera only works on HTTPS or localhost", "error");
    stopCamera();
    const video = document.getElementById(target + 'Cam');
    video.style.display = 'block';
    try {
      const constraints = { video: { facingMode: target === 'selfie'? 'user' : 'environment' } };
      currentStream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = currentStream;
      await video.play();
      const btn = document.createElement('button');
      btn.innerText = 'Capture Photo';
      btn.onclick = () => capturePhoto(target);
      btn.id = target + 'CaptureBtn';
      btn.style.marginTop = '10px';
      video.after(btn);
    } catch(e) {
      showToast("Camera error: " + e.message, "error");
    }
  }

  function stopCamera(){
    if(currentStream) currentStream.getTracks().forEach(track => track.stop());
    currentStream = null;
    document.querySelectorAll('video').forEach(v => { v.style.display = 'none'; v.srcObject = null; });
    document.querySelectorAll('[id$="CaptureBtn"]').forEach(b => b.remove());
  }

  function capturePhoto(target){
    const video = document.getElementById(target + 'Cam');
    const canvas = document.getElementById(target + 'Canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    canvas.toBlob(blob => {
      const file = new File(, `${target}.jpg`, { type: "image/jpeg" });
      setFile(target, file);
      stopCamera();
      showToast("Photo captured", "success");
    }, 'image/jpeg', 0.8);
  }

  function setFile(baseId, file){
    fileStore[baseId] = file;
    document.getElementById(baseId + 'Preview').src = URL.createObjectURL(file);
    document.getElementById(baseId + 'Preview').style.display = 'block';
    document.getElementById(baseId + 'Name').innerText = `Selected: ${(file.size/1024/1024).toFixed(2)}MB`;

    // NEW: Auto upload front when selected
    if(baseId === 'idFront') handleFrontUpload(file);
    if(baseId === 'idBack') handleBackUpload(file);
  }

  ['idFrontUpload','idBackUpload','selfieUpload'].forEach(id => {
    document.getElementById(id).addEventListener('change', (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const baseId = id.replace('Upload','');
      setFile(baseId, file);
    })
  });

  // NEW: Upload Front immediately and unlock Back
  async function handleFrontUpload(file) {
    const btn1 = document.getElementById('idFrontUploadBtn');
    const btn2 = document.getElementById('idFrontCamBtn');
    btn1.disabled = true; btn2.disabled = true;
    btn1.innerText = "Uploading...";

    try {
      const url = await uploadFile(file, 'idFront', document.getElementById('idFrontProg'));
      fileStore.idFrontUrl = url;
      frontUploaded = true;
      showToast("Front ID uploaded", "success");

      // Unlock Back ID section
      document.getElementById('backIdSection').classList.remove('disabled-section');
      document.getElementById('step2Continue').innerText = "Continue";
      document.getElementById('step2Continue').disabled = true; // still need back
    } catch(e) {
      showToast(e.message, "error");
      btn1.disabled = false; btn2.disabled = false;
      btn1.innerText = "Upload";
    }
  }

  // NEW: Upload Back immediately
  async function handleBackUpload(file) {
    const btn1 = document.getElementById('idBackUploadBtn');
    const btn2 = document.getElementById('idBackCamBtn');
    btn1.disabled = true; btn2.disabled = true;
    btn1.innerText = "Uploading...";

    try {
      const url = await uploadFile(file, 'idBack', document.getElementById('idBackProg'));
      fileStore.idBackUrl = url;
      showToast("Back ID uploaded", "success");
      document.getElementById('step2Continue').disabled = false;
    } catch(e) {
      showToast(e.message, "error");
      btn1.disabled = false; btn2.disabled = false;
      btn1.innerText = "Upload";
    }
  }

  window.validateAndNext = (n) => {
    if(step === 1 &&!document.getElementById('idType').value)
      return showToast("Please select ID Type", "error");
    if(step === 2 && (!fileStore.idFrontUrl ||!fileStore.idBackUrl))
      return showToast("Please upload both ID Front and Back", "error");
    if(step === 3 &&!fileStore.selfie)
      return showToast("Please upload a selfie", "error");
    const inputs = document.getElementById(`step${step}`).querySelectorAll('input[required]');
    for(let input of inputs){ if(!input.value) return showToast("Please fill all required fields", "error"); }
    nextStep(n);
  }

  function showToast(message, type = "info"){
    const toast = document.getElementById('toast');
    toast.className = `toast ${type} show`;
    toast.innerText = message;
    setTimeout(() => toast.classList.remove('show'), 4000);
  }

  async function compressImage(file) {
    if(file.type === "application/pdf" || file.size < 500*1024) return file;
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = (event) => {
        const img = new Image();
        img.src = event.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          let maxW = 1200;
          let scale = maxW / img.width;
          canvas.width = maxW;
          canvas.height = img.height * scale;
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          canvas.toBlob((blob) => {
            resolve(new File(, file.name.replace(/\..+$/,'') + '.jpg', { type: "image/jpeg" }));
          }, "image/jpeg", 0.65);
        }
      }
    });
  }

  async function uploadFile(file, name, progEl) {
    const compressed = await compressImage(file);
    const storageRef = ref(storage, `kyc/${currentUser.uid}/${name}_${Date.now()}.jpg`);
    const task = uploadBytesResumable(storageRef, compressed);

    progEl.style.display = 'block';

    return new Promise((resolve, reject) => {
      task.on('state_changed',
        (snap) => {
          const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100);
          progEl.querySelector('span').style.width = pct + '%';
        },
        (error) => {
          let msg = "Upload failed";
          if(error.code === 'storage/unauthorized') msg = "Permission denied. Check Storage Rules.";
          if(error.code === 'storage/unknown') msg = "Network lost. Please use WiFi and retry.";
          reject(new Error(msg));
        },
        async () => {
          resolve(await getDownloadURL(task.snapshot.ref));
        }
      );
    });
  }

  window.submitKYC = async () => {
    if(!currentUser) return showToast("Login first", "error");
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerText = "Submitting... 0%";

    try {
      const urls = {
        idFront: fileStore.idFrontUrl,
        idBack: fileStore.idBackUrl
      };

      // Upload selfie now
      if(fileStore.selfie){
        urls.selfie = await uploadFile(fileStore.selfie, 'selfie', document.getElementById('selfieProg'));
        btn.innerText = `Submitting... 50%`;
      }

      const proofFile = document.getElementById('proof').files[0];
      if(proofFile) {
        urls.proof = await uploadFile(proofFile, 'proof', document.getElementById('proofProg'));
        btn.innerText = `Submitting... 75%`;
      }

      await setDoc(doc(db, "kyc_submissions", currentUser.uid), {
        fullName: document.getElementById('fullName').value.trim(),
        dob: document.getElementById('dob').value,
        idType: document.getElementById('idType').value,
        country: document.getElementById('country').value.trim(),
        address: document.getElementById('address').value.trim(),
     ...urls,
        status: "pending",
        email: currentUser.email,
        createdAt: serverTimestamp()
      });

      showToast("KYC submitted successfully", "success");
      nextStep(5);
    } catch(e) {
      showToast(e.message, "error");
      btn.disabled = false;
      btn.innerText = "Submit for Review";
    }
  }
</script>

</body>
</html>
