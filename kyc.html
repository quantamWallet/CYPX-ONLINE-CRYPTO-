<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYPX KYC Verification</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f7fa; display: flex; justify-content: center; padding: 20px; }
   .container { background: white; max-width: 600px; width: 100%; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { color: #0A2540; }
   .progress { background: #e0e0e0; height: 8px; border-radius: 10px; margin-bottom: 20px; }
   .progress-bar { background: #00C896; height: 8px; border-radius: 10px; transition: width 0.3s; }
    input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    button { background: #00C896; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:disabled { background: #ccc; }
   .step { display: none; }
   .step.active { display: block; }
    label { font-weight: bold; display: block; margin-top: 10px; }
  </style>
</head>
<body>

<div class="container">
  <h1>CYPX Identity Verification</h1>
  <p>Secure. Encrypted. Takes 3 minutes.</p>

  <div class="progress"><div id="progressBar" class="progress-bar" style="width: 20%"></div></div>

  <!-- STEP 1 -->
  <div class="step active" id="step1">
    <input type="text" id="fullName" placeholder="Full Name" required>
    <input type="date" id="dob" required>
    <input type="text" id="country" placeholder="Country" required>
    <button onclick="nextStep(2)">Continue</button>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="step2">
    <label>ID Front <input type="file" id="idFront" accept="image/*"></label>
    <label>ID Back <input type="file" id="idBack" accept="image/*"></label>
    <button onclick="nextStep(3)">Continue</button>
  </div>

  <!-- STEP 3 -->
  <div class="step" id="step3">
    <label>Selfie <input type="file" id="selfie" accept="image/*" capture="user"></label>
    <button onclick="nextStep(4)">Continue</button>
  </div>

  <!-- STEP 4 -->
  <div class="step" id="step4">
    <input type="text" id="address" placeholder="Home Address" required>
    <label>Proof of Address <input type="file" id="proof" accept="image/*,application/pdf"></label>
    <button id="submitBtn" onclick="submitKYC()">Submit for Review</button>
  </div>

  <!-- STEP 5 -->
  <div class="step" id="step5">
    <h2 style="color:green;">Submitted ✅</h2>
    <p>Your CYPX KYC is under review. We'll email you within 24 hours.</p>
  </div>
</div>

<!-- FIREBASE SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

  // TODO: REPLACE WITH YOUR CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
    authDomain: "quantum-rio.firebaseapp.com",
    projectId: "quantum-rio",
    storageBucket: "quantum-rio.firebasestorage.app",
    messagingSenderId: "805433999377",
    appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);
  let currentUser = null;

  onAuthStateChanged(auth, (user) => {
    if(user) currentUser = user;
    else alert("Please login to CYPX first");
  });

  let step = 1;
  window.nextStep = (n) => {
    document.getElementById(`step${step}`).classList.remove('active');
    step = n;
    document.getElementById(`step${step}`).classList.add('active');
    document.getElementById('progressBar').style.width = `${step*20}%`;
  }

  async function uploadFile(file, name) {
    const storageRef = ref(storage, `kyc/${currentUser.uid}/${name}_${Date.now()}`);
    await uploadBytes(storageRef, file);
    return await getDownloadURL(storageRef);
  }

  window.submitKYC = async () => {
    if(!currentUser) return alert("Login first");
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').innerText = "Submitting...";

    try {
      const urls = {};
      const files = ['idFront','idBack','selfie','proof'];
      for(let f of files){
        const file = document.getElementById(f).files[0];
        if(file) urls[f] = await uploadFile(file, f);
      }

      await setDoc(doc(db, "kyc_submissions", currentUser.uid), {
        fullName: document.getElementById('fullName').value,
        dob: document.getElementById('dob').value,
        country: document.getElementById('country').value,
        address: document.getElementById('address').value,
       ...urls,
        status: "pending",
        email: currentUser.email,
        createdAt: serverTimestamp()
      });

      nextStep(5);
    } catch(e) {
      alert("Error: " + e.message);
    }
  }
</script>

</body>
</html>
