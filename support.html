<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CYPX Support</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:linear-gradient(160deg,#050e1a 0%,#001f3f 100%);color:#fff;font-family:'Segoe UI',Arial;margin:0;display:flex;flex-direction:column;height:100vh;padding-bottom:70px;}

/* HEADER */
header{
  background:rgba(0,47,108,0.85);backdrop-filter:blur(10px);
  padding:15px 18px;text-align:center;font-weight:800;position:sticky;top:0;z-index:10;
  display:flex;align-items:center;justify-content:center;gap:10px;border-bottom:1px solid rgba(0,212,255,0.2);
}
.online-dot{width:9px;height:9px;background:#25d366;border-radius:50%;box-shadow:0 0 10px #25d366;animation:pulse 2s infinite;}
.offline-dot{background:#888;box-shadow:none;animation:none;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.2);}}

/* CHAT */
.chat-box{flex:1;overflow-y:auto;padding:15px;background:rgba(0,0,0,0.15);padding-bottom:90px;}
.msg{margin:10px 0;padding:13px 16px;border-radius:18px;max-width:80%;word-wrap:break-word;font-size:14px;line-height:1.5;animation:fadeIn 0.3s;position:relative;}
.user{background:linear-gradient(135deg,#00d4ff,#0099cc);color:#000;margin-left:auto;border-bottom-right-radius:4px;font-weight:500;}
.admin{background:rgba(42,42,42,0.8);color:#fff;margin-right:auto;border-bottom-left-radius:4px;border:1px solid rgba(255,255,255,0.1);}
.time{font-size:10px;color:#aaa;margin-top:5px;opacity:0.8;text-align:right;}
@keyframes fadeIn {from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)}}

/* TYPING */
.typing-indicator{display:flex;align-items:center;gap:6px;padding:10px 16px;background:rgba(42,42,42,0.8);border-radius:18px;width:fit-content;margin:8px 0;border-bottom-left-radius:4px;border:1px solid rgba(255,255,255,0.1);display:none;}
.typing-indicator i{color:#00d4ff;font-size:12px;}
.typing-dots{display:flex;gap:4px;}
.typing-dots span{width:6px;height:6px;background:#00d4ff;border-radius:50%;animation:typing 1.4s infinite;}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes typing{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

/* INPUT */
.input-box{
  display:flex;gap:10px;padding:12px 15px;background:rgba(0,26,51,0.9);backdrop-filter:blur(10px);
  position:fixed;bottom:0;left:0;right:0;border-top:1px solid rgba(0,212,255,0.3);z-index:100;
}
.input-box input{flex:1;padding:14px;border-radius:25px;border:1px solid rgba(255,255,255,0.1);background:#0b1b2d;color:#fff;outline:none;font-size:15px;}
.input-box input:focus{border-color:#00d4ff;}
.input-box button{width:50px;height:50px;border:none;border-radius:50%;background:linear-gradient(135deg,#00d4ff,#0099cc);color:#000;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:0.2s;}
.input-box button:hover{transform:scale(1.1);box-shadow:0 0 15px rgba(0,212,255,0.5);}

/* UNREAD BADGE ON TITLE */
.title-badge{background:red;color:#fff;font-size:11px;padding:2px 6px;border-radius:10px;margin-left:6px;font-weight:800;}
</style>
</head>
<body>
<header>
  <i class="fas fa-headset"></i> CYPX Live Support 
  <div class="online-dot offline-dot" id="adminStatus"></div>
  <span id="unreadBadge" class="title-badge" style="display:none;">0</span>
</header>

<div class="chat-box" id="chatBox">
  <div class="typing-indicator" id="typingIndicator">
    <i class="fas fa-user-shield"></i>
    <span>Admin is typing</span>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>
</div>

<div class="input-box">
  <input type="text" id="msgInput" placeholder="Type your message...">
  <button onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-compat.js"></script>
<script>
const firebaseConfig = {  
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",  
  authDomain: "quantum-rio.firebaseapp.com",  
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",  
  projectId: "quantum-rio",  
  storageBucket: "quantum-rio.firebasestorage.app",  
  messagingSenderId: "805433999377",  
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",  
  measurementId: "G-4RSQXZJX44"  
};  
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
const chatBox = document.getElementById('chatBox');
const msgInput = document.getElementById('msgInput');
let unreadCount = 0;
let lastMessageCount = 0;

auth.onAuthStateChanged(user=>{
  if(!user) location.href="auth.html";
  const chatRef = db.ref("support_chats/"+user.uid);
  const typingRef = db.ref("support_typing/"+user.uid); // NEW: for typing indicator
  const adminStatusRef = db.ref("support_admin_status/"+user.uid); // NEW: for online status
  
  // 1. CHECK IF FIRST TIME AND SEND WELCOME - LOGIC UNCHANGED
  chatRef.once("value").then(snap=>{
    if(!snap.exists()){
      chatRef.push({
        sender: "admin",
        message: "Hi there! I’m Cyra, your Cypx assistant. How can I help you today with investments, Deposits, Withdrawals,Copy Trading, support or other questions?",
        timestamp: Date.now(),
        read: true
      });
    }
  });

  // 2. ADMIN ONLINE STATUS
  adminStatusRef.on("value", snap=>{
    const statusDot = document.getElementById('adminStatus');
    if(snap.val() === "online"){
      statusDot.classList.remove("offline-dot");
    } else {
      statusDot.classList.add("offline-dot");
    }
  });

  // 3. ADMIN TYPING INDICATOR
  typingRef.on("value", snap=>{
    const typingDiv = document.getElementById('typingIndicator');
    if(snap.val() === true){
      typingDiv.style.display = "flex";
      chatBox.scrollTop = chatBox.scrollHeight;
    } else {
      typingDiv.style.display = "none";
    }
  });

  // 4. LISTEN FOR MESSAGES - LOGIC UNCHANGED
  chatRef.on("value", snap=>{
    chatBox.innerHTML="";
    let msgCount = 0;
    snap.forEach(child=>{
      msgCount++;
      const m = child.val();
      const div = document.createElement("div");
      div.className = "msg " + m.sender; // will be "msg user" or "msg admin"
      const time = new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      div.innerHTML = `${m.message}<div class="time">${time}</div>`;
      chatBox.appendChild(div);

      // UNREAD BADGE LOGIC: count admin messages not read by user
      if(m.sender === "admin" && !m.read){
        unreadCount++;
      }
    });
    
    // Show badge if new admin messages
    if(msgCount > lastMessageCount && unreadCount > 0){
      document.getElementById('unreadBadge').style.display = "inline-block";
      document.getElementById('unreadBadge').textContent = unreadCount;
      document.title = `(${unreadCount}) CYPX Support`; // badge on browser tab
    }
    lastMessageCount = msgCount;

    chatBox.appendChild(document.getElementById('typingIndicator')); // keep typing at bottom
    chatBox.scrollTop = chatBox.scrollHeight;

    // Mark admin messages as read
    snap.forEach(child=>{
      const m = child.val();
      if(m.sender === "admin" && !m.read){
        db.ref(`support_chats/${user.uid}/${child.key}/read`).set(true);
        unreadCount = 0;
        document.getElementById('unreadBadge').style.display = "none";
        document.title = "CYPX Support";
      }
    });
  });

  window.sendMsg = ()=>{
    const text = msgInput.value.trim();
    if(!text) return;
    chatRef.push({
      sender: "user",
      message: text,
      timestamp: Date.now(),
      read: false
    });
    msgInput.value="";
  }

  // USER TYPING - tell admin
  let typingTimeout;
  msgInput.addEventListener("input", ()=>{
    db.ref(`support_typing_user/${user.uid}`).set(true);
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(()=>{ db.ref(`support_typing_user/${user.uid}`).set(false); }, 2000);
  });

  msgInput.addEventListener("keypress", e=>{ if(e.key==="Enter") sendMsg() })
})
</script>
  </body>
</html>
