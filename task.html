    minimumFractionDigits: 2,
    maximumFractionDigits: 2

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(180deg,#000814,#001f3f);
  color:white;
}

.header {
  background: linear-gradient(90deg,#001d3d,#003566);
  padding:15px;
  text-align:center;
  font-weight:bold;
  font-size:20px;
}

/* SUMMARY */
.task-summary {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:10px;
}

.task-summary div {
  flex:1;
  min-width:120px;
  text-align:center;
  padding:12px;
  border-radius:12px;
  background:linear-gradient(135deg,#002f6c,#004080);
}

.task-summary span {
  display:block;
  font-size:18px;
  font-weight:bold;
  color:#00e5ff;
}

/* CARD */
.card {
  background: linear-gradient(145deg,#061a33,#0f3b6d);
  margin:12px;
  padding:16px;
  border-radius:14px;
  box-shadow:0 0 20px rgba(0,229,255,0.1);
}

.card h3 {
  margin-bottom:10px;
  color:#00e5ff;
}

/* VIP BADGES */
#vip-levels span {
  display:inline-block;
  background:rgba(0,229,255,0.15);
  padding:6px 12px;
  border-radius:10px;
  margin:4px;
}

/* EARNINGS ITEM */
.earning-item {
  background:rgba(0,0,0,0.25);
  padding:12px;
  border-radius:10px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.vip-tag {
  background:linear-gradient(90deg,#ffd633,#ffb400);
  color:#111;
  padding:4px 10px;
  border-radius:6px;
  font-weight:bold;
}

.amount {
  color:#00ffcc;
  font-weight:bold;
}

.empty {
  text-align:center;
  opacity:0.6;
  padding:15px;
}

/* NAV */
nav {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#002244;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

nav a {
  color:white;
  text-decoration:none;
  text-align:center;
}

nav i { font-size:20px; }
</style>

<body>

<div class="header">CYPX TASK CENTER</div>

<!-- SUMMARY -->
<div class="task-summary">
  <div><span id="total-tasks">0</span>Total</div>
  <div><span id="remaining-tasks">0</span>Remaining</div>
  <div><span id="in-progress">0</span>In Progress</div>
  <div><span id="completed">0</span>Completed</div>
</div>

<!-- BONUS -->
<div class="card">
  <h3>Bonus Status</h3>
  <div id="bonus-status"></div>
</div>

<!-- VIP -->
<div class="card">
  <h3>Unlocked VIP Levels</h3>
  <div id="vip-levels"></div>
</div>

<!-- EARNINGS -->
<div class="card">
  <h3>VIP Earnings</h3>
  <div id="earnings-list"></div>
  <div id="total-earnings" style="margin-top:10px;font-weight:bold;"></div>
</div>

<nav>
  <a href="dashboard.html"><i class="fas fa-home"></i><br>Home</a>
  <a href="task.html"><i class="fas fa-tasks"></i><br>Task</a>
  <a href="team.html"><i class="fas fa-users"></i><br>Team</a>
  <a href="vip.html"><i class="fas fa-crown"></i><br>VIP</a>
  <a href="profile.html"><i class="fas fa-user"></i><br>Me</a>
</nav>

<script>
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "landing.html";
    return;
  }

  const uid = user.uid;

  const vipRef = db.ref("users/" + uid + "/vipLevels");
  const dashboardRef = db.ref("users/" + uid + "/dashboard/vipEarnings");
  const oldClaimsRef = db.ref("users/" + uid + "/vipClaims");
  const bonusRef = db.ref("users/" + uid + "/hasClaimedBonus");

  // ✅ MATCH EXACT VIP PAGE PROFITS
  const vipRates = {
    1:200,2:450,3:750,4:1350,5:2000,
    6:3000,7:5200,8:8400,9:14250,10:20000,
    11:31500,12:42750,13:60000,14:73500,15:110000
  };

  const totalVipLevels = 15;
  let unlockedLevels = [];
  let vipData = {};
  let dashboardData = {};
  let oldClaims = {};

  // BONUS
  bonusRef.on("value", snap => {
    const claimed = snap.val();
    document.getElementById("bonus-status").innerHTML =
      claimed
      ? `<span style="color:#00ff88">Claimed</span>`
      : `<span style="color:#ffcc00">Not Claimed</span>`;
  });

  // LOAD VIP DATA
  vipRef.on("value", snap => {
    vipData = snap.val() || {};
    unlockedLevels = Object.keys(vipData).map(Number);

    let completed = 0;
    let inProgress = 0;

    unlockedLevels.forEach(lvl => {
      const d = vipData[lvl] || {};
      if ((d.claims || 0) >= 12) completed++;
      else inProgress++;
    });

    document.getElementById("total-tasks").textContent = totalVipLevels;
    document.getElementById("remaining-tasks").textContent = totalVipLevels - unlockedLevels.length;
    document.getElementById("completed").textContent = completed;
    document.getElementById("in-progress").textContent = inProgress;

    // VIP BADGES
    const vipBox = document.getElementById("vip-levels");
    vipBox.innerHTML = "";

    if (unlockedLevels.length === 0) {
      vipBox.innerHTML = `<div class="empty">No VIP unlocked yet</div>`;
      return;
    }

    unlockedLevels.sort((a,b)=>a-b).forEach(lvl=>{
      const span=document.createElement("span");
      span.textContent="VIP "+lvl;
      vipBox.appendChild(span);
    });

    renderEarnings();
  });

  // DASHBOARD DATA
  dashboardRef.on("value", snap => {
    dashboardData = snap.val() || {};
    renderEarnings();
  });

  // OLD CLAIMS DATA
  oldClaimsRef.on("value", snap => {
    oldClaims = snap.val() || {};
    renderEarnings();
  });

  // 🔥 MAIN RENDER FUNCTION
  function renderEarnings(){
    const list = document.getElementById("earnings-list");

    list.innerHTML = "";
    let total = 0;

    if (unlockedLevels.length === 0) {
      list.innerHTML = `<div class="empty">No VIP unlocked yet</div>`;
      document.getElementById("total-earnings").textContent = "";
      return;
    }

    unlockedLevels.forEach(level => {

      // ✅ PRIORITY SYSTEM
      let days = 0;

      // 1. New system (vipLevels)
      if (vipData[level]?.claims) {
        days = Number(vipData[level].claims);
      }

      // 2. Dashboard fallback
      else if (dashboardData[level]?.daysClaimed) {
        days = Number(dashboardData[level].daysClaimed);
      }

      // 3. Old system fallback
      else if (oldClaims[level]?.daysClaimed) {
        days = Number(oldClaims[level].daysClaimed);
      }

      const perDay = vipRates[level] || 0;
      const earned = days * perDay;

      total += earned;

      const item = document.createElement("div");
      item.className = "earning-item";

      item.innerHTML = `
        <div class="vip-tag">VIP ${level}</div>
        <div>${days}d</div>
        <div class="amount">KSh ${formatMoney(earned)}</div>
      `;

      list.appendChild(item);
    });

    document.getElementById("total-earnings").textContent =
      "Total Earnings: KSh " + formatMoney(total);
  }

});
</script>

</body>
  </html>
