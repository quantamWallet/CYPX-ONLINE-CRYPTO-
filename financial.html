<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Financial Records - CYPX HOLDINGS</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#020b16;--bg2:#0a1f35;--card:#0f2b4a;--gold:#d4af37;--gold2:#f5d06f;
  --accent:#00d4ff;--success:#1fbf75;--danger:#ff4d4d;--pending:#ff9800;
  --text:#ffffff;--muted:#a8c6e0;--radius:18px;
}
body{margin:0;font-family:'Poppins',Arial, sans-serif;background: radial-gradient(circle at 20% 20%, rgba(212,175,55,.10), transparent 30%),radial-gradient(circle at 80% 80%, rgba(0,212,255,.12), transparent 30%),linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text);padding-bottom:100px;}
header{background:linear-gradient(90deg,#082041,#103b72,#082041);padding:18px;text-align:center;font-weight:700;font-size:20px;letter-spacing:.6px;border-bottom:1px solid rgba(212,175,55,.25);box-shadow:0 6px 30px rgba(0,0,0,.35);}
header i{margin-right:8px;color:var(--gold2);}
.tabs{display:flex;background:rgba(10,31,53,.8);backdrop-filter:blur(10px);border-bottom:1px solid rgba(212,175,55,.15);}
.tab{flex:1;padding:14px;text-align:center;cursor:pointer;font-weight:600;font-size:14px;color:var(--muted);border-bottom:3px solid transparent;transition:.25s;}
.tab.active{color:var(--gold2);border-bottom:3px solid var(--gold);}
.record-list{padding:18px;max-width:650px;margin:0 auto;}
.record-item{background:linear-gradient(145deg,rgba(15,43,74,.95),rgba(9,28,52,.98));border:1px solid rgba(212,175,55,.15);border-radius:var(--radius);padding:18px;margin-bottom:16px;box-shadow:0 12px 30px rgba(0,0,0,0.5);transition:.25s;}
.record-item:hover{transform:translateY(-3px);border-color:rgba(212,175,55,.3);}
.record-type{font-weight:700;font-size:16px;color:var(--gold2);display:flex;align-items:center;gap:8px;}
.record-item p{margin:8px 0;font-size:14px;color:var(--muted);}
.record-item p strong{color:#fff;}
.badge{display:inline-block;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-top:10px;letter-spacing:.3px;}
.badge.pending{background:rgba(255,152,0,.2);color:var(--pending);border:1px solid var(--pending);}
.badge.completed,.badge.approved{background:rgba(31,191,117,.2);color:var(--success);border:1px solid var(--success);}
.badge.failed,.badge.rejected{background:rgba(255,77,77,.2);color:var(--danger);border:1px solid var(--danger);}
.no-records{text-align:center;margin-top:40px;color:var(--muted);font-size:14px;}
.footer-card{background:linear-gradient(145deg,rgba(2,43,92,.8),rgba(0,31,63,.9));margin:20px 15px;padding:15px;border-radius:12px;text-align:center;font-size:13px;color:#7a91a8;border:1px solid rgba(212,175,55,.1);}
nav{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(180deg,#0b2347,#07182f);display:flex;justify-content:space-around;padding:10px 0;border-top:1px solid rgba(212,175,55,.18);backdrop-filter:blur(14px);}
nav a{color:#dce7f7;text-decoration:none;text-align:center;font-size:12px;font-weight:600;transition:.25s;}
nav a:hover{color:var(--gold2);}
nav i{font-size:20px;display:block;margin-bottom:4px;}

/* POPUP */
.popup{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);min-width:320px;max-width:90%;padding:24px 20px;border-radius:20px;z-index:9999;display:none;text-align:center;font-weight:600;line-height:1.6;backdrop-filter:blur(16px);box-shadow:0 20px 50px rgba(0,0,0,.5);animation:popupFade .25s ease;}
.popup.success{background:linear-gradient(145deg,rgba(18,87,48,.95),rgba(10,55,29,.96));border:1px solid rgba(78,255,144,.22);color:#d7ffe7;}
.popup.error{background:linear-gradient(145deg,rgba(90,22,22,.95),rgba(55,12,12,.96));border:1px solid rgba(255,90,90,.20);color:#ffe1e1;}
@keyframes popupFade{from{opacity:0;transform:translate(-50%,-45%);}to{opacity:1;transform:translate(-50%,-50%);}}

/* PERFECT TICK ANIMATION */
.tick{width:80px;height:80px;border-radius:50%;border:4px solid var(--success);margin:0 auto 14px;position:relative;animation:scaleIn .4s ease;box-sizing:border-box;}
.tick::after{content:"";position:absolute;left:22px;top:40px;width:16px;height:4px;background:var(--success);transform:rotate(45deg);border-radius:2px;animation:drawCheck .3s .2s forwards;opacity:0;}
.tick::before{content:"";position:absolute;left:32px;top:30px;width:4px;height:24px;background:var(--success);transform:rotate(-45deg);border-radius:2px;animation:drawCheck .3s .4s forwards;opacity:0;}
@keyframes scaleIn{0%{transform:scale(0)}100%{transform:scale(1)}}
@keyframes drawCheck{to{opacity:1}}
</style>
</head>

<body>

<header><i class="fas fa-chart-line"></i> Financial Records</header>

<div class="tabs">
  <div class="tab active" data-filter="all">All</div>
  <div class="tab" data-filter="deposit">Deposits</div>
  <div class="tab" data-filter="withdrawal">Withdrawals</div>
</div>

<div class="record-list" id="record-list"><p class="no-records">Loading transactions...</p></div>

<div class="footer-card">© 2026 CYPX HOLDINGS — Secure Financial System</div>

<nav>
  <a href="dashboard.html"><i class="fas fa-home"></i><br>Home</a>
  <a href="task.html"><i class="fas fa-tasks"></i><br>Task</a>
  <a href="team.html"><i class="fas fa-users"></i><br>Team</a>
  <a href="vip.html"><i class="fas fa-crown"></i><br>VIP</a>
  <a href="profile.html"><i class="fas fa-user"></i><br>Me</a>
</nav>

<div id="popup" class="popup"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.firebasestorage.app",
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
  measurementId: "G-4RSQXZJX44"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const listContainer = document.getElementById("record-list");
const popup = document.getElementById("popup");
const tabs = document.querySelectorAll(".tab");

let deposits = [];
let withdrawals = [];
let purchases = [];

// LOCALSTORAGE TO REMEMBER SHOWN POPUPS FOREVER
function getShownAlerts(){
  return new Set(JSON.parse(localStorage.getItem('cypx_shownAlerts') || '[]'));
}
function saveShownAlert(id){
  const shown = getShownAlerts();
  shown.add(id);
  localStorage.setItem('cypx_shownAlerts', JSON.stringify([...shown]));
}

function showPopup(msg, type = 'success', timeout = 3500) {
  popup.innerHTML = msg;
  popup.className = 'popup ' + type;
  popup.style.display = 'block';
  setTimeout(() => popup.style.display = 'none', timeout);
}

function renderRecords(filter = "all") {
  listContainer.innerHTML = "";
  let all = [...deposits, ...withdrawals, ...purchases];
  all = all.sort((a, b) => Number(b.createdAt || 0) - Number(a.createdAt || 0));

  if (filter !== "all") {
    all = all.filter(r => r.type.toLowerCase() === filter);
  }

  if (all.length === 0) {
    listContainer.innerHTML = '<p class="no-records">No transactions found.</p>';
    return;
  }

  all.forEach(r => {
    const div = document.createElement("div");
    div.className = "record-item";
    const icon = r.type === "Deposit" ? "fa-arrow-down" : r.type === "Withdrawal" ? "fa-arrow-up" : "fa-users";
    
    div.innerHTML = `
      <p class="record-type"><i class="fa-solid ${icon}"></i> ${r.type}</p>
      <p><strong>Amount:</strong> $${parseFloat(r.amount || 0).toLocaleString("en-US", {minimumFractionDigits: 2, maximumFractionDigits: 2})}</p>
      <p><strong>Method:</strong> ${r.method}</p>
      <p><strong>Date:</strong> ${new Date(r.createdAt).toLocaleString()}</p>
      <span class="badge ${(r.status || "pending").toLowerCase()}">${r.status || "pending"}</span>
    `;
    listContainer.appendChild(div);
  });
}

function checkAndShowAlerts() {
  let all = [...deposits, ...withdrawals, ...purchases];
  all.sort((a,b)=> b.createdAt - a.createdAt);
  const shown = getShownAlerts();
  
  // Check latest 5 transactions
  all.slice(0,5).forEach(r => {
    const id = r.id;
    if(shown.has(id)) return; // already shown this one
    
    const status = (r.status || "").toLowerCase();
    
    // PENDING = Submitted
    if(status === "pending"){
      saveShownAlert(id);
      showPopup(`<b><i class="fa fa-clock"></i> ${r.type} Submitted</b><br>$${parseFloat(r.amount).toFixed(2)} - Waiting for approval.`, "success");
    }
    // COMPLETED
    else if(status === "completed" || status === "approved"){
      saveShownAlert(id);
      showPopup(`<div class="tick"></div><b>${r.type} Successful</b><br>$${parseFloat(r.amount).toFixed(2)} has been ${r.type === "Deposit" ? "credited to your account" : "sent"}.`, "success");
    }
    // REJECTED
    else if(status === "rejected" || status === "failed"){
      saveShownAlert(id);
      showPopup(`<b><i class="fa fa-times-circle"></i> ${r.type} Rejected</b><br>$${parseFloat(r.amount).toFixed(2)} was not processed. Please contact support.`, "error");
    }
  });
}

auth.onAuthStateChanged(user => {
  if (!user) {
    listContainer.innerHTML = '<p class="no-records">Login required.</p>';
    return;
  }
  const uid = user.uid;

  /* DEPOSITS */
  db.ref("deposits/" + uid).on("value", snap => {
    deposits = [];
    snap.forEach(child => {
      const d = child.val();
      deposits.push({
        id: child.key,
        type: "Deposit",
        amount: d.amount || 0,
        method: d.method || "-",
        status: d.status || "pending",
        createdAt: Number(d.timestamp || d.createdAt || 0)
      });
    });
    renderRecords(document.querySelector(".tab.active").dataset.filter);
    checkAndShowAlerts();
  });

  /* WITHDRAWALS */
  db.ref("withdrawals/" + uid).on("value", snap => {
    withdrawals = [];
    snap.forEach(child => {
      const w = child.val();
      let status = "pending";
      if (w.status) {
        status = String(w.status).trim().toLowerCase();
        if (status === "approved") status = "completed";
        if (status === "declined") status = "failed";
      }
      withdrawals.push({
        id: child.key,
        type: "Withdrawal",
        amount: w.amount || 0,
        method: w.method || "-",
        status: status,
        createdAt: Number(w.timestamp || 0)
      });
    });
    renderRecords(document.querySelector(".tab.active").dataset.filter);
    checkAndShowAlerts();
  });

  /* REFERRAL PURCHASES */
  db.ref("referralPurchases/" + uid).on("value", snap => {
    purchases = [];
    snap.forEach(child => {
      const p = child.val();
      purchases.push({
        id: child.key,
        type: "Deposit",
        amount: p.amount || p.price || 0,
        method: "Referral purchase " + (p.group || ""),
        status: p.status || "pending",
        createdAt: Number(p.createdAt || 0)
      });
    });
    renderRecords(document.querySelector(".tab.active").dataset.filter);
    checkAndShowAlerts();
  });
});

tabs.forEach(tab => {
  tab.onclick = () => {
    document.querySelector(".tab.active").classList.remove("active");
    tab.classList.add("active");
    renderRecords(tab.dataset.filter);
  };
});
</script>
<script src="js/app-back.js"></script>
</body>
    </html>
