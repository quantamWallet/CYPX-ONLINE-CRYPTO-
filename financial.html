<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Financial Records - CYPX ONLINE CRYPTO</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background: radial-gradient(circle at top, #003366, #001f3f);
  color:white;
  padding-bottom:100px; /* space for nav */
}

/* HEADER */
header{
  background:linear-gradient(90deg,#002f6c,#004aad);
  padding:18px;
  text-align:center;
  font-weight:bold;
  font-size:20px;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
}

/* TABS */
.tabs{
  display:flex;
  background:#002244;
}
.tab{
  flex:1;
  padding:12px;
  text-align:center;
  cursor:pointer;
  font-weight:bold;
  border-bottom:2px solid transparent;
}
.tab.active{
  color:#00e0ff;
  border-bottom:2px solid #00e0ff;
}

/* LIST */
.record-list{
  padding:15px;
}

/* CARD */
.record-item{
  background:linear-gradient(145deg,#003a78,#002b5c);
  border-radius:14px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.05);
}

.record-item p{
  margin:6px 0;
  font-size:14px;
}

.record-type{
  font-weight:bold;
  font-size:15px;
  color:#00e0ff;
}

/* STATUS BADGE */
.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
  margin-top:8px;
}

.badge.pending{ background:#ff9800; }
.badge.completed{ background:#28a745; }
.badge.failed{ background:#e53935; }

/* EMPTY */
.no-records{
  text-align:center;
  margin-top:30px;
  color:#ccc;
}

/* FOOTER INSIDE CONTENT */
.footer-card{
  background:linear-gradient(145deg,#002b5c,#001f3f);
  margin:20px 15px;
  padding:15px;
  border-radius:12px;
  text-align:center;
  font-size:13px;
  color:#aaa;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* NAV */
nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#002244;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

nav a{
  color:white;
  text-decoration:none;
  text-align:center;
}

nav i{
  font-size:20px;
}
</style>
</head>

<body>

<header>
  <i class="fas fa-chart-line"></i> Financial Records
</header>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" data-filter="all">All</div>
  <div class="tab" data-filter="deposit">Deposits</div>
  <div class="tab" data-filter="withdrawal">Withdrawals</div>
</div>

<div class="record-list" id="record-list">
  <p class="no-records">Loading transactions...</p>
</div>

<!-- FOOTER (NOW INSIDE FLOW ✅) -->
<div class="footer-card">
  © 2026 CYPX ONLINE CRYPTO — Secure Financial System
</div>

<!-- NAV -->
<nav>
  <a href="dashboard.html"><i class="fas fa-home"></i><br>Home</a>
  <a href="task.html"><i class="fas fa-tasks"></i><br>Task</a>
  <a href="team.html"><i class="fas fa-users"></i><br>Team</a>
  <a href="vip.html"><i class="fas fa-crown"></i><br>VIP</a>
  <a href="profile.html"><i class="fas fa-user"></i><br>Me</a>
</nav>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.appspot.com",
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const listContainer = document.getElementById("record-list");
const tabs = document.querySelectorAll(".tab");

let deposits = [];
let withdrawals = [];

/* RENDER */
function renderRecords(filter="all"){
  listContainer.innerHTML = "";

  let all = [...deposits, ...withdrawals];

  all.sort((a,b)=> b.createdAt - a.createdAt);

  if(filter !== "all"){
    all = all.filter(r => r.type.toLowerCase() === filter);
  }

  if(all.length === 0){
    listContainer.innerHTML = '<p class="no-records">No transactions found.</p>';
    return;
  }

  all.forEach(r=>{
    const div = document.createElement("div");
    div.className="record-item";

    div.innerHTML = `
      <p class="record-type">${r.type}</p>
      <p>Amount: KSh ${parseFloat(r.amount).toFixed(2)}</p>
      <p>Method: ${r.method}</p>
      <p>Date: ${new Date(r.createdAt).toLocaleString()}</p>
      <span class="badge ${r.status.toLowerCase()}">${r.status}</span>
    `;

    listContainer.appendChild(div);
  });
}

/* AUTH */
auth.onAuthStateChanged(user=>{
  if(!user){
    listContainer.innerHTML='<p class="no-records">Login required.</p>';
    return;
  }

  const uid = user.uid;

  /* ✅ REALTIME DEPOSITS */
  db.ref("deposits/" + uid).on("value", snap=>{
    deposits = [];

    snap.forEach(child=>{
      const d = child.val();

      deposits.push({
        type:"Deposit",
        amount:d.amount || 0,
        method:d.method || "Mpesa",
        status:d.status || "pending",
        createdAt:d.timestamp || Date.now()
      });
    });

    renderRecords(document.querySelector(".tab.active").dataset.filter);
  });

  /* ✅ REALTIME WITHDRAWALS */
  db.ref("withdrawals/" + uid).on("value", snap=>{
    withdrawals = [];

    snap.forEach(child=>{
      const w = child.val();

      withdrawals.push({
        type:"Withdrawal",
        amount:w.amount || 0,
        method:w.method || "-",
        status:w.status || "pending",
        createdAt:w.timestamp || Date.now()
      });
    });

    renderRecords(document.querySelector(".tab.active").dataset.filter);
  });
});

/* TABS */
tabs.forEach(tab=>{
  tab.onclick=()=>{
    document.querySelector(".tab.active").classList.remove("active");
    tab.classList.add("active");
    renderRecords(tab.dataset.filter);
  }
});
</script>
</body>
</html>
