<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Your CYPX Account</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --primary:#FFD700;
    --secondary:#0d2346;
    --dark:#081529;
    --card:#10284d;
    --text:#ffffff;
    --muted:#b7c6dc;
    --success:#28a745;
    --danger:#ff4d4f;
}

html,body{
    width:100%;
    min-height:100%;
}

body{

    font-family:"Segoe UI",Arial,sans-serif;

    background:
    linear-gradient(rgba(8,21,41,.92),rgba(8,21,41,.92)),
    url("https://upload.wikimedia.org/wikipedia/commons/4/46/Bitcoin.svg");

    background-size:140px;
    background-repeat:repeat;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    padding:30px 15px;

    color:var(--text);

}

.card{

    width:100%;
    max-width:380px;

    background:rgba(16,40,77,.95);

    border-radius:22px;

    padding:28px 24px;

    box-shadow:0 15px 45px rgba(0,0,0,.45);

    border:1px solid rgba(255,255,255,.05);

}

.logo{

    width:72px;
    height:72px;

    margin:auto;

    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:50%;

    background:#162f59;

    font-size:34px;

    margin-bottom:15px;

}

.title{

    text-align:center;

    font-size:27px;

    font-weight:700;

    letter-spacing:1px;

}

.subtitle{

    text-align:center;

    margin-top:8px;

    color:var(--muted);

    font-size:14px;

    margin-bottom:25px;

}

.field{

    margin-bottom:16px;

}

label{

    display:block;

    margin-bottom:7px;

    font-size:14px;

    font-weight:600;

    color:#d6e5ff;

}

.input{

    width:100%;

    padding:14px;

    border:none;

    outline:none;

    border-radius:12px;

    background:#193861;

    color:#fff;

    font-size:15px;

    transition:.25s;

}

.input:focus{

    box-shadow:0 0 0 2px var(--primary);

}

.input::placeholder{

    color:#91a7c5;

}

.btn{

    width:100%;

    border:none;

    padding:15px;

    margin-top:10px;

    border-radius:12px;

    background:linear-gradient(90deg,#FFD700,#FFC107);

    color:#111;

    font-weight:700;

    font-size:16px;

    cursor:pointer;

    transition:.25s;

}

.btn:hover{

    transform:translateY(-2px);

}

.signin-line{

    text-align:center;

    margin-top:20px;

    color:#d6e5ff;

    font-size:14px;

}

.signin-line a{

    color:var(--primary);

    text-decoration:none;

    font-weight:700;

}

.toast{

    position:fixed;

    top:20px;

    right:20px;

    padding:12px 18px;

    border-radius:10px;

    color:#fff;

    font-weight:600;

    z-index:9999;

    animation:fade .25s ease;

}

@keyframes fade{

    from{

        opacity:0;

        transform:translateY(-10px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

</style>

</head>

<body>
  <div class="card">

    <div class="logo">🚀</div>

    <h1 class="title">CYPX HOLDINGS</h1>

    <p class="subtitle">
        Create your secure investment account
    </p>

    <form id="signupForm" autocomplete="off" novalidate>

        <div class="field">
            <label for="username">Username</label>
            <input
                id="username"
                class="input"
                type="text"
                placeholder="Choose a username"
                maxlength="20"
                required>
        </div>

        <div class="field">
            <label for="email">Email Address</label>
            <input
                id="email"
                class="input"
                type="email"
                placeholder="Enter your email"
                required>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input
                id="password"
                class="input"
                type="password"
                placeholder="Minimum 6 characters"
                minlength="6"
                required>
        </div>

        <div class="field">
            <label for="confirm_password">Confirm Password</label>
            <input
                id="confirm_password"
                class="input"
                type="password"
                placeholder="Repeat your password"
                required>
        </div>

        <button class="btn" type="submit">
            Create Account
        </button>

    </form>

    <div class="signin-line">
        Already have an account?
        <a href="signin.html">Sign In</a>
    </div>

</div>

<!-- Firebase Signup Script Starts Below -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged,
  createUserWithEmailAndPassword,
  fetchSignInMethodsForEmail
} from "https://www.gstatic.com/firebasejs/10.12.3/firebase-auth.js";

import {
  getDatabase,
  ref,
  set,
  get
} from "https://www.gstatic.com/firebasejs/10.12.3/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.appspot.com",
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

onAuthStateChanged(auth, (user) => {
    if (user) {
        window.location.href = "dashboard.html";
    }
});

function showToast(message, success = false) {

    const toast = document.createElement("div");

    toast.className = "toast";
    toast.style.background = success ? "#28a745" : "#ff4d4f";
    toast.textContent = message;

    document.body.appendChild(toast);

    setTimeout(() => {
        toast.remove();
    }, 2000);

}

const refUsername =
(new URLSearchParams(window.location.search).get("ref") || "")
.toLowerCase();

const usernameInput = document.getElementById("username");
const emailInput = document.getElementById("email");
const passInput = document.getElementById("password");
const confirmInput = document.getElementById("confirm_password");

document
.getElementById("signupForm")
.addEventListener("submit", async (e)=>{

e.preventDefault();

const username = usernameInput.value.trim().toLowerCase();
const email = emailInput.value.trim().toLowerCase();
const password = passInput.value;
const confirm = confirmInput.value;

if(!username || !email || !password || !confirm){
    return showToast("All fields are required.");
}

if(!/^[a-z0-9_]{3,20}$/.test(username)){
    return showToast("Username must contain 3-20 letters, numbers or underscores.");
}

if(password.length < 6){
    return showToast("Password must be at least 6 characters.");
}

if(password !== confirm){
    return showToast("Passwords do not match.");
}

try{

const methods =
await fetchSignInMethodsForEmail(auth,email);

if(methods.length){
    return showToast("Email already exists.");
}

const usernameSnap =
await get(ref(db,"usernames/"+username));

if(usernameSnap.exists()){
    return showToast("Username already taken.");
}

const credential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

const user = credential.user;
import { updateProfile } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-auth.js";
await updateProfile(user,{
    displayName: username
});
await set(ref(db,"users/"+user.uid),{

username,
email,

referredBy:refUsername,

createdAt:Date.now(),

balance:0,

totalDeposit:0,

totalEarnings:0,

vipLevel:0,

hasClaimedBonus:false,

dashboard:{
active:true,
lastLogin:Date.now()
},

vipEarnings:{},

withdrawals:{},

referrals:{}

});

await set(
ref(db,"usernames/"+username),
user.uid
);

if(refUsername){

const sponsorSnap =
await get(ref(db,"usernames/"+refUsername));

if(sponsorSnap.exists()){

const sponsorUid = sponsorSnap.val();

await set(
ref(db,"referrals/"+sponsorUid+"/"+user.uid),
{
username,
email,
timestamp:Date.now()
}
);

}

}

showToast("Account created successfully!",true);

setTimeout(()=>{
window.location.href="dashboard.html";
},700);

}catch(err){

console.error(err);

switch(err.code){

case "auth/email-already-in-use":
showToast("Email already registered.");
break;

case "auth/invalid-email":
showToast("Invalid email address.");
break;

case "auth/weak-password":
showToast("Password is too weak.");
break;

default:
showToast("Registration failed. Please try again.");

}

}

});

</script>

<script src="js/app-back.js"></script>

</body>
</html>
