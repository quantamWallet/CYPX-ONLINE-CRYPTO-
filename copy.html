<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYPX Copy Trading</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, rgba(0,8,20,0.95), rgba(0,29,61,0.95)); color: white; padding-bottom: 100px; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header { text-align: center; margin-bottom: 30px; }
    h1 { color: #ffd700; margin: 0 0 8px; font-size: 32px; font-weight: 800; }
    .balance-card { background: linear-gradient(135deg,#007BFF 0%,#00C896 100%); padding: 22px; border-radius: 18px; margin-bottom: 24px; text-align: center; }
    .balance-value { font-size: 30px; font-weight: 800; color: #ffd700; margin-top: 6px; }
    .portfolio-card { background: rgba(0,26,51,0.6); padding: 24px; border-radius: 18px; margin-bottom: 30px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .portfolio-stat { text-align: center; }
    .portfolio-value { font-size: 24px; font-weight: 800; margin-top: 6px; }
    .portfolio-value.green { color: #00C896; }
    .portfolio-value.red { color: #ef4444; }
    .toast { position: fixed; top: 20px; right: 20px; background: #0A2540; color: white; padding: 16px 20px; border-radius: 12px; transform: translateX(400px); transition: transform 0.3s ease; z-index: 1001; }
    .toast.show { transform: translateX(0); }
    .toast.success { background: #00C896; }
    .toast.error { background: #ef4444; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><i class="fas fa-copy"></i> CYPX Copy Trading</h1>
    <p>Automatically copy trades from top CYPX traders.</p>
  </div>
  <div class="balance-card">
    <div>Available Balance</div>
    <div class="balance-value" id="userBalance">$0.00</div>
  </div>
  <div class="portfolio-card">
    <div class="portfolio-stat"><div>Total Copied</div><div class="portfolio-value" id="totalCopied">$0.00</div></div>
    <div class="portfolio-stat"><div>Total P&L</div><div class="portfolio-value green" id="totalPnL">$0.00</div></div>
    <div class="portfolio-stat"><div>Active Traders</div><div class="portfolio-value" id="activeCount">0</div></div>
  </div>
</div>
<div id="toast" class="toast"></div>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.firebasestorage.app",
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
  measurementId: "G-4RSQXZJX44"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;
let userCopies = {};
let userBalance = 0;
let totalCopyEarnings = 0;

auth.onAuthStateChanged(user => {
  if(!user) return window.location.href = "signin.html";
  currentUser = user;
  loadUserBalance();
  loadUserCopies();
});

function formatMoney(n){ return "$" + Number(n||0).toLocaleString("en-US",{minimumFractionDigits:2}) }

function loadUserBalance(){
  db.ref("users/" + currentUser.uid + "/balance").on("value", snap => {
    userBalance = Number(snap.val() || 0);
    document.getElementById('userBalance').innerText = formatMoney(userBalance);
  });
}

function loadUserCopies() {
  db.ref("copy_trading/" + currentUser.uid).on("value", snap => {
    userCopies = snap.val() || {};
    updatePortfolioSummary();
  });
}

function updatePortfolioSummary() {
  let totalAmount = 0, totalPnL = 0, count = 0;
  for(let id in userCopies){
    if(userCopies[id].status === "active" || userCopies[id].status === "pending_close"){
      totalAmount += userCopies[id].amount;
      totalPnL += userCopies[id].pnl || 0;
      count++;
    }
  }
  document.getElementById('totalCopied').innerText = formatMoney(totalAmount);
  document.getElementById('totalPnL').innerText = formatMoney(totalPnL);
  document.getElementById('totalPnL').className = `portfolio-value ${totalPnL >= 0? 'green' : 'red'}`;
  document.getElementById('activeCount').innerText = count;
  
  db.ref("users/" + currentUser.uid + "/copyEarnings").set(totalPnL);
  totalCopyEarnings = totalPnL;
}

function showToast(message, type = "info"){
  const toast = document.getElementById('toast');
  toast.className = `toast ${type} show`;
  toast.innerText = message;
  setTimeout(() => toast.classList.remove('show'), 3000);
}
</script>
</body>
</html>
