<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Edit Advertisement - CYPX Merchant</title>

<meta name="theme-color" content="#007a54">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#08172d;
color:#fff;
padding-bottom:60px;
}

header{
background:linear-gradient(135deg,#007a54,#003b74);
padding:22px;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,.35);
}

header h2{
font-size:24px;
font-weight:700;
}

header p{
margin-top:6px;
font-size:14px;
opacity:.9;
}

.container{
width:95%;
max-width:700px;
margin:25px auto;
}

.card{
background:#102b4d;
border-radius:18px;
padding:22px;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.card-title{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
margin-bottom:20px;
}

.card-title i{
color:#00d4ff;
}

.loading{
text-align:center;
padding:50px;
color:#b8c8df;
font-size:15px;
}

.toast{
position:fixed;
top:20px;
right:20px;
background:#00c853;
padding:15px 18px;
border-radius:12px;
display:none;
font-weight:600;
box-shadow:0 10px 25px rgba(0,0,0,.35);
z-index:9999;
}

.toast.error{
background:#e53935;
}

.input{
width:100%;
padding:14px;
background:#0d2345;
border:1px solid rgba(255,255,255,.08);
border-radius:12px;
color:#fff;
font-size:15px;
outline:none;
transition:.25s;
}

.input:focus{
border-color:#00d4ff;
box-shadow:0 0 10px rgba(0,212,255,.3);
}

.input option{
background:#0d2345;
color:#fff;
}

.save-btn{
margin-top:25px;
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:#00c853;
color:#fff;
font-size:17px;
font-weight:700;
cursor:pointer;
transition:.25s;
}

.save-btn:hover{
background:#00b74a;
}

</style>

</head>

<body>

<header>

<h2>
<i class="fas fa-pen-to-square"></i>
Edit P2P Advertisement
</h2>

<p>
Update your BUY or SELL advertisement.
</p>

</header>

<div class="container">

<div class="card">

<div class="card-title">

<i class="fas fa-edit"></i>

Edit Advertisement

</div>

<div id="merchantStatus" class="loading">

Checking merchant account...

</div>

<div id="adForm" style="display:none;">

<label style="display:block;margin-bottom:8px;font-weight:600;">
Advertisement Type
</label>

<select id="adType" class="input">
<option value="">Select Advertisement Type</option>
<option value="buy">BUY USDT</option>
<option value="sell">SELL USDT</option>
</select>

<label style="display:block;margin:18px 0 8px;font-weight:600;">
Exchange Rate (KES per USDT)
</label>

<input
type="number"
id="rate"
class="input"
placeholder="Example: 150.50">

<label style="display:block;margin:18px 0 8px;font-weight:600;">
Available USDT
</label>

<input
type="number"
id="availableUSD"
class="input"
placeholder="Example: 5000">

<label style="display:block;margin:18px 0 8px;font-weight:600;">
Minimum Trade (USD)
</label>

<input
type="number"
id="minTrade"
class="input"
placeholder="Minimum trade">

<label style="display:block;margin:18px 0 8px;font-weight:600;">
Maximum Trade (USD)
</label>

<input
type="number"
id="maxTrade"
class="input"
placeholder="Maximum trade">

<label style="display:block;margin:18px 0 8px;font-weight:600;">
Payment Method
</label>

<select id="paymentMethod" class="input">
<option value="">Select Payment Method</option>
<option>M-PESA Kenya</option>
<option>Airtel Money Kenya</option>
<option>Bank Transfer</option>
</select>

<label style="display:block;margin:18px 0 8px;font-weight:600;">
Payment Account / Phone Number
</label>

<input
type="text"
id="paymentNumber"
class="input"
placeholder="07XXXXXXXX or Bank Account">

<label style="display:block;margin:18px 0 8px;font-weight:600;">
Advertisement Status
</label>

<select id="status" class="input">
<option value="active">Active</option>
<option value="paused">Paused</option>
</select>

<div style="
margin-top:25px;
padding:16px;
background:#0d2345;
border-radius:14px;
border:1px solid rgba(255,255,255,.08);
">

<h3 style="margin-bottom:12px;color:#00d4ff;">
<i class="fas fa-circle-info"></i>
Advertisement Summary
</h3>

<div style="display:flex;justify-content:space-between;margin-bottom:8px;">
<span>Type</span>
<b id="previewType">--</b>
</div>

<div style="display:flex;justify-content:space-between;margin-bottom:8px;">
<span>Rate</span>
<b id="previewRate">KES 0.00</b>
</div>

<div style="display:flex;justify-content:space-between;margin-bottom:8px;">
<span>Available</span>
<b id="previewAvailable">$0</b>
</div>

<div style="display:flex;justify-content:space-between;">
<span>Limits</span>
<b id="previewLimits">$0 - $0</b>
</div>

</div>

<button
id="saveAdBtn"
class="save-btn">

<i class="fas fa-save"></i>
Save Changes

</button>

</div>

</div>

</div>

<div id="toast" class="toast"></div>

<script>
// ==========================
// FIREBASE CONFIGURATION
// ==========================

const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.firebasestorage.app",
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
  measurementId: "G-4RSQXZJX44"
};

if(!firebase.apps.length){
    firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;
let merchant = null;
let advertisementId = null;

// ==========================
// TOAST
// ==========================

function showToast(message,type="success"){

const toast=document.getElementById("toast");

toast.innerHTML=message;

toast.className="toast";

if(type==="error"){
toast.classList.add("error");
}

toast.style.display="block";

setTimeout(()=>{
toast.style.display="none";
},3000);

}

// ==========================
// AUTHENTICATION
// ==========================

auth.onAuthStateChanged(async(user)=>{

if(!user){
location.href="auth.html";
return;
}

currentUser=user;

try{

const merchantSnap=await db.ref("merchantApplications/"+user.uid).once("value");

if(!merchantSnap.exists()){
location.href="merchant-apply.html";
return;
}

merchant=merchantSnap.val();

if(merchant.status!=="approved"){
location.href="merchant-apply.html";
return;
}

// Get advertisement ID
advertisementId=localStorage.getItem("editAdvertisementId");

if(!advertisementId){

showToast("Advertisement not found.","error");

setTimeout(()=>{
location.href="my-ads.html";
},1500);

return;

}

// Load advertisement
loadAdvertisement();

}catch(err){

console.error(err);

showToast(err.message,"error");

}

});

// ==========================
// LOAD ADVERTISEMENT
// ==========================

async function loadAdvertisement(){

try{

const snap=await db.ref("p2pAds/"+advertisementId).once("value");

if(!snap.exists()){

showToast("Advertisement not found.","error");

setTimeout(()=>{
location.href="my-ads.html";
},1500);

return;

}

const ad=snap.val();

// Security check
if(ad.merchantUid!==currentUser.uid){

showToast("Access denied.","error");

setTimeout(()=>{
location.href="my-ads.html";
},1500);

return;

}

// Show form
document.getElementById("merchantStatus").style.display="none";
document.getElementById("adForm").style.display="block";

// Fill fields
document.getElementById("adType").value=ad.type;
document.getElementById("rate").value=ad.rate;
document.getElementById("availableUSD").value=ad.availableUSD;
document.getElementById("minTrade").value=ad.minTrade;
document.getElementById("maxTrade").value=ad.maxTrade;
document.getElementById("paymentMethod").value=ad.paymentMethod;
document.getElementById("paymentNumber").value=ad.paymentNumber;
document.getElementById("status").value=ad.status;

// Refresh preview
updatePreview();

}catch(err){

console.error(err);

showToast(err.message,"error");

}

}
// ==========================
// LIVE PREVIEW
// ==========================

const previewFields=[
"adType",
"rate",
"availableUSD",
"minTrade",
"maxTrade"
];

previewFields.forEach(id=>{

document.getElementById(id).addEventListener("input",updatePreview);
document.getElementById(id).addEventListener("change",updatePreview);

});

function updatePreview(){

const type=document.getElementById("adType").value;
const rate=Number(document.getElementById("rate").value)||0;
const available=Number(document.getElementById("availableUSD").value)||0;
const min=Number(document.getElementById("minTrade").value)||0;
const max=Number(document.getElementById("maxTrade").value)||0;

document.getElementById("previewType").textContent=
type?type.toUpperCase():"--";

document.getElementById("previewRate").textContent=
"KES "+rate.toFixed(2);

document.getElementById("previewAvailable").textContent=
"$"+available.toLocaleString();

document.getElementById("previewLimits").textContent=
"$"+min+" - $"+max;

}

// ==========================
// UPDATE ADVERTISEMENT
// ==========================

document.getElementById("saveAdBtn").onclick = async()=>{
try{

const type=document.getElementById("adType").value;
const rate=Number(document.getElementById("rate").value);
const availableUSD=Number(document.getElementById("availableUSD").value);
const minTrade=Number(document.getElementById("minTrade").value);
const maxTrade=Number(document.getElementById("maxTrade").value);
const paymentMethod=document.getElementById("paymentMethod").value;
const paymentNumber=document.getElementById("paymentNumber").value.trim();
const status=document.getElementById("status").value;

if(
!type||
!rate||
!availableUSD||
!minTrade||
!maxTrade||
!paymentMethod||
paymentNumber==""
){

showToast("Please complete all fields.","error");
return;

}

if(minTrade<50){

showToast("Minimum trade is $50.","error");
return;

}

if(maxTrade<minTrade){

showToast("Maximum trade must be greater than minimum.","error");
return;

}

await db.ref("p2pAds/"+advertisementId).update({

type,
rate,
availableUSD,
minTrade,
maxTrade,
paymentMethod,
paymentNumber,
status,
updatedAt:Date.now()

});

// Merchant Activity
const activityId=db.ref().push().key;

await db.ref("merchantActivity/"+currentUser.uid+"/"+activityId).set({

type:"advert",

title:"Advertisement Updated",

message:"You updated your "+type.toUpperCase()+" advertisement.",

time:new Date().toLocaleString(),

timestamp:Date.now()

});

// Notification
const notificationId=db.ref().push().key;

await db.ref("notifications/"+currentUser.uid+"/"+notificationId).set({

title:"Advertisement Updated",

message:"Your advertisement has been updated successfully.",

read:false,

time:new Date().toLocaleString(),

timestamp:Date.now()

});

showToast("Advertisement updated successfully.");

localStorage.removeItem("editAdvertisementId");

setTimeout(()=>{

location.href="my-ads.html";

},1500);

}catch(err){

console.error(err);

showToast(err.message,"error");

}

};

</script>

</body>
                            </html>
