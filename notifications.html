<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYPX Notifications</title>
<style>
  body{ background:#0A1A2F; font-family:Arial, sans-serif; color:#E0EFFF; margin:0; padding:20px;}
  .notif-wrap{ position:relative; display:inline-block; }
  #notifBell{ 
    font-size:24px; cursor:pointer; position:relative; 
    background:#11294A; padding:10px; border-radius:12px;
  }
  #notifBadge{
    position:absolute; top:2px; right:2px; background:#FF3B30; color:#fff;
    font-size:10px; font-weight:800; padding:2px 6px; border-radius:10px;
    display:none;
  }
  
  .notif-popup{
    position:absolute; top:120%; right:0; width:360px; max-height:500px;
    background:#11294A; border:1px solid rgba(0,212,255,0.25); border-radius:14px;
    padding:10px; z-index:99999; overflow-y:auto; display:none;
    box-shadow:0 8px 24px rgba(0,0,0,0.5);
  }
  .notif-header{
    display:flex; justify-content:space-between; align-items:center;
    font-weight:bold; color:#FFD700; padding:8px; border-bottom:1px solid rgba(0,212,255,0.1);
    margin-bottom:8px;
  }
  .mark-read{ font-size:11px; color:#00d4ff; cursor:pointer; }
  .mark-read:hover{ text-decoration:underline; }
  
  .notif-item{
    background:rgba(255,255,255,0.04); padding:12px; border-radius:10px;
    margin-bottom:8px; cursor:pointer; border-left:3px solid #00d4ff;
    transition:background 0.2s;
  }
  .notif-item:hover{ background:rgba(0,212,255,0.08); }
  .notif-item.read{ opacity:0.5; border-left-color:#3a5a7a; }
  .notif-item b{ display:block; margin-bottom:4px; color:#FFD700; font-size:14px; }
  .notif-item{ color:#E0EFFF; font-size:13px; }
  .notif-time{ font-size:10px; color:#8FA3C0; margin-top:4px; }
  .notif-empty{ text-align:center; color:#8FA3C0; padding:20px; }
  
  .notif-popup::-webkit-scrollbar{ width:6px; }
  .notif-popup::-webkit-scrollbar-thumb{ background:#00d4ff; border-radius:6px; }
</style>
</head>
<body>

<div class="notif-wrap">
  <div id="notifBell">🔔 <span id="notifBadge">0</span></div>
  <div id="notifPopup" class="notif-popup">
    <div class="notif-header">
      Notifications <span class="mark-read" id="markAllRead">Mark all read</span>
    </div>
    <div id="notifList"><div class="notif-empty">Loading...</div></div>
  </div>
</div>

<!-- FIREBASE SDK v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
// 1. FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.firebasestorage.app",
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// 2. GET CURRENT USER UID
let uid = null;
firebase.auth().onAuthStateChanged(user => {
  if(user){
    uid = user.uid;
    initNotifications();
  }else{
    window.location.href = "auth.html"; // redirect if not logged in
  }
});

// 3. NOTIFICATION LOGIC
function initNotifications(){
  const notifRef = database.ref("notifications/" + uid);
  const broadcastRef = database.ref("notifications/broadcast"); 
  const bell = document.getElementById('notifBell');
  const notifBadge = document.getElementById('notifBadge');
  const popup = document.getElementById('notifPopup');
  const list = document.getElementById('notifList');
  const markAll = document.getElementById('markAllRead');
  
  let userCache = [];
  let broadcastCache = [];
  let unreadNotif = 0;

  bell.onclick = (e) => { 
    e.stopPropagation();
    popup.style.display = popup.style.display === 'block' ? 'none' : 'block'; 
  }
  document.addEventListener('click', (e) => {
    if(!bell.contains(e.target) && !popup.contains(e.target)){
      popup.style.display = 'none';
    }
  })

  // MARK ALL READ
  markAll.onclick = () => {
    userCache.forEach(n=>{
      if(!n.read){
        database.ref(`notifications/${uid}/${n.key}/read`).set(true);
      }
    })
  }

  notifRef.orderByChild('timestamp').limitToLast(50).on("value", snap => {
    userCache = [];
    if(snap.exists()) snap.forEach(child=> userCache.push({key: child.key,...child.val(), isBroadcast: false}));
    render();
  });

  broadcastRef.orderByChild('timestamp').limitToLast(50).on("value", snap => {
    broadcastCache = [];
    if(snap.exists()) snap.forEach(child=> broadcastCache.push({key: child.key,...child.val(), isBroadcast: true}));
    render();
  });

  function render(){
    list.innerHTML = "";
    unreadNotif = 0;
    const arr = [...userCache, ...broadcastCache];
    arr.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
    const finalArr = arr.slice(0, 50);

    if(finalArr.length === 0){
      list.innerHTML = '<div class="notif-empty">No notifications yet</div>';
      notifBadge.style.display = "none";
      return;
    }

    finalArr.forEach(n=>{
      if(!n.read && !n.isBroadcast) unreadNotif++;
      const time = n.timestamp? new Date(n.timestamp).toLocaleString() : '';
      const div = document.createElement("div");
      div.className = "notif-item" + (n.read? " read" : "") + (n.isBroadcast? " broadcast" : "");
      div.innerHTML = `<b>${n.isBroadcast? '📢 ' : ''}${n.title || 'Notification'}</b>${n.body || ''}<div class="notif-time">${time}</div>`;

      div.onclick = () => {
        if(!n.isBroadcast){
          database.ref(`notifications/${uid}/${n.key}/read`).set(true);
        }
        popup.style.display = 'none';
        if(n.url) window.location.href = n.url; 
      }
      list.appendChild(div);
    });

    notifBadge.style.display = unreadNotif > 0? "inline-block" : "none";
    notifBadge.textContent = unreadNotif;
  }
}
</script>

</body>
</html>
