<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYPX Notifications</title>
<style>
  body{ 
    background:#0A1A2F; 
    font-family:Arial, sans-serif; 
    color:#E0EFFF; 
    margin:0; 
    padding:0;
  }
  .container{
    max-width:700px; 
    margin:0 auto; 
    padding:20px;
  }
  
  /* HEADER */
  .page-header{
    display:flex; 
    justify-content:space-between; 
    align-items:center;
    background:#11294A; 
    padding:16px 20px; 
    border-radius:14px;
    margin-bottom:20px;
    border:1px solid rgba(0,212,255,0.15);
  }
  .page-header h1{
    margin:0; 
    font-size:20px; 
    color:#FFD700;
  }
  .back-btn{
    background:#00d4ff; 
    color:#000; 
    padding:8px 14px; 
    border-radius:8px; 
    text-decoration:none;
    font-weight:700; 
    font-size:13px;
  }
  .mark-read{ 
    font-size:12px; 
    color:#00d4ff; 
    cursor:pointer; 
    font-weight:600;
  }
  .mark-read:hover{ text-decoration:underline; }
  
  /* NOTIFICATION LIST */
  .notif-list{
    background:#11294A; 
    border:1px solid rgba(0,212,255,0.15); 
    border-radius:14px;
    padding:12px;
    min-height:200px;
  }
  .notif-item{
    background:rgba(255,255,255,0.04); 
    padding:14px; 
    border-radius:10px;
    margin-bottom:10px; 
    cursor:pointer; 
    border-left:3px solid #00d4ff;
    transition:all 0.2s;
  }
  .notif-item:hover{ 
    background:rgba(0,212,255,0.08); 
    transform:translateX(3px);
  }
  .notif-item.read{ 
    opacity:0.5; 
    border-left-color:#3a5a7a; 
  }
  .notif-item.broadcast{ 
    border-left-color:#FFD700; 
  }
  .notif-item b{ 
    display:block; 
    margin-bottom:5px; 
    color:#FFD700; 
    font-size:15px; 
  }
  .notif-item{ 
    color:#E0EFFF; 
    font-size:14px; 
    line-height:1.4;
  }
  .notif-time{ 
    font-size:11px; 
    color:#8FA3C0; 
    margin-top:6px; 
  }
  .notif-empty{ 
    text-align:center; 
    color:#8FA3C0; 
    padding:40px 20px; 
    font-size:14px;
  }
  #notifBadgeTop{
    background:#FF3B30; 
    color:#fff;
    font-size:11px; 
    font-weight:800; 
    padding:3px 8px; 
    border-radius:10px;
    margin-left:8px;
  }
</style>
</head>
<body>

<div class="container">
  <!-- HEADER -->
  <div class="page-header">
    <div>
      <h1>🔔 Notifications <span id="notifBadgeTop"></span></h1>
    </div>
    <div>
      <span class="mark-read" id="markAllRead">Mark all read</span>
      <a href="dashboard.html" class="back-btn">← Back</a>
    </div>
  </div>

  <!-- LIST -->
  <div class="notif-list" id="notifList">
    <div class="notif-empty">Loading notifications...</div>
  </div>
</div>

<!-- FIREBASE SDK v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.firebasestorage.app",
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
  measurementId: "G-4RSQXZJX44"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let uid = null;
firebase.auth().onAuthStateChanged(user => {
  if(user){
    uid = user.uid;
    initNotifications();
  }else{
    window.location.href = "auth.html";
  }
});

function initNotifications(){
  const notifRef = database.ref("notifications/" + uid);
  const broadcastRef = database.ref("notifications/broadcast"); 
  const list = document.getElementById('notifList');
  const markAll = document.getElementById('markAllRead');
  const badgeTop = document.getElementById('notifBadgeTop');
  
  let userCache = [];
  let broadcastCache = [];
  let unreadNotif = 0;

  markAll.onclick = () => {
    userCache.forEach(n=>{
      if(!n.read){
        database.ref(`notifications/${uid}/${n.key}/read`).set(true);
      }
    })
  }

  notifRef.orderByChild('timestamp').limitToLast(100).on("value", snap => {
    userCache = [];
    if(snap.exists()) snap.forEach(child=> userCache.push({key: child.key,...child.val(), isBroadcast: false}));
    render();
  });

  broadcastRef.orderByChild('timestamp').limitToLast(100).on("value", snap => {
    broadcastCache = [];
    if(snap.exists()) snap.forEach(child=> broadcastCache.push({key: child.key,...child.val(), isBroadcast: true}));
    render();
  });

  function render(){
    list.innerHTML = "";
    unreadNotif = 0;
    const arr = [...userCache, ...broadcastCache];
    arr.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
    const finalArr = arr.slice(0, 100);

    if(finalArr.length === 0){
      list.innerHTML = '<div class="notif-empty">No notifications yet<br>We will notify you when something happens</div>';
      badgeTop.style.display = "none";
      return;
    }

    finalArr.forEach(n=>{
      if(!n.read && !n.isBroadcast) unreadNotif++;
      const time = n.timestamp? new Date(n.timestamp).toLocaleString() : '';
      const div = document.createElement("div");
      div.className = "notif-item" + (n.read? " read" : "") + (n.isBroadcast? " broadcast" : "");
      div.innerHTML = `<b>${n.isBroadcast? '📢 ' : ''}${n.title || 'Notification'}</b>${n.body || ''}<div class="notif-time">${time}</div>`;

      div.onclick = () => {
        if(!n.isBroadcast){
          database.ref(`notifications/${uid}/${n.key}/read`).set(true);
        }
        if(n.url) window.location.href = n.url; 
      }
      list.appendChild(div);
    });

    badgeTop.style.display = unreadNotif > 0? "inline-block" : "none";
    badgeTop.textContent = unreadNotif + " new";
  }
}
</script>

</body>
</html>
