<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYPX Notifications</title>
<style>
  body{ 
    background:#0A1A2F; 
    font-family:Arial, sans-serif; 
    color:#E0EFFF; 
    margin:0; 
    padding:0;
  }
  .container{
    max-width:700px; 
    margin:0 auto; 
    padding:20px;
  }
  
  /* NEW HEADER CSS */
  .page-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
    background:#11294A;
    padding:18px;
    border-radius:16px;
    margin-bottom:20px;
    border:1px solid rgba(0,212,255,.2);
    flex-wrap:wrap;
  }

  .header-left h1{
    margin:0;
    color:#FFD700;
    font-size:34px;
    font-weight:700;
  }

  .header-right{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
  }

  .mark-read{
    color:#00d4ff;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
  }
  .mark-read:hover{ text-decoration:underline; }

  .back-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    background:#00d4ff;
    color:#000;
    text-decoration:none;
    padding:10px 18px;
    border-radius:10px;
    font-weight:bold;
    transition:.3s;
    white-space:nowrap;
  }
  .back-btn:hover{
    background:#00bce6;
  }

  #notifBadgeTop{
    background:#FF3B30; 
    color:#fff;
    font-size:13px; 
    font-weight:800; 
    padding:4px 10px; 
    border-radius:12px;
    margin-left:10px;
    vertical-align:middle;
  }
  
  /* IMPROVED NOTIFICATION CARDS */
  .notif-list{
    background:#11294A; 
    border:1px solid rgba(0,212,255,0.15); 
    border-radius:14px;
    padding:16px;
    min-height:200px;
  }
  .notif-item{
    background:#183458;
    border-left:4px solid #00d4ff;
    border-radius:14px;
    padding:16px;
    margin-bottom:14px;
    transition:.25s;
    cursor:pointer;
    box-shadow:0 4px 12px rgba(0,0,0,.2);
    color:#E0EFFF;
    font-size:14px;
    line-height:1.5;
  }

  .notif-item:hover{
    transform:translateY(-2px);
    background:#21436f;
  }

  .notif-item.broadcast{
    border-left-color:#FFD700;
  }

  .notif-item.read{
    opacity:.65;
  }

  .notif-item b{
    display:block;
    color:#FFD700;
    font-size:18px;
    margin-bottom:8px;
  }

  .notif-time{
    margin-top:10px;
    font-size:12px;
    color:#8fa3c0;
  }
  
  .notif-empty{ 
    text-align:center; 
    color:#8FA3C0; 
    padding:40px 20px; 
    font-size:14px;
  }
</style>
</head>
<body>

<div class="container">
  <!-- NEW HEADER HTML -->
  <div class="page-header">
    <div class="header-left">
        <h1>🔔 Notifications <span id="notifBadgeTop"></span></h1>
    </div>

    <div class="header-right">
        <span class="mark-read" id="markAllRead">
            ✓ Mark all read
        </span>

        <a href="dashboard.html" class="back-btn">
            ← Back
        </a>
    </div>
  </div>

  <!-- LIST -->
  <div class="notif-list" id="notifList">
    <div class="notif-empty">Loading notifications...</div>
  </div>
</div>

<!-- FIREBASE SDK v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.firebasestorage.app",
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
  measurementId: "G-4RSQXZJX44"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let uid = null;
firebase.auth().onAuthStateChanged(user => {
  if(user){
    uid = user.uid;
    initNotifications();
  }else{
    window.location.href = "auth.html";
  }
});

function initNotifications(){
  const notifRef = database.ref("notifications/" + uid);
  const broadcastRef = database.ref("notifications/broadcast"); 
  const list = document.getElementById('notifList');
  const markAll = document.getElementById('markAllRead');
  const badgeTop = document.getElementById('notifBadgeTop');
  
  let userCache = [];
  let broadcastCache = [];
  let unreadNotif = 0;

  markAll.onclick = () => {
    userCache.forEach(n=>{
      if(!n.read){
        database.ref(`notifications/${uid}/${n.key}/read`).set(true);
      }
    })
  }

  notifRef.orderByChild('timestamp').limitToLast(100).on("value", snap => {
    userCache = [];
    if(snap.exists()) snap.forEach(child=> userCache.push({key: child.key,...child.val(), isBroadcast: false}));
    render();
  });

  broadcastRef.orderByChild('timestamp').limitToLast(100).on("value", snap => {
    broadcastCache = [];
    if(snap.exists()) snap.forEach(child=> broadcastCache.push({key: child.key,...child.val(), isBroadcast: true}));
    render();
  });

  function render(){
    list.innerHTML = "";
    unreadNotif = 0;
    const arr = [...userCache, ...broadcastCache];
    arr.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
    const finalArr = arr.slice(0, 100);

    if(finalArr.length === 0){
      list.innerHTML = '<div class="notif-empty">No notifications yet<br>We will notify you when something happens</div>';
      badgeTop.style.display = "none";
      return;
    }

    finalArr.forEach(n=>{
      if(!n.read && !n.isBroadcast) unreadNotif++;
      const time = n.timestamp? new Date(n.timestamp).toLocaleString() : '';
      const div = document.createElement("div");
      div.className = "notif-item" + (n.read? " read" : "") + (n.isBroadcast? " broadcast" : "");
      div.innerHTML = `<b>${n.isBroadcast? '📢 ' : ''}${n.title || 'Notification'}</b>${n.body || ''}<div class="notif-time">${time}</div>`;

      div.onclick = () => {
        if(!n.isBroadcast){
          database.ref(`notifications/${uid}/${n.key}/read`).set(true);
        }
        // REMOVED: if(n.url) window.location.href = n.url; 
      }
      list.appendChild(div);
    });

    badgeTop.style.display = unreadNotif > 0? "inline-block" : "none";
    badgeTop.textContent = unreadNotif + " new";
  }
}
</script>

</body>
</html>
