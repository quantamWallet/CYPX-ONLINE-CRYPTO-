<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>




<script>


const firebaseConfig={


apiKey:"AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",

authDomain:"quantum-rio.firebaseapp.com",

databaseURL:"https://quantum-rio-default-rtdb.firebaseio.com",

projectId:"quantum-rio",

storageBucket:"quantum-rio.firebasestorage.app",

messagingSenderId:"805433999377",

appId:"1:805433999377:web:d0efa8c46ec4a0fa30f1b0"


};



firebase.initializeApp(firebaseConfig);



const auth=firebase.auth();

const db=firebase.database();





let adminUID="";

let adminEmail="";





// ADMIN SECURITY


auth.onAuthStateChanged(user=>{


if(!user){

window.location.href="auth.html";

return;

}



adminUID=user.uid;

adminEmail=user.email;



db.ref("admins/"+adminUID)
.once("value")

.then(admin=>{


if(!admin.exists()){


alert("Admin only");

window.location.href="auth.html";

return;


}



loadLogs();


});



});








// LOAD LOGS


function loadLogs(){



db.ref("adminLogs")

.limitToLast(50)

.on("value",snap=>{


let html="";



let logs=[];



snap.forEach(child=>{


logs.push(child.val());


});



logs.reverse();




logs.forEach(log=>{



let time =
log.time
?
new Date(log.time).toLocaleString()
:
"Unknown";



html += `


<div class="log">


<b>
${log.action || "Action"}
</b>


<br>


User:
${log.user || "N/A"}


<br>


Admin:
${log.admin || "N/A"}


<br>


${time}


</div>


`;



});



document.getElementById("logs").innerHTML =
html || "No activity yet";



});



}









// CREATE LOG FUNCTION
// Use this function from other admin pages


function createLog(action,user){



db.ref("adminLogs").push({

action:action,

user:user,

admin:adminEmail,

adminUID:adminUID,

time:Date.now()


});


}



</script>
