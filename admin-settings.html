<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CYPX HOLDINGS - Admin Settings</title>


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


<style>

body{

margin:0;
font-family:'Segoe UI',sans-serif;
background:#000814;
color:white;

}


.header{

padding:18px;
background:linear-gradient(90deg,#001d3d,#003566);
display:flex;
align-items:center;
gap:15px;

}


.header a{

color:white;
text-decoration:none;

}


.container{

padding:15px;

}


.card{

background:#001a33;
padding:20px;
border-radius:15px;
margin-bottom:15px;

}


.log{

background:#002244;
padding:12px;
border-radius:10px;
margin-bottom:10px;

font-size:14px;

}

#notification{
position:fixed;
top:20px;
right:20px;
background:#16a34a;
color:#fff;
padding:14px 20px;
border-radius:10px;
font-weight:bold;
opacity:0;
pointer-events:none;
transition:.3s;
z-index:9999;
max-width:300px;
}

#notification.show{
opacity:1;
}

#notification.error{
background:#dc2626;
}

#notification.warning{
background:#f59e0b;
}
</style>

</head>

<body>

<div id="notification"></div>
    
<div class="header">

<a href="admin.html">

<i class="fas fa-arrow-left"></i>

</a>


<b>

<i class="fas fa-cog"></i>

Admin Settings

</b>


</div>




<div class="container">


<div class="card">


<h3>
System Information
</h3>


<p>
Platform:
<b>CYPX HOLDINGS</b>
</p>


<p>
Version:
<b>1.0</b>
</p>


<p>
Status:
<b id="systemStatus" style="color:#16a34a;">
Loading...
</b>
</p>


</div>


<div class="card">

<h3>Platform Controls</h3>

<label>Platform Status</label>

<select id="platformStatus">

<option value="online">🟢 Online</option>

<option value="maintenance">🟠 Maintenance</option>

<option value="offline">🔴 Offline</option>

</select>

<input
id="maintenanceMessage"
type="text"
placeholder="Maintenance message for users">

<button onclick="saveSettings()">
Save Settings
</button>

</div>


<div class="card">


<h3>
Admin Activity Logs
</h3>


<div id="logs">

Loading logs...

</div>


</div>




</div>



<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>




<script>


const firebaseConfig={


apiKey:"AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",

authDomain:"quantum-rio.firebaseapp.com",

databaseURL:"https://quantum-rio-default-rtdb.firebaseio.com",

projectId:"quantum-rio",

storageBucket:"quantum-rio.firebasestorage.app",

messagingSenderId:"805433999377",

appId:"1:805433999377:web:d0efa8c46ec4a0fa30f1b0"


};



if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.database();

let adminUID="";

let adminEmail="";





// ADMIN SECURITY


auth.onAuthStateChanged(user=>{


if(!user){

window.location.href="auth.html";

return;

}



adminUID=user.uid;

adminEmail=user.email;



db.ref("admins/"+adminUID)
.once("value")

.then(admin=>{

    if(!admin.exists()){

        showNotification("Access denied. Admins only.","error");

        setTimeout(()=>{
            window.location.href="auth.html";
        },1500);

        return;

    }

    loadLogs();
    loadSettings();

});


function showNotification(message,type="success"){

const box=document.getElementById("notification");

box.textContent=message;

box.className=type==="success"
? "show"
: "show "+type;

setTimeout(()=>{
box.className="";
},3000);

}


// LOAD LOGS


function loadLogs(){



db.ref("adminLogs")

.limitToLast(50)

.on("value",snap=>{


let html="";



let logs=[];



snap.forEach(child=>{


logs.push(child.val());


});



logs.reverse();




logs.forEach(log=>{



let time =
log.time
?
new Date(log.time).toLocaleString()
:
"Unknown";



html += `


<div class="log">


<b>
${log.action || "Action"}
</b>


<br>


User:
${log.user || "N/A"}


<br>


Admin:
${log.admin || "N/A"}


<br>


${time}


</div>


`;



});



document.getElementById("logs").innerHTML =
html || "No activity yet";



});



}





// CREATE LOG FUNCTION
// Use this function from other admin pages


function createLog(action,user){



db.ref("adminLogs").push({

action:action,

user:user,

admin:adminEmail,

adminUID:adminUID,

time:Date.now()


});


}
  function saveSettings(){

    db.ref("settings").update({

        platformStatus: document.getElementById("platformStatus").value,

        maintenanceMessage: document.getElementById("maintenanceMessage").value.trim(),

        updatedAt: firebase.database.ServerValue.TIMESTAMP,

        updatedBy: adminEmail

    })

    .then(()=>{

        createLog("Updated platform settings","SYSTEM");

        showNotification("Platform settings updated.");

    })

    .catch(error=>{

        showNotification(error.message,"error");

    });

        }
    function loadSettings(){

    db.ref("settings").once("value").then(snap=>{

        if(!snap.exists()) return;

        const settings = snap.val();

const status = settings.platformStatus || "online";

document.getElementById("platformStatus").value = status;

document.getElementById("maintenanceMessage").value =
settings.maintenanceMessage || "";

const statusText = document.getElementById("systemStatus");

statusText.textContent = status.toUpperCase();

statusText.style.color =
status === "online"
? "#16a34a"
: status === "maintenance"
? "#f59e0b"
: "#dc2626";


</script>


</body>

</html>
