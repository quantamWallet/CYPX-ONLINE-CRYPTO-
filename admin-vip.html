<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CYPX HOLDINGS - VIP Management</title>


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


<style>

body{

margin:0;
font-family:'Segoe UI',sans-serif;
background:#000814;
color:white;

}


.header{

padding:18px;
background:linear-gradient(90deg,#001d3d,#003566);
display:flex;
align-items:center;
gap:15px;

}


.header a{

color:white;
text-decoration:none;

}


.container{

padding:15px;

}


.vip-card{

background:#001a33;
padding:15px;
border-radius:15px;
margin-bottom:12px;

}


select,button{

padding:10px;
border-radius:10px;
border:none;

}


select{

width:100%;
margin:10px 0;

}


button{

background:#00e5ff;
font-weight:bold;

}


.vip{

color:#ffd700;
font-weight:bold;

}

</style>

</head>


<body>


<div class="header">

<a href="admin.html">

<i class="fas fa-arrow-left"></i>

</a>


<b>
<i class="fas fa-crown"></i>
VIP Management
</b>


</div>



<div class="container">


<div id="vipUsers">

Loading users...

</div>


</div>






<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>




<script>


const firebaseConfig={


apiKey:"AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",

authDomain:"quantum-rio.firebaseapp.com",

databaseURL:"https://quantum-rio-default-rtdb.firebaseio.com",

projectId:"quantum-rio",

storageBucket:"quantum-rio.firebasestorage.app",

messagingSenderId:"805433999377",

appId:"1:805433999377:web:d0efa8c46ec4a0fa30f1b0"

};



if(!firebase.apps.length){

firebase.initializeApp(firebaseConfig);

}



const auth=firebase.auth();

const db=firebase.database();


let adminEmail="";
let adminUID="";






auth.onAuthStateChanged(user=>{


if(!user){

window.location.href="auth.html";

return;

}


adminEmail=user.email;
adminUID=user.uid;



db.ref("admins/"+user.uid)

.once("value")

.then(admin=>{


if(!admin.exists()){


alert("Admin only");

window.location.href="auth.html";

return;

}


loadVIPUsers();


});


});









function loadVIPUsers(){


db.ref("users")

.on("value",snap=>{


let html="";



snap.forEach(child=>{


let user=child.val();

let uid=child.key;



let vip=getVip(user);



html += `


<div class="vip-card">


<p>
<b>Email:</b>

${user.email || "N/A"}

</p>



<p>

Current VIP:

<span class="vip">

${vip}

</span>


</p>





<select id="vip_${uid}">


<option value="0">
VIP0
</option>


<option value="1">
VIP1
</option>


<option value="2">
VIP2
</option>


<option value="3">
VIP3
</option>


<option value="4">
VIP4
</option>

<option value="5">
VIP5
</option>

<option value="6">
VIP6
</option>

<option value="7">
VIP7
</option>

<option value="8">
VIP8
</option>

<option value="9">
VIP9
</option>

<option value="10">
VIP10
</option>

<option value="11">
VIP11
</option>

<option value="12">
VIP12
</option>

<option value="13">
VIP13
</option>

<option value="14">
VIP14
</option>

<option value="15">
VIP15
</option>

</select>




<button onclick="updateVIP('${uid}')">

Update VIP

</button>


</div>



`;



});


document.getElementById("vipUsers").innerHTML=html;


});


}









function getVip(data){


let max=0;


if(data.vipLevels){


Object.keys(data.vipLevels)

.forEach(k=>{


if(data.vipLevels[k]){


let lvl=parseInt(k);


if(lvl>max)

max=lvl;


}


});


}


return "VIP"+max;


}









function updateVIP(uid){



let level =
document.getElementById("vip_"+uid)
.value;



db.ref("users/"+uid)

.update({

vipLevel:Number(level),

vipLevels:{


[level]:true


},


vipUpdatedAt:
firebase.database.ServerValue.TIMESTAMP,


vipUpdatedBy:
adminEmail


})

.then(()=>{



db.ref("adminLogs").push({


action:
"VIP changed to VIP"+level,


user:
uid,


admin:
adminEmail,


adminUID:
adminUID,


time:
Date.now()


});



alert(
"VIP updated"
);



});



}



</script>


</body>

</html>
