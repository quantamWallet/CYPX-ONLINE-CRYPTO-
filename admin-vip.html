<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>CYPX HOLDINGS - VIP Management</title>


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


<style>

body{

margin:0;
font-family:'Segoe UI',sans-serif;
background:#000814;

}


.header{

padding:18px;

}

.vip-card{

select,button{

select{

width:100%;
margin:10px 0;

}


button{

background:#00e5ff;

}


.vip{

color:#ffd700;

}
#notification{
position:fixed;
top:20px;
right:20px;
background:#16a34a;
color:#fff;
padding:14px 18px;
border-radius:10px;
font-weight:bold;
box-shadow:0 5px 20px rgba(0,0,0,.35);
opacity:0;
transform:translateY(-20px);
transition:.3s;
z-index:9999;
max-width:300px;
}

#notification.show{
opacity:1;
transform:translateY(0);
}

#notification.error{
background:#dc2626;
}

#notification.warning{
background:#f59e0b;
color:#000;
}
</style>

</head>

<div id="notification"></div>
<body>


<div class="header">

<a href="admin.html">

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>




<script>


const firebaseConfig={


apiKey:"AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",

authDomain:"quantum-rio.firebaseapp.com",

databaseURL:"https://quantum-rio-default-rtdb.firebaseio.com",

projectId:"quantum-rio",

storageBucket:"quantum-rio.firebasestorage.app",

messagingSenderId:"805433999377",

appId:"1:805433999377:web:d0efa8c46ec4a0fa30f1b0"

};



if(!firebase.apps.length){

firebase.initializeApp(firebaseConfig);

}



const auth=firebase.auth();

const db=firebase.database();


let adminEmail="";
let adminUID="";






auth.onAuthStateChanged(user=>{


if(!user){

window.location.href="auth.html";

return;

}


adminEmail=user.email;
adminUID=user.uid;



db.ref("admins/"+user.uid)

.once("value")

.then(admin=>{


if(!admin.exists()){


showNotification("Admin access required.","error");

window.location.href="auth.html";

return;

}


loadVIPUsers();


});


});









function loadVIPUsers(){


db.ref("users")

.on("value",snap=>{


let html="";



snap.forEach(child=>{


let user=child.val();

let uid=child.key;



let vip=getVip(user);



html += `


<div class="vip-card">


<p>
<b>Email:</b>

${user.email || "N/A"}

</p>



<p>

Current VIP:

<span class="vip">

${vip}

</span>


</p>





<select id="vip_${uid}">


<option value="0">
VIP0
</option>


<option value="1">
VIP1
</option>


<option value="2">

</option>


<option value="3">

</option>


<option value="4">

</option>

<option value="5">

</option>

</option>

<option value="7">
VIP7
</option>

<option value="8">
VIP8
</option>

<option value="9">
VIP9
</option>

VIP10
</option>

<option value="11">

</option>

<option value="12">
VIP12
</option>

<option value="13">
VIP13
</option>

<option value="14">
VIP14
</option>

<option value="15">
VIP15
</option>

</select>




<button onclick="updateVIP('${uid}')">

Update VIP

</button>


</div>



`;



});


document.getElementById("vipUsers").innerHTML=html;


});


}





function showNotification(message,type="success"){

    const box=document.getElementById("notification");

    box.className="";
    box.classList.add(type);
    box.classList.add("show");

    box.textContent=message;

    setTimeout(()=>{

        box.classList.remove("show");

    },3000);

}


function getVip(data){


let max=0;


if(data.vipLevels){


Object.keys(data.vipLevels)

.forEach(k=>{


if(data.vipLevels[k]){


let lvl=parseInt(k);


if(lvl>max)

max=lvl;


}


});


}


return "VIP"+max;


}






function updateVIP(uid){

    let level = Number(document.getElementById("vip_"+uid).value);

    let updates = {};

    updates["vipLevel"] = level;
    updates["vipLevels/" + level] = true;
    updates["vipUpdatedAt"] = firebase.database.ServerValue.TIMESTAMP;
    updates["vipUpdatedBy"] = adminEmail;

    db.ref("users/" + uid).update(updates)

    .then(()=>{

        db.ref("adminLogs").push({

            action:"VIP changed to VIP"+level,

            user:uid,

            admin:adminEmail,

            adminUID:adminUID,

            time:Date.now()

        });

        showNotification("VIP" + level + " unlocked successfully.");

    })

    .catch(error=>{

        showNotification(error.message,"error");

    });

  }
  

</script>


</body>

</html>
