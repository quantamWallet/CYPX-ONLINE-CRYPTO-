<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYPX Bot Trading</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<!-- Chart.js for price chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#0a0f1a;color:#fff;min-height:100vh;}
header{background:#001a33;padding:12px 15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #002f6c;}
.live-badge{background:#ff3b30;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:bold;display:flex;align-items:center;gap:6px;}
.live-badge .dot{width:8px;height:8px;background:#fff;border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.container{padding:15px;max-width:900px;margin:0 auto}
.stats{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
.stat-card{flex:1;background:#001a33;padding:15px;border-radius:12px;text-align:center;min-width:120px}
.stat-card small{color:#aaa;font-size:11px}
.stat-card h2{margin-top:5px;font-size:20px}
.stat-card .wins{color:#00ff88}
.stat-card .loss{color:#ff3b30}
.balance-card{background:linear-gradient(135deg,#001f3f,#003566);padding:20px;border-radius:16px;margin-bottom:15px}
.balance-card small{color:#aaa}
.balance-card h1{font-size:32px;color:#00d4ff;margin:8px 0}
.section-title{font-size:14px;margin:15px 0 8px;color:#aaa;font-weight:600}
.controls{display:flex;gap:10px;align-items:center;margin-bottom:15px;flex-wrap:wrap}
.select{flex:1}
.pair-info{min-width:140px;text-align:right;color:#9bdcff}
.start-btn{padding:12px 16px;background:linear-gradient(135deg,#00d4ff,#0099cc);border:none;border-radius:12px;color:#000;font-weight:bold;font-size:16px;cursor:pointer}
.start-btn:disabled{background:#333;color:#666;cursor:not-allowed}
.card{background:#001a33;padding:12px;border-radius:12px;margin-bottom:15px}
#chartWrapper{height:260px}
.pairs-list{display:flex;gap:8px;flex-wrap:wrap}
.pair-btn{padding:8px 12px;background:#07243b;border-radius:8px;cursor:pointer;color:#9bdcff;border:1px solid rgba(255,255,255,0.02)}
.pair-btn.active{background:linear-gradient(90deg,#003a63,#005b8a);color:#fff}
/* modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;z-index:999}
.modal-box{background:#001a33;padding:30px;border-radius:20px;text-align:center;border:2px solid #00d4ff;max-width:320px}
.modal-box h2{color:#00d4ff;margin:10px 0}
.modal-box .profit{font-size:32px;color:#00ff88;font-weight:bold}
/* responsive */
@media (max-width:600px){
  .balance-card h1{font-size:26px}
  #chartWrapper{height:220px}
  .pair-info{width:100%;text-align:left}
}
</style>
</head>
<body>
<header>
  <div><i class="fas fa-robot"></i> CYPX BOT</div>
  <div class="live-badge"><span class="dot"></span> Live Trading</div>
</header>
<div class="container">
  <div class="stats">
    <div class="stat-card"><small>SESSIONS</small><h2 id="sessions">0</h2></div>
    <div class="stat-card"><small>WINS</small><h2 class="wins" id="wins">0</h2></div>
    <div class="stat-card"><small>LOSSES</small><h2 class="loss" id="losses">0</h2></div>
  </div>
  <div class="balance-card">
    <small>CURRENT BALANCE</small>
    <h1 id="balance">$0.00</h1>
  </div>

  <div class="card">
    <div class="section-title">Select Trading Pair</div>
    <div class="controls">
      <div class="select">
        <select id="pairSelect" style="width:100%;padding:10px;border-radius:8px;background:#071b2a;border:1px solid rgba(255,255,255,0.03);color:#9bdcff">
          <option value="">-- Loading pairs --</option>
        </select>
      </div>
      <div class="pair-info" id="pairInfo">—</div>
      <button class="start-btn" id="startBtn" onclick="startTrade()" disabled><i class="fas fa-lock"></i> Select a Bot First</button>
    </div>
    <div class="section-title">Popular Pairs</div>
    <div class="pairs-list" id="pairsList">Loading...</div>
  </div>

  <div class="card">
    <div class="section-title">Price Chart</div>
    <div id="chartWrapper">
      <canvas id="priceChart" style="width:100%;height:100%;"></canvas>
    </div>
  </div>

</div>

<div class="modal" id="resultModal">
  <div class="modal-box">
    <i class="fas fa-check-circle" style="font-size:50px;color:#00ff88;" id="resultIcon"></i>
    <h2 id="resultTitle">Session Complete</h2>
    <div class="profit" id="profitText">+$100</div>
    <small>Updated to your balance</small>
    <button class="start-btn" style="margin-top:15px;" onclick="closeResultModal()">Continue</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.firebasestorage.app",
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
  measurementId: "G-4RSQXZJX44"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let userId = null;
let balance = 0;
let wins = 0, losses = 0, sessions = 0;
let botEarnings = 0;
let selectedPair = null;
let priceChart = null;

function formatMoney(n){ return "$" + Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2}); }

auth.signInAnonymously().catch(e=>console.log(e));
auth.onAuthStateChanged(user=>{
  if(user){
    userId = user.uid;
    loadUserData();
    // load market data after auth so we can save preferences per user if needed
    loadPairs();
  }
})

function saveUserData(updates){
  if(!userId) return;
  db.ref('users/'+userId).update(updates);
}

function loadUserData(){
  db.ref('users/'+userId).on('value', snap=>{
    const data = snap.val();
    if(data){
      balance = data.balance || 0;
      wins = data.wins || 0;
      losses = data.losses || 0;
      sessions = data.sessions || 0;
      botEarnings = data.botEarnings || 0;
    }else{
      db.ref('users/'+userId).set({
        balance: 6612.32,
        wins: 0,
        losses: 0,
        sessions: 0,
        botEarnings: 0
      });
      balance = 6612.32;
    }
    document.getElementById('balance').textContent = formatMoney(balance);
    updateStats();
  })
}

function updateStats(){
  document.getElementById('wins').textContent = wins;
  document.getElementById('losses').textContent = losses;
  document.getElementById('sessions').textContent = sessions;
}

// Load popular trading pairs from Binance public API
async function loadPairs(){
  try{
    const resp = await fetch('https://api.binance.com/api/v3/ticker/24hr');
    const data = await resp.json();
    // filter for USDT pairs and sort by quoteVolume
    const usdt = data.filter(d => d.symbol.endsWith('USDT'))
                     .sort((a,b)=>Number(b.quoteVolume)-Number(a.quoteVolume));
    const top = usdt.slice(0,12);

    const select = document.getElementById('pairSelect');
    select.innerHTML = '<option value="">-- Select Pair --</option>';
    const list = document.getElementById('pairsList');
    list.innerHTML = '';

    top.forEach(item=>{
      const opt = document.createElement('option');
      opt.value = item.symbol;
      opt.textContent = item.symbol;
      select.appendChild(opt);

      const btn = document.createElement('button');
      btn.className = 'pair-btn';
      btn.textContent = item.symbol;
      btn.onclick = ()=>{
        select.value = item.symbol;
        onPairChange();
        // visual active
        Array.from(list.children).forEach(c=>c.classList.remove('active'));
        btn.classList.add('active');
      };
      list.appendChild(btn);
    });

    select.onchange = onPairChange;

    // try to pre-select BTCUSDT or first symbol
    const pref = top.find(t=>t.symbol==='BTCUSDT') || top[0];
    if(pref){
      select.value = pref.symbol;
      onPairChange();
    }
  }catch(e){
    console.error('Failed to load pairs', e);
    document.getElementById('pairsList').textContent = 'Failed to load pairs';
  }
}

async function onPairChange(){
  const s = document.getElementById('pairSelect').value;
  selectedPair = s || null;
  const startBtn = document.getElementById('startBtn');
  if(selectedPair){
    startBtn.disabled = false;
    startBtn.innerHTML = '<i class="fas fa-play"></i> Start '+selectedPair;
  }else{
    startBtn.disabled = true;
    startBtn.innerHTML = '<i class="fas fa-lock"></i> Select a Bot First';
  }
  await loadChartForPair(selectedPair);
  await loadPairInfo(selectedPair);
}

async function loadPairInfo(symbol){
  const info = document.getElementById('pairInfo');
  if(!symbol){ info.textContent = '—'; return; }
  try{
    const res = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol='+symbol);
    const d = await res.json();
    info.innerHTML = `<div>${Number(d.lastPrice).toFixed(6)} <small style="color:#9bdcff">${Number(d.priceChangePercent).toFixed(2)}%</small></div>`;
  }catch(e){ console.warn(e); info.textContent = 'N/A'; }
}

async function loadChartForPair(symbol){
  if(!symbol) return clearChart();
  try{
    // request last 100 1h candles
    const resp = await fetch('https://api.binance.com/api/v3/klines?symbol='+symbol+'&interval=1h&limit=100');
    const klines = await resp.json();
    const labels = klines.map(k=>{ const t = new Date(k[0]); return t.getHours()+':'+('0'+t.getMinutes()).slice(-2); });
    const prices = klines.map(k=>Number(k[4])); // close

    renderChart(labels, prices, symbol);
  }catch(e){
    console.error('Chart load error', e);
  }
}

function clearChart(){
  if(priceChart){ priceChart.destroy(); priceChart=null; }
}

function renderChart(labels, data, symbol){
  const ctx = document.getElementById('priceChart').getContext('2d');
  if(priceChart) priceChart.destroy();
  priceChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: symbol || 'Price',
        data: data,
        borderColor: '#00d4ff',
        backgroundColor: 'rgba(0,212,255,0.08)',
        pointRadius: 0,
        borderWidth: 2,
        tension: 0.2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: { display: false },
        y: { ticks: { color: '#9bdcff' }, grid: { color: 'rgba(255,255,255,0.03)' } }
      },
      plugins: { legend: { display: false } }
    }
  });
}

function startTrade(){
  if(!selectedPair){ alert('Select a trading pair first'); return; }
  // keep previous simple random trading simulation
  const isWin = Math.random() > 0.3;
  const profit = isWin ? 100 : -50;
  balance += profit;
  botEarnings += profit;
  if(isWin) { wins++; } else { losses++; }
  sessions++;
  saveUserData({balance: balance, wins: wins, losses: losses, sessions: sessions, botEarnings: botEarnings});
  document.getElementById('resultIcon').style.color = isWin ? '#00ff88' : '#ff3b30';
  document.getElementById('resultTitle').textContent = isWin ? 'Session Win' : 'Session Loss';
  document.getElementById('profitText').textContent = (isWin ? '+' : '') + formatMoney(profit);
  document.getElementById('profitText').style.color = isWin ? '#00ff88' : '#ff3b30';
  document.getElementById('resultModal').style.display = 'flex';
}

function closeResultModal(){ document.getElementById('resultModal').style.display = 'none'; }

// If user navigates without auth, attempt to still show market data
loadPairs();

</script>
</body>
</html>
