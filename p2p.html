<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>CYPX P2P Marketplace</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:
radial-gradient(circle at top left,#1d4ed8 0%,transparent 35%),
radial-gradient(circle at top right,#06b6d4 0%,transparent 30%),
linear-gradient(180deg,#020617,#071426,#020617);
color:#fff;
min-height:100vh;
padding-bottom:100px;
overflow-x:hidden;
}

/* HEADER */

.header{
padding:22px;
font-size:28px;
font-weight:800;
text-align:center;
background:rgba(10,20,40,.75);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,.08);
box-shadow:0 0 30px rgba(59,130,246,.25);
}

.header::after{
content:"CYPX HOLDINGS";
display:block;
font-size:12px;
color:#7dd3fc;
letter-spacing:2px;
margin-top:4px;
}

/* TOP BUTTONS */

.top-tabs{
display:flex;
gap:12px;
padding:18px;
}

.market-btn{
flex:1;
height:55px;
border:none;
border-radius:16px;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.buy-tab{
background:linear-gradient(
135deg,
#00ffb3,
#00d084
);
color:#000;
box-shadow:
0 0 25px rgba(0,255,179,.35);
}

.buy-tab:hover{
transform:translateY(-2px);
}

.sell-tab{
background:rgba(255,255,255,.05);
color:#fff;
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(10px);
}

.sell-tab:hover{
background:rgba(255,255,255,.08);
}

/* MARKET */

.market-container{
padding:18px;
}

/* OFFER CARD */

.offer-card{
position:relative;
overflow:hidden;

background:
linear-gradient(
180deg,
rgba(255,255,255,.08),
rgba(255,255,255,.03)
);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:28px;

padding:22px;

margin-bottom:20px;

box-shadow:
0 10px 35px rgba(0,0,0,.45);
}

.offer-card::before{
content:"";
position:absolute;
top:-60px;
right:-60px;
width:140px;
height:140px;
border-radius:50%;
background:
radial-gradient(
circle,
rgba(0,255,170,.25),
transparent
);
}

.offer-card.active{
border-color:#00ffb3;
box-shadow:
0 0 0 1px rgba(0,255,170,.2),
0 0 35px rgba(0,255,170,.15);
}

/* TRADER TOP */

.offer-top{
display:flex;
align-items:center;
gap:15px;
margin-bottom:18px;
}

.avatar{
width:62px;
height:62px;
border-radius:50%;

background:
linear-gradient(
135deg,
#3b82f6,
#06b6d4
);

display:flex;
align-items:center;
justify-content:center;

font-size:24px;
font-weight:800;

box-shadow:
0 0 25px rgba(59,130,246,.45);
}

.trader-info h3{
font-size:19px;
font-weight:700;
}

.verify{
color:#facc15;
margin-left:6px;
}

.small{
color:#94a3b8;
font-size:13px;
margin-top:3px;
}

.country{
display:inline-block;
margin-top:8px;
padding:6px 12px;
border-radius:12px;
background:rgba(255,255,255,.05);
font-size:12px;
color:#cbd5e1;
}

/* PRICE */

.price{
color:#94a3b8;
font-size:14px;
margin-top:12px;
}

.price-value{
font-size:48px;
font-weight:800;
margin-top:4px;

background:
linear-gradient(
135deg,
#00ffb3,
#38bdf8
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* GRID */

.offer-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:18px;
}

.label{
color:#94a3b8;
font-size:13px;
}

.value{
font-weight:700;
font-size:15px;
}

/* PAYMENT */

.payment{
display:inline-flex;
align-items:center;
gap:8px;

margin-top:16px;

padding:10px 16px;

border-radius:14px;

background:
rgba(0,255,170,.08);

border:1px solid rgba(0,255,170,.25);

color:#00ffb3;

font-weight:700;
}

/* BUY BUTTON */

.buy-btn{
width:100%;
height:60px;

margin-top:22px;

border:none;
border-radius:16px;

background:
linear-gradient(
135deg,
#00ffb3,
#38bdf8
);

font-size:18px;
font-weight:800;
color:#000;

cursor:pointer;

transition:.3s;
}

.buy-btn:hover{
transform:translateY(-3px);
box-shadow:
0 0 30px rgba(0,255,179,.35);
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
backdrop-filter:blur(6px);

display:none;
justify-content:center;
align-items:center;

padding:20px;
z-index:9999;
}

.modal-content{
background:
linear-gradient(
180deg,
#08111f,
#0f172a
);

width:100%;
max-width:450px;

border-radius:25px;

padding:22px;

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 0 40px rgba(0,0,0,.5);
}

/* INPUTS */

.input,
.file-input{
width:100%;

background:#071426;

border:1px solid rgba(255,255,255,.08);

border-radius:14px;

padding:15px;

color:#fff;

margin-bottom:14px;
}

.input:focus{
outline:none;
border-color:#38bdf8;
}

/* SUBMIT */

.submit-btn{
width:100%;
height:58px;

border:none;

border-radius:15px;

font-size:18px;
font-weight:800;

background:
linear-gradient(
135deg,
#00ffb3,
#38bdf8
);

color:#000;

cursor:pointer;
}

/* CLOSE */

.close-btn{
width:100%;
height:52px;

margin-top:12px;

border:none;
border-radius:14px;

background:rgba(255,255,255,.08);

color:white;
}

/* NOTIFICATION */

.notice{
position:fixed;
top:20px;
left:50%;

transform:translateX(-50%);

background:
linear-gradient(
135deg,
#00ffb3,
#38bdf8
);

color:#000;

padding:15px 22px;

border-radius:14px;

font-weight:700;

z-index:10000;

display:none;

box-shadow:
0 0 30px rgba(0,255,170,.35);
}

/* ORDER BOX */

.order-box{
background:#071426;
border:1px solid rgba(255,255,255,.08);
padding:15px;
border-radius:16px;
margin-bottom:14px;
line-height:1.9;
}

.copy-btn{
background:
linear-gradient(
135deg,
#00ffb3,
#38bdf8
);

border:none;

padding:12px 18px;

border-radius:12px;

font-weight:700;

color:#000;
}

/* LOADER */

.loading{
text-align:center;
padding:50px;
color:#94a3b8;
font-size:15px;
}

</style>
</head>

<body>

<div id="notice" class="notice"></div>

<div class="header">
P2P Offers
</div>

<div class="top-tabs">
<button class="market-btn buy-tab">
Express Buy USDT
</button>

<button class="market-btn sell-tab">
Sell USDT
</button>
</div>

<div id="marketplace" class="market-container">

<div class="loading">
Loading marketplace...
</div>

</div>

<div id="orderModal" class="modal">

<div class="modal-content">

<h2>Buy USDT</h2>

<div id="selectedOffer"></div>

<input
type="number"
id="amount"
class="input"
placeholder="Amount (KES)"
>

<input
type="tel"
id="phone"
class="input"
placeholder="Phone Number"
>

<input
type="file"
id="receipt"
class="file-input"
accept="image/*"
>

<button
id="submitOrder"
class="submit-btn">
Submit Order
</button>

<button
id="closeModal"
class="close-btn">
Cancel
</button>

</div>

</div>
<script>

const firebaseConfig = {
apiKey:"AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
authDomain:"quantum-rio.firebaseapp.com",
databaseURL:"https://quantum-rio-default-rtdb.firebaseio.com",
projectId:"quantum-rio",
storageBucket:"quantum-rio.firebasestorage.app",
messagingSenderId:"805433999377",
appId:"1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
measurementId:"G-4RSQXZJX44"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

let uid = null;
let selectedOffer = null;

const marketplace =
document.getElementById("marketplace");

const modal =
document.getElementById("orderModal");

const selectedOfferBox =
document.getElementById("selectedOffer");

function notify(message){

const notice =
document.getElementById("notice");

notice.innerText = message;
notice.style.display = "block";

setTimeout(()=>{
notice.style.display = "none";
},2500);

}

auth.onAuthStateChanged(user=>{

if(user){

uid = user.uid;

loadMarketplace();

}else{

window.location.href = "signin.html";

}

});

async function loadMarketplace(){

marketplace.innerHTML = `
<div class="loading">
Loading Offers...
</div>
`;

try{

const snap =
await db.ref("p2pOffers").once("value");

if(!snap.exists()){

marketplace.innerHTML = `
<div class="offer-card">
No active offers found
</div>
`;

return;
}

marketplace.innerHTML = "";

snap.forEach(child=>{

const offer = child.val();

if(!offer.active) return;

const firstLetter =
offer.name.charAt(0).toUpperCase();

const card = document.createElement("div");

card.className =
"offer-card active";

card.innerHTML = `

<div class="offer-top">

<div class="avatar">
${firstLetter}
</div>

<div class="trader-info">

<h3>
${offer.name}
<span class="verify">
✓
</span>
</h3>

<div class="small">
${offer.orders || 0} orders |
${offer.completion || 100}% completion
</div>

<div class="country">
🌍 Kenya
</div>

</div>

</div>

<div class="price">
Price
</div>

<div class="price-value">
${offer.price}
<span style="
font-size:30px;
color:#fff;
">
KES
</span>
</div>

<div class="offer-grid">

<div class="label">
Available
</div>

<div class="value">
${offer.available}
USDT
</div>

<div class="label">
Limit
</div>

<div class="value">
KES ${Number(
offer.min
).toLocaleString()}
 -
KES ${Number(
offer.max
).toLocaleString()}
</div>

</div>

<div class="payment">
${offer.paymentMethod}
</div>

<button class="buy-btn">
Buy USDT
</button>

`;

card.querySelector(".buy-btn")
.addEventListener("click",()=>{

openOffer(offer);

});

marketplace.appendChild(card);

});

}catch(err){

console.error(err);

marketplace.innerHTML = `
<div class="offer-card">
Failed to load offers
</div>
`;

notify("Failed to load offers");

}

}

function openOffer(offer){

selectedOffer = offer;

selectedOfferBox.innerHTML = `

<div class="order-box">

<b>Trader:</b>
${offer.name}
<br>

<b>Payment:</b>
${offer.paymentMethod}
<br>

<b>Number:</b>
${offer.number}
<br>

<b>Price:</b>
${offer.price} KES

<br><br>

<button
class="copy-btn"
onclick="copyTraderNumber()">
Copy Number
</button>

</div>

`;

modal.style.display = "flex";

}

function copyTraderNumber(){

if(!selectedOffer) return;

navigator.clipboard.writeText(
selectedOffer.number
);

notify("Trader number copied");

}

document
.getElementById("closeModal")
.onclick = ()=>{

modal.style.display = "none";

};

</script>
<script>

/* SUBMIT ORDER */

document.getElementById("submitOrder").onclick = async () => {

if(!selectedOffer){
notify("Select an offer first");
return;
}

const amount =
Number(document.getElementById("amount").value);

const phone =
document.getElementById("phone").value.trim();

const receipt =
document.getElementById("receipt").files[0];

if(!amount || amount < selectedOffer.min){
notify(
"Minimum amount is KES " +
selectedOffer.min.toLocaleString()
);
return;
}

if(amount > selectedOffer.max){
notify(
"Maximum amount is KES " +
selectedOffer.max.toLocaleString()
);
return;
}

if(!phone){
notify("Enter phone number");
return;
}

if(!receipt){
notify("Upload payment receipt");
return;
}

try{

const btn =
document.getElementById("submitOrder");

btn.disabled = true;
btn.innerText = "Processing...";

notify("Uploading receipt...");

const orderId =
db.ref().push().key;

const orderRef =
"CYPX-" +
Math.floor(
100000 + Math.random() * 900000
);

console.log("Starting upload...");

const uploadTask =
await storage
.ref(
"receipts/" +
uid +
"/" +
orderId
)
.put(receipt);

console.log("Upload complete");

const receiptUrl =
await uploadTask.ref.getDownloadURL();

console.log("URL obtained");

const orderData = {

id: orderId,

uid: uid,

orderRef: orderRef,

amount: amount,

phone: phone,

traderName:
selectedOffer.name,

traderNumber:
selectedOffer.number,

paymentMethod:
selectedOffer.paymentMethod,

price:
selectedOffer.price,

receiptUrl:
receiptUrl,

status:
"awaiting_verification",

processing:
"awaiting_verification",

method:
"P2P",

type:
"deposit",

timestamp:
Date.now()

};

/* P2P ORDERS */

await db.ref(
"p2pOrders/" +
orderId
).set(orderData);

console.log("P2P Order saved");

/* USER DEPOSITS */

await db.ref(
"deposits/" +
uid +
"/" +
orderId
).set(orderData);

console.log("Deposit saved");

/* FINANCIAL */

await db.ref(
"financial/" +
uid +
"/" +
orderId
).set(orderData);

console.log("Financial saved");

notify(
"Order Created: " +
orderRef
);

setTimeout(()=>{

window.location.href =
"financial.html";

},1500);

}catch(error){

console.error(error);

notify(
error.message ||
"Order failed"
);

document
.getElementById("submitOrder")
.disabled = false;

document
.getElementById("submitOrder")
.innerText =
"Submit Order";

}

};
</script>

</body>
</html>
