<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>P2P Market Kenya</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:#e2e8f0;
}

.container{max-width:1100px;margin:auto;padding:20px;}
.header{font-size:22px;font-weight:bold;margin-bottom:10px;}
.rate{color:#94a3b8;margin-bottom:20px;}

.tabs{display:flex;gap:10px;margin-bottom:15px;}
.tab{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;background:#1e293b;color:white;}
.tab.active{background:#3b82f6;}

.market{display:grid;gap:10px;}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
}

.row{display:flex;justify-content:space-between;margin:5px 0;}

.badge{
font-size:12px;
padding:3px 8px;
border-radius:6px;
background:#273549;
margin-right:5px;
}

.mpesa{color:#22c55e;}
.airtel{color:#facc15;}

.buy{background:#22c55e;color:white;border:none;padding:8px 12px;border-radius:8px;}
.sell{background:#ef4444;color:white;border:none;padding:8px 12px;border-radius:8px;}

.small{color:#94a3b8;font-size:12px;}
</style>
</head>

<body>

<div class="container">
<div class="header">P2P Market Kenya</div>
<div class="rate">USD Rate: 1 = 130 KES</div>

<div class="tabs">
<button class="tab active" id="buyTab">Buy USD</button>
<button class="tab" id="sellTab">Sell USD</button>
</div>

<div id="market" class="market"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

/* ================= FIREBASE ================= */

const firebaseConfig = {
apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
authDomain: "quantum-rio.firebaseapp.com",
databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
projectId: "quantum-rio",
storageBucket: "quantum-rio.appspot.com",
messagingSenderId: "805433999377",
appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

/* ================= OFFERS ================= */

const offers = [
{ id:"1", name:"LANGAT Trader", trades:235, price:129, min:1000, max:100000, pay:["M-Pesa"], speed:"2m", asset:"USD", type:"buy", active:true },
{ id:"2", name:"LANGAT Trader", trades:235, price:131, min:1000, max:100000, pay:["M-Pesa"], speed:"2m", asset:"USD", type:"sell", active:true },
{ id:"3", name:"Pro Trader", trades:520, price:130, min:5000, max:250000, pay:["Equity Bank"], speed:"1m", asset:"USD", type:"buy", active:true },
{ id:"4", name:"Pro Trader", trades:520, price:132, min:5000, max:250000, pay:["Equity Bank"], speed:"1m", asset:"USD", type:"sell", active:true },
{ id:"5", name:"Nicel Trader", trades:140, price:128, min:1000, max:50000, pay:["Airtel Money"], speed:"3m", asset:"USD", type:"buy", active:true },
{ id:"6", name:"Nicel Trader", trades:140, price:130, min:1000, max:50000, pay:["Airtel Money"], speed:"3m", asset:"USD", type:"sell", active:true }
];

/* ================= STATE ================= */

let mode = "buy";
let user = null;
let authReady = false;

/* ================= AUTH FIX ================= */

onAuthStateChanged(auth, u => {
user = u;
authReady = true;
});

/* ================= UI ================= */

const buyTab = document.getElementById("buyTab");
const sellTab = document.getElementById("sellTab");

buyTab.onclick = () => setMode("buy");
sellTab.onclick = () => setMode("sell");

function setMode(m){
mode = m;
buyTab.classList.toggle("active", m==="buy");
sellTab.classList.toggle("active", m==="sell");
render();
}

/* ================= RENDER ================= */

function render(){

const el = document.getElementById("market");
el.innerHTML = "";

offers
.filter(o => o.active && o.type === mode)
.forEach(o => {

const pay = (o.pay || []).map(p => {
const cls = p.toLowerCase().includes("mpesa") ? "mpesa" :
p.toLowerCase().includes("airtel") ? "airtel" : "";
return `<span class="badge ${cls}">${p}</span>`;
}).join("");

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<div class="row">
<strong>${o.name}</strong>
<span class="small">${o.asset}</span>
</div>

<div class="row">
<div><b>${o.price}</b> KES</div>
<div>${pay}</div>
</div>

<div class="row small">
<span>${o.speed}</span>
<span>${o.trades} trades</span>
</div>

<div class="row">
<button class="${mode==="buy"?"buy":"sell"}"
onclick="trade('${o.id}')">
${mode==="buy"?"Buy":"Sell"} USD
</button>
</div>
`;

el.appendChild(card);
});

}

/* ================= FIXED TRADE ================= */

window.trade = async (id) => {

if(!authReady){
alert("Loading session...");
return;
}

if(!user){
alert("Please login first");
return;
}

const offer = offers.find(o => o.id === id);

if(!offer){
alert("Offer not found");
return;
}

const kes = 1000;
const usd = kes / 130;

const tradeId = push(ref(db,"trades")).key;

await set(ref(db,"trades/"+tradeId), {
id: tradeId,
buyer: user.uid,
seller: offer.name,
offerId: offer.id,
amountKES: kes,
amountUSD: usd,
status: "PENDING",
createdAt: Date.now()
});

alert("Trade created successfully");
};

render();

</script>

</body>
</html>
