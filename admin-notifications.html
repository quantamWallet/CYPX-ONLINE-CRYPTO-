<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CYPX Admin - In-App Notifications</title>
  <style>
    body { font-family: Arial; background: #0a0a0a; color: #fff; padding: 20px; }
    input, textarea, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #222; color: #fff; box-sizing: border-box; }
    button { background: #00d4ff; color: #000; font-weight: bold; cursor: pointer; }
    button:hover { background: #00aacc; }
    button:disabled { background: #333; color: #777; cursor: not-allowed; }
 .box { background: #1a1a1a; padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; }
 .log { background: #000; padding: 10px; border-radius: 8px; height: 200px; overflow-y: scroll; font-size: 12px; border: 1px solid #222; }
 .templates { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
 .templates button { background: #333; color: #fff; margin: 0; font-size: 12px; }
 .templates button:hover { background: #444; }
   label { font-size: 13px; color: #aaa; }
 .user-count { font-size: 12px; color: #00d4ff; }
 .admin-info { background: #111; padding: 8px; border-radius: 6px; font-size: 12px; margin-bottom: 10px; border: 1px solid #00d4ff; }
  </style>
</head>
<body>
  <div class="box">
    <h2>📢 CYPX In-App Admin Panel</h2>
    <div class="admin-info" id="adminInfo">Checking login...</div>

    <label>Quick Templates</label>
    <div class="templates">
      <button type="button" onclick="fillTemplate('deposit')">Deposit ✅</button>
      <button type="button" onclick="fillTemplate('withdraw')">Withdraw 💸</button>
      <button type="button" onclick="fillTemplate('vip')">VIP 🔓</button>
      <button type="button" onclick="fillTemplate('copy')">Copy Trade 📈</button>
    </div>

    <label>Select User <span class="user-count" id="userCount"></span></label>
    <select id="uid">
      <option value="">-- Loading users... --</option>
      <option value="all">📢 ALL USERS - Broadcast</option>
    </select>

    <label>Title</label>
    <input type="text" id="title" value="CYPX HOLDINGS">

    <label>Message</label>
    <textarea id="body" rows="3" placeholder="Your message here"></textarea>

    <button id="sendBtn">Send In-App Notification</button>

    <h3>Log</h3>
    <div class="log" id="log"></div>
  </div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, push, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
    authDomain: "quantum-rio.firebaseapp.com",
    databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
    projectId: "quantum-rio",
    storageBucket: "quantum-rio.firebasestorage.app",
    messagingSenderId: "805433999377",
    appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
    measurementId: "G-4RSQXZJX44"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);
  const logEl = document.getElementById('log');
  const sendBtn = document.getElementById('sendBtn');
  const uidSelect = document.getElementById('uid');
  const userCountEl = document.getElementById('userCount');
  const adminInfoEl = document.getElementById('adminInfo');

  function log(msg) {
    logEl.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
    logEl.scrollTop = logEl.scrollHeight;
  }

  // 1. CHECK LOGIN AND ADMIN ROLE FROM admins/UID
  onAuthStateChanged(auth, async (user) => {
    if(!user) {
      adminInfoEl.innerHTML = `❌ Not logged in. Login with your admin account first.`;
      sendBtn.disabled = true;
      uidSelect.disabled = true;
      return;
    }

    const adminSnap = await get(ref(db, `admins/${user.uid}`)); // <-- reads from admins/UID
    if(adminSnap.exists() && (adminSnap.val().role === 'admin' || adminSnap.val().role === 'superadmin')){
      adminInfoEl.innerHTML = `✅ ${user.email} | Role: ${adminSnap.val().role}`;
      loadUsers();
    } else {
      adminInfoEl.innerHTML = `❌ Access Denied. UID ${user.uid} not found in /admins`;
      sendBtn.disabled = true;
      uidSelect.disabled = true;
    }
  });

  // 2. REALTIME: Load all users from users/UID
  function loadUsers(){
    const usersRef = ref(db, 'users');
    onValue(usersRef, (snapshot) => {
      uidSelect.innerHTML = `<option value="">-- Select User --</option><option value="all">📢 ALL USERS - Broadcast</option>`;
      let count = 0;
      if(snapshot.exists()) {
        snapshot.forEach(userSnap => {
          count++;
          const uid = userSnap.key;
          const data = userSnap.val() || {};
          const name = data.fullName || data.name || data.email || data.phone || uid;
          const option = document.createElement('option');
          option.value = uid;
          option.textContent = `${name} | ${uid}`;
          uidSelect.appendChild(option);
        });
        log(`✅ Loaded ${count} users from users/`);
      } else {
        log(`❌ No data found at /users.`);
      }
      userCountEl.innerText = `(${count} users)`;
    }, (error) => {
      log(`❌ Firebase Read Error: ${error.message}`);
    });
  }

  // 3. SEND NOTIFICATION FUNCTION
  window.sendInAppNotification = async (uid, title, body, type = "manual") => {
    const notification = {
      title, body, type, read: false,
      timestamp: Date.now(),
      url: "https://quantamwallet.github.io/CYPX-ONLINE-CRYPTO-/dashboard.html"
    };
    await push(ref(db, `notifications/${uid}`), notification);
  }

  window.fillTemplate = (type) => {
    const templates = {
      deposit: {title: "Deposit Successful ✅", body: "KSH 5,000 has been added to your CYPX wallet."},
      withdraw: {title: "Withdrawal Processed 💸", body: "Your withdrawal of KSH 2,000 is on the way to M-PESA."},
      vip: {title: "VIP Level Unlocked 🔓", body: "Congrats! You are now VIP 3. Higher returns unlocked."},
      copy: {title: "New Copy Trade 📈", body: "Pro Trader 'AlphaFX' just opened a BTC trade. Auto-copied."}
    };
    if(templates[type]) {
      document.getElementById('title').value = templates[type].title;
      document.getElementById('body').value = templates[type].body;
    }
  }

  sendBtn.addEventListener('click', async () => {
    const uid = document.getElementById('uid').value.trim();
    const title = document.getElementById('title').value.trim();
    const body = document.getElementById('body').value.trim();
    if(!uid ||!title ||!body) return log("❌ Fill all fields");

    sendBtn.disabled = true;
    sendBtn.innerText = "Sending...";

    try {
      if(uid.toLowerCase() === 'all') {
        log("Broadcasting to ALL users...");
        const snap = await get(ref(db, 'users'));
        if(!snap.exists()) return log("❌ No users found");
        const promises = [];
        snap.forEach(userSnap => {
          promises.push(window.sendInAppNotification(userSnap.key, title, body, "broadcast"));
        });
        await Promise.all(promises);
        log(`✅ Sent to ${promises.length} users`);
      } else {
        await window.sendInAppNotification(uid, title, body, "manual");
        log("✅ Sent to " + uid);
      }
    } catch(err) {
      log("❌ Error: " + err.message);
    }
    sendBtn.disabled = false;
    sendBtn.innerText = "Send In-App Notification";
  });
  </script>
</body>
</html>
