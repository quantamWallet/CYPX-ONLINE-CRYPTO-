<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CYPX Admin - Notifications</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body {
      font-family: 'Segoe UI', Arial;
      background: linear-gradient(160deg,#050e1a 0%,#001f3f 100%);
      color: #fff;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    /* ANDROID HEADER */
   .appbar{
      background:rgba(0,47,108,0.9);
      backdrop-filter:blur(10px);
      padding:16px;
      display:flex;
      align-items:center;
      gap:12px;
      border-bottom:1px solid rgba(0,212,255,0.2);
      position:sticky;
      top:0;
      z-index:10;
    }
   .appbar h2{font-size:18px;font-weight:800;flex:1;}

   .container {
      flex:1;
      padding: 16px;
      overflow-y:auto;
      padding-bottom:100px;
    }

   .card {
      background: rgba(0,26,51,0.7);
      padding: 16px;
      border-radius: 16px;
      margin-bottom:16px;
      border:1px solid rgba(0,212,255,0.1);
    }

    input, textarea, select {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: #0b1b2d;
      color: #fff;
      font-size:15px;
    }
    input:focus, textarea:focus, select:focus{border-color:#00d4ff;outline:none;}

    button {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg,#00d4ff,#0099cc);
      color: #000;
      font-weight: 800;
      cursor: pointer;
      font-size:16px;
    }
    button:hover { transform:scale(1.02); }
    button:disabled { background: #333; color: #777; cursor: not-allowed; }

   .log {
      background: #000;
      padding: 12px;
      border-radius: 12px;
      height: 180px;
      overflow-y: scroll;
      font-size: 12px;
      border: 1px solid #222;
      font-family: monospace;
    }

   .templates { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
   .templates button {
      background: rgba(0,43,92,0.8);
      color: #fff;
      margin: 0;
      font-size: 13px;
      padding:12px;
      border:1px solid rgba(0,212,255,0.2);
    }
   .templates button:hover { background: #004a99; }

    label { font-size: 13px; color: #00d4ff; font-weight:600; margin-top:8px;display:block; }
   .user-count { font-size: 12px; color: #25d366; }
   .admin-info {
      background: rgba(0,212,255,0.1);
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      border: 1px solid #00d4ff;
    }

   .broadcast-btn{
      background: linear-gradient(135deg,#ff9500,#ff3b30);
      color:#fff;
    }
  </style>
</head>
<body>
  <div class="appbar">
    <i class="fas fa-bullhorn"></i>
    <h2>CYPX Admin Panel</h2>
  </div>

  <div class="container">
    <div class="admin-info" id="adminInfo"><i class="fas fa-spinner fa-spin"></i> Checking login...</div>

    <div class="card">
      <label><i class="fas fa-wand-magic-sparkles"></i> Quick Templates</label>
      <div class="templates">
        <button type="button" onclick="fillTemplate('deposit')"><i class="fas fa-wallet"></i> Deposit</button>
        <button type="button" onclick="fillTemplate('withdraw')"><i class="fas fa-money-bill-transfer"></i> Withdraw</button>
        <button type="button" onclick="fillTemplate('vip')"><i class="fas fa-crown"></i> VIP</button>
        <button type="button" onclick="fillTemplate('copy')"><i class="fas fa-chart-line"></i> Copy Trade</button>
      </div>
    </div>

    <div class="card">
      <label><i class="fas fa-user-group"></i> Select User <span class="user-count" id="userCount"></span></label>
      <select id="uid">
        <option value="">-- Loading users... --</option>
        <option value="all">📢 ALL USERS - Broadcast</option>
      </select>

      <label><i class="fas fa-heading"></i> Title</label>
      <input type="text" id="title" value="CYPX HOLDINGS">

      <label><i class="fas fa-message"></i> Message</label>
      <textarea id="body" rows="4" placeholder="Type your notification message..."></textarea>

      <button id="sendBtn"><i class="fas fa-paper-plane"></i> Send Notification</button>
      <button class="broadcast-btn" onclick="quickBroadcast()"><i class="fas fa-broadcast-tower"></i> Quick Broadcast to ALL</button>
    </div>

    <div class="card">
      <h3 style="font-size:15px;margin-bottom:8px;"><i class="fas fa-terminal"></i> Activity Log</h3>
      <div class="log" id="log"></div>
    </div>
  </div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, push, onValue, get, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
    authDomain: "quantum-rio.firebaseapp.com",
    databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
    projectId: "quantum-rio",
    storageBucket: "quantum-rio.firebasestorage.app",
    messagingSenderId: "805433999377",
    appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
    measurementId: "G-4RSQXZJX44"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);
  const logEl = document.getElementById('log');
  const sendBtn = document.getElementById('sendBtn');
  const uidSelect = document.getElementById('uid');
  const userCountEl = document.getElementById('userCount');
  const adminInfoEl = document.getElementById('adminInfo');

  function log(msg, type='info') {
    const color = type === 'error'? '#ff5555' : type === 'success'? '#00ff88' : '#aaa';
    const icon = type === 'error'? '❌' : type === 'success'? '✅' : 'ℹ️';
    logEl.innerHTML += `<span style="color:${color}">${icon} [${new Date().toLocaleTimeString()}] ${msg}</span><br>`;
    logEl.scrollTop = logEl.scrollHeight;
  }

  onAuthStateChanged(auth, async (user) => {
    if(!user) {
      adminInfoEl.innerHTML = `❌ Not logged in`;
      sendBtn.disabled = true;
      uidSelect.disabled = true;
      return;
    }
    const adminSnap = await get(ref(db, `admins/${user.uid}`));
    if(adminSnap.exists() && ['admin','superadmin'].includes(adminSnap.val().role)){
      adminInfoEl.innerHTML = `✅ ${user.email} | <b>${adminSnap.val().role}</b>`;
      loadUsers();
    } else {
      adminInfoEl.innerHTML = `❌ Access Denied`;
      sendBtn.disabled = true;
      uidSelect.disabled = true;
    }
  });

  function loadUsers(){
    const usersRef = ref(db, 'users');
    onValue(usersRef, (snapshot) => {
      uidSelect.innerHTML = `<option value="">-- Select User --</option><option value="all">📢 ALL USERS - Broadcast</option>`;
      let count = 0;
      if(snapshot.exists()) {
        snapshot.forEach(userSnap => {
          count++;
          const uid = userSnap.key;
          const data = userSnap.val() || {};
          const name = data.fullName || data.name || data.email || data.phone || uid.substring(0,8);
          const option = document.createElement('option');
          option.value = uid;
          option.textContent = `${name} - ${uid.substring(0,8)}`;
          uidSelect.appendChild(option);
        });
        log(`Loaded ${count} users`, 'success');
      } else {
        log(`No users found in /users`, 'error');
      }
      userCountEl.innerText = `(${count} users)`;
    });
  }

  async function sendInAppNotification(uid, title, body, type = "manual") {
    const notification = {
      title, body, type, read: false,
      timestamp: Date.now(),
      url: "dashboard.html"
    };
    const notifRef = ref(db, `notifications/${uid}`);
    const newNotifRef = push(notifRef);
    await set(newNotifRef, notification);
    return newNotifRef.key;
  }

  window.fillTemplate = (type) => {
    const templates = {
      deposit: {title: "Deposit Successful ✅", body: "KSH 5,000 has been added to your CYPX wallet."},
      withdraw: {title: "Withdrawal Processed 💸", body: "Your withdrawal of KSH 2,000 is on the way to M-PESA."},
      vip: {title: "VIP Level Unlocked 🔓", body: "Congrats! You are now VIP 3. Higher returns unlocked."},
      copy: {title: "New Copy Trade 📈", body: "Pro Trader 'AlphaFX' just opened a BTC trade. Auto-copied."}
    };
    if(templates[type]) {
      document.getElementById('title').value = templates[type].title;
      document.getElementById('body').value = templates[type].body;
    }
  }

  // QUICK BROADCAST BUTTON
  window.quickBroadcast = () => {
    document.getElementById('uid').value = "all";
    sendNotification();
  }

  async function sendNotification(){
    const uid = document.getElementById('uid').value.trim();
    const title = document.getElementById('title').value.trim();
    const body = document.getElementById('body').value.trim();
    if(!uid ||!title ||!body) return log("Fill all fields", 'error');

    sendBtn.disabled = true;
    sendBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Sending...`;

    try {
      if(uid.toLowerCase() === 'all') {
        log("Broadcasting to ALL users...", 'info');
        const snap = await get(ref(db, 'users'));
        if(!snap.exists()) return log("No users found", 'error');
        let successCount = 0;
        const usersData = snap.val();
        for(const userUid in usersData){
          await sendInAppNotification(userUid, title, body, "broadcast");
          successCount++;
        }
        log(`Broadcast sent to ${successCount} users`, 'success');
      } else {
        const key = await sendInAppNotification(uid, title, body, "manual");
        log(`Sent to ${uid.substring(0,8)}. ID: ${key}`, 'success');
      }
      document.getElementById('body').value = ""; // clear after send
    } catch(err) {
      log("Error: " + err.message, 'error');
    }
    sendBtn.disabled = false;
    sendBtn.innerHTML = `<i class="fas fa-paper-plane"></i> Send Notification`;
  }

  sendBtn.addEventListener('click', sendNotification);
  </script>
</body>
  </html>
