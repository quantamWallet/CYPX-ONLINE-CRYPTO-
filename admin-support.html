<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYPX Admin Support</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<style>
body{background:#0a0f1a;color:#fff;font-family:Arial;margin:0;display:flex;height:100vh;overflow:hidden;}
.sidebar{width:320px;background:#001f3f;border-right:1px solid #002f6c;display:flex;flex-direction:column;}
.sidebar header{padding:15px;background:#002f6c;font-weight:bold;text-align:center;}
.support-list{flex:1;overflow-y:auto;padding:10px;}
.support-user{padding:12px;background:#001a33;margin-bottom:8px;border-radius:10px;cursor:pointer;transition:0.2s;}
.support-user:hover{background:#002b5c;}
.support-user.active{border:2px solid #00d4ff;background:#002b5c;}
.support-user .last-msg{font-size:12px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.support-user .time{font-size:10px;color:#00d4ff;}
.chat-area{flex:1;display:flex;flex-direction:column;}
.chat-area header{padding:15px;background:#002f6c;display:flex;justify-content:space-between;align-items:center;}
.chat-box{flex:1;overflow-y:auto;padding:20px;background:rgba(0,0,0,0.2);}
.msg{margin:8px 0;padding:12px 15px;border-radius:16px;max-width:70%;word-wrap:break-word;font-size:14px;}
.user-msg{background:#333;color:#fff;margin-right:auto;border-bottom-left-radius:4px;}
.admin-msg{background:#00d4ff;color:#000;margin-left:auto;border-bottom-right-radius:4px;}
.input-box{display:flex;gap:10px;padding:15px;background:#001a33;}
.input-box input{flex:1;padding:12px;border-radius:10px;border:none;background:#222;color:#fff;outline:none;}
.input-box button{padding:12px 20px;border:none;border-radius:10px;background:#00d4ff;color:#000;font-weight:bold;cursor:pointer;}
.no-chat{display:flex;align-items:center;justify-content:center;height:100%;color:#555;font-size:18px;}
.logout{color:#ff6b6b;text-decoration:none;font-size:14px;}

/* MOBILE FIX */
@media (max-width: 768px){
  body{flex-direction:column;}
  .sidebar{width:100%;height:40%;}
  .chat-area{height:60%;}
}
</style>
</head>
<body>

<div class="sidebar">
  <header><i class="fas fa-headset"></i> Support Desk</header>
  <div class="support-list" id="supportList">Loading chats...</div>
</div>

<div class="chat-area">
  <header>
    <span id="chatHeader">Select a chat</span>
    <a href="admin.html" class="logout"><i class="fas fa-arrow-left"></i> Back</a>
  </header>
  <div class="chat-box" id="chatBox">
    <div class="no-chat">Select a user to start chatting</div>
  </div>
  <div class="input-box" id="inputBox" style="display:none;">
    <input type="text" id="adminMsgInput" placeholder="Type your reply...">
    <button id="sendAdminMsg"><i class="fas fa-paper-plane"></i> Send</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-compat.js"></script>
<script>
const firebaseConfig = {  
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",  
  authDomain: "quantum-rio.firebaseapp.com",  
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",  
  projectId: "quantum-rio",  
  storageBucket: "quantum-rio.firebasestorage.app",  
  messagingSenderId: "805433999377",  
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",  
  measurementId: "G-4RSQXZJX44"  
};  
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let currentChatUID = null;

auth.onAuthStateChanged(async user=>{
  if(!user) return location.href="auth.html";
  
  const adminSnap = await db.ref(`admins/${user.uid}`).once('value');
  if(!adminSnap.exists() || !['admin','superadmin'].includes(adminSnap.val().role)){
    alert("Access Denied. You are not admin");
    return location.href="dashboard.html";
  }

  loadSupportChats();
})

function loadSupportChats(){
  const supportRef = db.ref('support_chats');
  supportRef.on("value", snap=>{
    const supportList = document.getElementById('supportList');
    if(!snap.exists()){ 
      supportList.innerHTML="<div style='text-align:center;color:#555;padding:20px;'>No chats yet.<br>Wait for user to message</div>"; 
      return; 
    }
    
    supportList.innerHTML="";
    snap.forEach(userChat=>{
      const uid = userChat.key;
      let lastMsg = "No messages";
      let lastTime = 0;
      let unread = 0;
      
      userChat.forEach(msg=>{ 
        const m = msg.val();
        lastMsg = m.message; 
        lastTime = m.timestamp;
        if(m.sender === "user" && !m.read) unread++;
      });
      
      const div = document.createElement('div');
      div.className = "support-user";
      div.innerHTML = `
        <b>${uid.substring(0,8)}...</b> ${unread>0? `<span style="background:red;padding:2px 6px;border-radius:10px;font-size:10px;float:right;">${unread}</span>`:''}
        <div class="last-msg">${lastMsg}</div>
        <div class="time">${new Date(lastTime).toLocaleTimeString()}</div>
      `;
      div.onclick = ()=> openSupportChat(uid, div);
      supportList.appendChild(div);
    })
  }, err=>{
    document.getElementById('supportList').innerHTML = "Error: " + err.message;
    console.log(err)
  })
}

function openSupportChat(uid, el){
  currentChatUID = uid;
  document.querySelectorAll('.support-user').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('chatHeader').textContent = "Chatting with: " + uid.substring(0,8);
  document.getElementById('inputBox').style.display="flex";
  
  const chatRef = db.ref(`support_chats/${uid}`);
  
  chatRef.on("value", snap=>{
    const chatBox = document.getElementById('chatBox');
    chatBox.innerHTML="";
    if(!snap.exists()){ chatBox.innerHTML='<div class="no-chat">No messages yet</div>'; return; }
    
    snap.forEach(child=>{
      const m = child.val();
      const div = document.createElement("div");
      div.className = "msg " + (m.sender==="admin"?"admin-msg":"user-msg");
      const time = new Date(m.timestamp).toLocaleTimeString();
      div.innerHTML = `${m.message}<div style="font-size:10px;opacity:0.7;margin-top:4px;">${time}</div>`;
      chatBox.appendChild(div);
      
      if(m.sender === "user" && !m.read){
        db.ref(`support_chats/${uid}/${child.key}/read`).set(true);
      }
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  })
}

document.getElementById('sendAdminMsg').onclick = sendReply;
document.getElementById('adminMsgInput').addEventListener("keypress", e=>{ if(e.key==="Enter") sendReply() })

function sendReply(){
  const text = document.getElementById('adminMsgInput').value.trim();
  if(!text || !currentChatUID) return;
  db.ref(`support_chats/${currentChatUID}`).push({
    sender: "admin",
    message: text,
    timestamp: Date.now(),
    read: true
  });
  document.getElementById('adminMsgInput').value="";
}
</script>
</body>
  </html>
