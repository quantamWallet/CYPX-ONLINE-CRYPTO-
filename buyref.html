<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CYPX HOLDINGS - Secure P2P</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
background: linear-gradient(135deg,#050b18,#061a33,#000814);
color:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

/* HEADER */
header{
font-size:22px;
font-weight:bold;
color:#00e0ff;
margin-top:10px;
text-align:center;
}

/* LOADING */
.loading-screen{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000814;
z-index:9999;
font-size:14px;
color:#00e0ff;
}

/* CARD */
.card{
width:100%;
max-width:440px;
background: rgba(10,25,45,0.95);
border:1px solid rgba(0,224,255,0.15);
border-radius:18px;
padding:20px;
margin-top:18px;
box-shadow:0 10px 35px rgba(0,0,0,0.6);
}

/* TITLE */
h2{
color:#ffd700;
font-size:18px;
margin-bottom:8px;
}

.price{
font-size:22px;
font-weight:bold;
color:#00ff88;
margin-bottom:12px;
}

/* INFO */
.info{
background:#071a2e;
padding:12px;
border-radius:12px;
font-size:14px;
line-height:1.6;
margin-bottom:12px;
color:#cfe6ff;
border:1px solid rgba(255,255,255,0.05);
}

/* MPESA */
.mpesa{
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(90deg,#004aad,#007bff);
padding:12px;
border-radius:10px;
font-weight:bold;
margin:12px 0;
}

/* COPY BUTTON */
.copy-btn{
background:#00e0ff;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

/* INPUTS - FIXED VISIBILITY */
input{
width:100%;
padding:13px;
margin-top:10px;
border:1px solid rgba(255,255,255,0.15);
border-radius:10px;
background:#0b1f35;
color:#fff;
outline:none;
font-size:14px;
}

input:focus{
border-color:#00e0ff;
box-shadow:0 0 10px rgba(0,224,255,0.3);
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
font-weight:bold;
font-size:15px;
cursor:pointer;
background:linear-gradient(90deg,#00e0ff,#007bff);
color:#001a33;
transition:0.2s;
}

button:hover{
transform:translateY(-2px);
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#28a745;
padding:10px 15px;
border-radius:8px;
display:none;
font-weight:bold;
}

/* FOOTER */
footer{
margin-top:20px;
font-size:12px;
color:#7f93ad;
}
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div class="loading-screen" id="loading">Checking session...</div>

<header>CYPX HOLDINGS</header>

<div class="card">

<h2 id="packageTitle">Package</h2>
<div class="price" id="packagePrice"></div>

<div class="info">
<p id="packageInfo"></p>

<p><b>Pay To:</b></p>

<div class="mpesa">
<span>0707207201</span>
<button class="copy-btn" onclick="navigator.clipboard.writeText('0707207201')">Copy</button>
</div>

<p><b>Account Name:</b> LANGAT ROBERT</p>
</div>

<label>Amount Paid</label>
<input type="number" id="amount" placeholder="Enter amount">

<label>Phone Number</label>
<input type="text" id="phone" placeholder="07XXXXXXXX">

<button id="submitBtn">Confirm Payment</button>

</div>

<footer>© 2026 CYPX HOLDINGS — Secure P2P System</footer>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyC...",
authDomain: "quantum-rio.firebaseapp.com",
databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
projectId: "quantum-rio"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let uid = null;

/* PACKAGE DATA */
const url = new URL(window.location.href);
const group = url.searchParams.get("group") || "Unknown";
const price = parseInt(url.searchParams.get("price") || "0");

document.getElementById("packageTitle").innerText = group;
document.getElementById("packagePrice").innerText = price.toLocaleString() + " KSH";
document.getElementById("packageInfo").innerText =
"You selected " + group;

/* AUTH - FIXED (NO INSTANT REDIRECT BUG) */
onAuthStateChanged(auth, (user) => {

document.getElementById("loading").style.display = "none";

if (user) {
uid = user.uid;
} else {
setTimeout(() => {
window.location.href = "landing.html";
}, 500);
}

});

/* SUBMIT */
document.getElementById("submitBtn").addEventListener("click", async () => {

if (!uid) return showToast("Please wait...", false);

const amount = parseInt(document.getElementById("amount").value);
const phone = document.getElementById("phone").value.trim();

if (!amount || amount < price) return showToast("Minimum " + price, false);
if (!/^(07\d{8}|01\d{8})$/.test(phone)) return showToast("Invalid phone", false);

try {

await set(push(ref(db, "referralPurchases/" + uid)), {
group,
price,
amount,
phone,
status: "pending",
createdAt: Date.now()
});

await set(ref(db, "userPackages/" + uid), {
group,
price,
status: "pending_activation",
createdAt: Date.now()
});

showToast("Payment submitted");

setTimeout(() => {
window.location.href = "financial.html?group=" + encodeURIComponent(group);
}, 1200);

} catch (e) {
showToast("Error submitting", false);
}

});

/* TOAST */
function showToast(msg, ok = true) {
const t = document.getElementById("toast");
t.innerText = msg;
t.style.background = ok ? "#28a745" : "#e53935";
t.style.display = "block";
setTimeout(() => t.style.display = "none", 2000);
}
</script>

</body>
</html>
