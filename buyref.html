<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>M-Pesa Deposit - CYPX</title>

<style>
body{
  margin:0;
  font-family: 'Inter', Arial, sans-serif;
  background: radial-gradient(circle at top, #003366, #001f3f);
  color:#fff;
}

/* HEADER */
header{
  text-align:center;
  padding:18px;
  font-size:20px;
  font-weight:bold;
  background: linear-gradient(90deg,#002f6c,#004aad);
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* CONTAINER */
.container{
  max-width:480px;
  margin:auto;
  padding:15px;
}

/* CARD */
.card{
  background: linear-gradient(145deg,#003a78,#002b5c);
  border-radius:16px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.05);
}

/* TITLE */
h2{
  margin:0 0 10px;
  color:#00e0ff;
}

/* HIGHLIGHT BOX */
.highlight{
  background:#001f3f;
  padding:12px;
  border-radius:10px;
  font-size:14px;
  line-height:1.6;
}

/* NUMBER BOX */
.mpesa-number{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(90deg,#004aad,#007bff);
  padding:10px;
  border-radius:10px;
  margin:10px 0;
  box-shadow:0 0 15px rgba(0,200,255,0.5);
  font-weight:bold;
}

/* BUTTON */
.copy-btn{
  background:#00e0ff;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
  color:#001f3f;
}

.copy-btn:hover{
  background:#00c3ff;
}

/* FORM */
input{
  width:100%;
  padding:10px;
  margin-top:6px;
  margin-bottom:12px;
  border-radius:8px;
  border:none;
  outline:none;
  background:#001f3f;
  color:#fff;
}

label{
  font-size:13px;
}

/* SUBMIT */
.submit-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
  background:linear-gradient(90deg,#00e0ff,#007bff);
  color:#001f3f;
  box-shadow:0 6px 18px rgba(0,0,0,0.5);
}

.submit-btn:hover{
  opacity:0.9;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#28a745;
  padding:10px 15px;
  border-radius:8px;
  font-weight:bold;
  display:none;
}

/* FOOTER */
footer{
  text-align:center;
  padding:12px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<header>CYPX SECURE PAYMENT</header>

<div class="container">

  <!-- PACKAGE -->
  <div class="card">
    <h2 id="packageTitle">Selected Package</h2>
    <div class="highlight">
      <p id="packageInfo"></p>

      <p><b>Pay To:</b></p>

      <div class="mpesa-number">
        <span id="mpesaNumber">0707207201</span>
        <button class="copy-btn" onclick="copyNumber()">Copy</button>
      </div>

      <p><b>Name:</b> LANGAT ROBERT</p>
      <p>Send payment, then submit details below for verification.</p>
    </div>
  </div>

  <!-- FORM -->
  <div class="card">
    <h2>Submit Payment</h2>

    <form id="depositForm">
      <label>Amount (KES)</label>
      <input type="number" id="amount" required>

      <label>Phone Number</label>
      <input type="text" id="phone" placeholder="07XXXXXXXX" required>

      <label>Transaction Code</label>
      <input type="text" id="code" required>

      <button class="submit-btn">Submit Deposit</button>
    </form>
  </div>

</div>

<footer>
  © 2026 CYPX ONLINE CRYPTO — Secure Payments
</footer>

<div id="toast" class="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let uid = null;
let selectedGroup = "";
let selectedPrice = "";

const params = new URLSearchParams(window.location.search);
selectedGroup = params.get("group") || "Package";
selectedPrice = params.get("price") || "0";

document.getElementById("packageTitle").innerText = selectedGroup;
document.getElementById("packageInfo").innerText = "Price: " + selectedPrice + " KSH";

onAuthStateChanged(auth, (user)=>{
  if(user) uid = user.uid;
  else window.location.href="landing.html";
});

/* COPY + LOCK USER */
window.copyNumber = function(){
  const number = document.getElementById("mpesaNumber").innerText;

  navigator.clipboard.writeText(number);

  showToast("Number copied");

  // 🔒 LOCK USER INTO SYSTEM
  if(uid){
    const lockRef = push(ref(db, "paymentLocks/" + uid));
    set(lockRef,{
      group:selectedGroup,
      price:selectedPrice,
      status:"initiated",
      timestamp:new Date().toISOString()
    });
  }
}

/* SUBMIT */
document.getElementById("depositForm").addEventListener("submit",(e)=>{
  e.preventDefault();

  if(!uid) return showToast("Login required", false);

  const amount = parseInt(amount.value);
  const phone = document.getElementById("phone").value.trim();
  const code = document.getElementById("code").value.trim();

  if(amount < selectedPrice){
    return showToast("Minimum amount is "+selectedPrice,false);
  }

  const refPush = push(ref(db,"referralPurchases/"+uid));

  set(refPush,{
    group:selectedGroup,
    price:selectedPrice,
    amount,
    phone,
    code,
    status:"pending",
    timestamp:new Date().toISOString()
  }).then(()=>{
    showToast("Payment submitted");
    document.getElementById("depositForm").reset();
  });

});

/* TOAST */
function showToast(msg, success=true){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.background = success ? "#28a745" : "#e53935";
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}
</script>

</body>
</html>
