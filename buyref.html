<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CYPX HOLDINGS - Secure P2P</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
background: linear-gradient(135deg,#050b18,#061a33,#000814);
color:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.loading-screen{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000814;
z-index:9999;
font-size:14px;
color:#00e0ff;
}

header{
font-size:22px;
font-weight:bold;
color:#00e0ff;
margin-top:10px;
text-align:center;
}

.card{
width:100%;
max-width:440px;
background:#0b1f35;
border:1px solid rgba(0,224,255,0.15);
border-radius:18px;
padding:20px;
margin-top:18px;
box-shadow:0 10px 35px rgba(0,0,0,0.6);
}

h2{
color:#ffd700;
font-size:18px;
margin-bottom:8px;
}

.price{
font-size:22px;
font-weight:bold;
color:#00ff88;
margin-bottom:12px;
}

.verified{
display:inline-block;
margin-top:8px;
padding:6px 12px;
border-radius:20px;
background:rgba(0,224,255,0.15);
color:#00e0ff;
font-size:12px;
font-weight:bold;
border:1px solid rgba(0,224,255,0.3);
}

.info{
background:#071a2e;
padding:12px;
border-radius:12px;
font-size:14px;
line-height:1.6;
margin-bottom:12px;
color:#cfe6ff;
}

.mpesa{
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(90deg,#004aad,#007bff);
padding:12px;
border-radius:10px;
font-weight:bold;
margin:12px 0;
}

.copy-btn{
background:#00e0ff;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

input{
width:100%;
padding:13px;
margin-top:10px;
border:1px solid rgba(255,255,255,0.2);
border-radius:10px;
background:#081a2f;
color:#fff;
outline:none;
font-size:14px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
font-weight:bold;
font-size:15px;
cursor:pointer;
background:linear-gradient(90deg,#00e0ff,#007bff);
color:#001a33;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#28a745;
padding:10px 15px;
border-radius:8px;
display:none;
font-weight:bold;
}

footer{
margin-top:20px;
font-size:12px;
color:#7f93ad;
text-align:center;
}
</style>
</head>

<body>

<div class="loading-screen" id="loading">Loading session...</div>

<header>CYPX HOLDINGS</header>

<div class="card">

<h2 id="packageTitle"></h2>
<div class="price" id="packagePrice"></div>

<div class="verified">✔ Verified P2P Trader</div>

<div class="info">
<p id="packageInfo"></p>

<p><b>Pay To:</b></p>

<div class="mpesa">
<span>0707207201</span>
<button class="copy-btn" onclick="navigator.clipboard.writeText('0707207201')">Copy</button>
</div>

<p><b>Account Name:</b> LANGAT ROBERT</p>
</div>

<label>Phone Number</label>
<input type="text" id="phone" placeholder="07XXXXXXXX">

<button id="submitBtn">Confirm Payment</button>

</div>

<footer>© 2026 CYPX HOLDINGS — Secure P2P System</footer>

<div id="toast" class="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.firebasestorage.app",
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
  measurementId: "G-4RSQXZJX44"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let uid = null;

const url = new URL(window.location.href);
const group = url.searchParams.get("group") || "Unknown Package";
const price = parseInt(url.searchParams.get("price") || "0");

document.getElementById("packageTitle").innerText = group;
document.getElementById("packagePrice").innerText = price.toLocaleString() + " KSH";
document.getElementById("packageInfo").innerText =
"You selected " + group;

onAuthStateChanged(auth, (user) => {
document.getElementById("loading").style.display = "none";

if (user) uid = user.uid;
else window.location.href = "landing.html";
});

document.getElementById("submitBtn").addEventListener("click", async () => {

if (!uid) return showToast("Session not ready", false);

const phone = document.getElementById("phone").value.trim();

if (!/^(07\d{8}|01\d{8})$/.test(phone))
return showToast("Invalid phone number", false);

try {

const newRef = push(ref(db, "referralPurchases/" + uid));

await set(newRef, {
  group,
  price,
  amount: price,
  phone,
  status: "pending",
  createdAt: Date.now()
});

showToast("Payment submitted");

setTimeout(() => {
window.location.href = "financial.html?group=" + encodeURIComponent(group);
}, 1200);

} catch (e) {
console.error(e);
showToast(e.message, false);
}

});

function showToast(msg, ok = true) {
const t = document.getElementById("toast");
t.innerText = msg;
t.style.background = ok ? "#28a745" : "#e53935";
t.style.display = "block";
setTimeout(() => t.style.display = "none", 2000);
}

</script>

</body>
</html>
