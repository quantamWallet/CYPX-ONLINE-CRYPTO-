<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CYPX HOLDINGS - Secure P2P</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background: radial-gradient(circle at top,#061a33,#000d1a);
color:#fff;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

/* HEADER */
header{
font-size:22px;
font-weight:bold;
color:#00e0ff;
margin-top:10px;
text-align:center;
letter-spacing:1px;
}

/* SUB TEXT */
.sub{
font-size:13px;
color:#9bb7d4;
margin-bottom:15px;
text-align:center;
}

/* CARD */
.card{
width:100%;
max-width:440px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:18px;
padding:18px;
margin-top:15px;
backdrop-filter:blur(14px);
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* PACKAGE HEADER */
h2{
color:#ffd700;
font-size:18px;
margin-bottom:8px;
}

/* PRICE TAG */
.price{
font-size:22px;
font-weight:bold;
color:#00ff88;
margin-bottom:12px;
text-shadow:0 0 10px rgba(0,255,136,0.3);
}

/* INFO BOX */
.info{
background:#001427;
padding:12px;
border-radius:12px;
font-size:14px;
line-height:1.6;
margin-bottom:12px;
color:#cfe6ff;
}

/* MPESA BOX */
.mpesa{
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(90deg,#004aad,#007bff);
padding:12px;
border-radius:10px;
font-weight:bold;
margin:12px 0;
box-shadow:0 0 15px rgba(0,200,255,0.4);
}

.copy-btn{
background:#00e0ff;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
color:#001a2e;
}

/* INPUTS */
input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#001a33;
color:#fff;
outline:none;
}

label{
font-size:12px;
color:#9fb6d1;
margin-top:10px;
display:block;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
font-weight:bold;
font-size:15px;
cursor:pointer;
background:linear-gradient(90deg,#00e0ff,#007bff);
color:#001a33;
transition:0.2s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 15px rgba(0,224,255,0.4);
}

/* NOTICE */
.notice{
font-size:12px;
color:#9bb7d4;
margin-top:10px;
line-height:1.5;
opacity:0.9;
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#28a745;
padding:10px 15px;
border-radius:8px;
display:none;
font-weight:bold;
}

/* FOOTER */
footer{
margin-top:20px;
font-size:12px;
color:#7f93ad;
text-align:center;
}
</style>
</head>

<body>

<header>CYPX HOLDINGS</header>
<div class="sub">Secure P2P Payment Gateway</div>

<div class="card">

<h2 id="packageTitle">Package</h2>
<div class="price" id="packagePrice"></div>

<div class="info">
<p id="packageInfo"></p>

<p><b>Send Payment To:</b></p>

<div class="mpesa">
<span id="mpesaNumber">0707207201</span>
<button class="copy-btn" onclick="copyNumber()">Copy</button>
</div>

<p><b>Account Name:</b> LANGAT ROBERT</p>

<div class="notice">
⚠️ Ensure you send exact amount before confirming payment.  
Your package will be activated after verification.
</div>
</div>

<label>Amount Paid</label>
<input type="number" id="amount" placeholder="Enter amount">

<label>Phone Number</label>
<input type="text" id="phone" placeholder="07XXXXXXXX">

<button id="submitBtn">Confirm Payment</button>

</div>

<footer>© 2026 CYPX HOLDINGS — Secure P2P System</footer>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyC...",
authDomain: "quantum-rio.firebaseapp.com",
databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
projectId: "quantum-rio"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let uid=null;

const url = new URL(window.location.href);
const group = url.searchParams.get("group") || "Unknown";
const price = parseInt(url.searchParams.get("price") || "0");

document.getElementById("packageTitle").innerText = group;
document.getElementById("packagePrice").innerText = price.toLocaleString()+" KSH";
document.getElementById("packageInfo").innerText =
"You selected "+group+" referral package.";

onAuthStateChanged(auth,(user)=>{
if(user) uid=user.uid;
else window.location.href="landing.html";
});

window.copyNumber=function(){
navigator.clipboard.writeText("0707207201");
showToast("Copied");
};

document.getElementById("submitBtn").addEventListener("click",async()=>{

const amount=parseInt(document.getElementById("amount").value);
const phone=document.getElementById("phone").value.trim();

if(!uid) return showToast("Login required",false);
if(!amount||amount<price) return showToast("Minimum "+price,false);
if(!/^(07\d{8}|01\d{8})$/.test(phone)) return showToast("Invalid phone",false);

try{

const newRef = push(ref(db,"referralPurchases/"+uid));

await set(newRef,{
group,
price,
amount,
phone,
status:"pending",
createdAt:Date.now()
});

/* STORE PACKAGE LOCK */
await set(ref(db,"userPackages/"+uid),{
group,
price,
status:"pending_activation",
createdAt:Date.now()
});

showToast("Payment submitted");

setTimeout(()=>{
window.location.href="financial.html?group="+encodeURIComponent(group);
},1200);

}catch(e){
showToast("Error submitting",false);
}

});

function showToast(msg,ok=true){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.background=ok?"#28a745":"#e53935";
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}
</script>

</body>
</html>
