<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYPX Admin - Trade Control</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
    * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0a0f1a;
    margin: 0; padding: 20px; color: #fff;
  }
  .container { max-width: 1300px; margin: 0 auto; }
  h1 { color: #ffd700; text-align: center; margin-bottom: 20px; }
  
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width:900px){ .grid{ grid-template-columns: 1fr; } }

  .card {
    background: linear-gradient(145deg,#001f3f,#002b5c);
    padding: 20px; border-radius: 16px;
    box-shadow: 0 0 20px rgba(0,200,255,0.15);
    border: 1px solid rgba(0,200,255,0.2);
  }
  .card h2 { color: #00C896; margin-top: 0; font-size: 18px; }

  .trader-list { display: grid; gap: 12px; }
  .trader-item {
    background: rgba(0,0,0,0.3); padding: 14px; border-radius: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .trader-info { font-size: 14px; }
  .trader-info b { color: #ffd700; }
  .copiers { color: #94e2cc; font-size: 12px; }

  .form-group { margin-bottom: 15px; }
  .form-group label { font-size: 12px; color: #94e2cc; display: block; margin-bottom: 5px; }
  .form-group input, .form-group select {
    width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; color: white; font-size: 14px;
  }

  .btn {
    width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer;
    background: linear-gradient(90deg,#00C896,#007A54); color: white; font-size: 15px;
  }
  .btn:hover { opacity: 0.9; }
  .btn-red { background: linear-gradient(90deg,#ef4444,#dc2626); }
  .btn-blue { background: linear-gradient(90deg,#3b82f6,#2563eb); }

  .trade-log { max-height: 400px; overflow-y: auto; }
  .trade-item {
    background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; margin-bottom: 10px;
    font-size: 13px; display: flex; justify-content: space-between;
  }
  .profit { color: #00C896; font-weight: 700; }
  .loss { color: #ef4444; font-weight: 700; }

  .toast { position: fixed; top: 20px; right: 20px; background: #00C896; color: white; padding: 14px 18px; border-radius: 10px; transform: translateX(400px); transition: 0.3s; z-index: 9999; }
  .toast.show { transform: translateX(0); }
</style>
</head>
<body>

<div class="container">
  <h1><i class="fas fa-user-shield"></i> CYPX Admin - Trade Control</h1>

  <div class="grid">
    <!-- LEFT: PUSH TRADE -->
    <div class="card">
      <h2><i class="fas fa-paper-plane"></i> Push New Trade</h2>
      
      <div class="form-group">
        <label>Select Trader</label>
        <select id="traderSelect"></select>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
        <div class="form-group">
          <label>Symbol</label>
          <input id="symbol" placeholder="EURUSD" value="EURUSD">
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="type">
            <option>BUY</option>
            <option>SELL</option>
          </select>
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
        <div class="form-group">
          <label>Entry Price</label>
          <input id="entry" type="number" step="0.00001" placeholder="1.08500">
        </div>
        <div class="form-group">
          <label>Admin Capital $</label>
          <input id="adminCapital" type="number" placeholder="1000" value="1000">
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
        <div class="form-group">
          <label>Take Profit</label>
          <input id="tp" type="number" step="0.00001" placeholder="1.09000">
        </div>
        <div class="form-group">
          <label>Stop Loss</label>
          <input id="sl" type="number" step="0.00001" placeholder="1.08000">
        </div>
      </div>

      <button class="btn btn-blue" onclick="openTrade()">1. Open Trade</button>
      <div id="openTradeBox" style="display:none; margin-top:15px">
        <div class="form-group">
          <label>Close Trade With Final P&L $</label>
          <input id="closeProfit" type="number" placeholder="50 or -20">
        </div>
        <button class="btn btn-red" onclick="closeTrade()">2. Close Trade & Pay Copiers</button>
      </div>
    </div>

    <!-- RIGHT: TRADER STATS + LOG -->
    <div>
      <div class="card" style="margin-bottom:20px">
        <h2><i class="fas fa-users"></i> Traders & Copiers</h2>
        <div class="trader-list" id="traderStats"></div>
      </div>

      <div class="card">
        <h2><i class="fas fa-history"></i> Trade History</h2>
        <div class="trade-log" id="tradeLog"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.firebasestorage.app",
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
  measurementId: "G-4RSQXZJX44"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const traders = [
  { id: 'kenyan_prince', name: 'Kenyan Prince', profitShare: 20 },
  { id: 'alpha_trader', name: 'Alpha Trader', profitShare: 15 },
  { id: 'states_ke', name: 'States Ke', profitShare: 25 },
  { id: 'vidollar', name: 'Vidollar', profitShare: 18 },
  { id: 'ziwa_fx', name: 'Ziwa Fx', profitShare: 12 },
  { id: 'pizzo_fx', name: 'Pizzo Fx', profitShare: 20 }
];

let currentOpenTrade = null;

// LOAD TRADERS IN DROPDOWN + STATS
function loadTraders(){
  const select = document.getElementById('traderSelect');
  select.innerHTML = traders.map(t => `<option value="${t.id}">${t.name} - ${t.profitShare}% Fee</option>`).join('');
  
  traders.forEach(t => {
    db.ref("copy_trading").on("value", snap => {
      let copiers = 0, totalCopied = 0;
      snap.forEach(userSnap => {
        if(userSnap.child(t.id).exists()){
          copiers++;
          totalCopied += userSnap.child(t.id).child("amount").val() || 0;
        }
      });
      document.getElementById('traderStats').innerHTML += `
        <div class="trader-item">
          <div class="trader-info"><b>${t.name}</b><div class="copiers">${copiers} Copiers | $${totalCopied} Copied</div></div>
        </div>
      `;
    });
  });
}

// 1. OPEN TRADE
function openTrade(){
  const traderId = document.getElementById('traderSelect').value;
  currentOpenTrade = {
    traderId,
    symbol: document.getElementById('symbol').value,
    type: document.getElementById('type').value,
    entry: Number(document.getElementById('entry').value),
    tp: Number(document.getElementById('tp').value),
    sl: Number(document.getElementById('sl').value),
    adminCapital: Number(document.getElementById('adminCapital').value),
    status: "OPEN",
    openedAt: Date.now()
  };
  document.getElementById('openTradeBox').style.display = 'block';
  showToast("Trade Opened. Now close it with P&L");
}

// 2. CLOSE TRADE - THIS PAYS ALL COPIERS
function closeTrade(){
  if(!currentOpenTrade) return;
  const profit = Number(document.getElementById('closeProfit').value);
  
  const tradeData = {
    ...currentOpenTrade,
    profit,
    status: "CLOSED",
    closedAt: Date.now()
  };

  // PUSH TO ADMIN_TRADES. USER PAGE LISTENS TO THIS
  db.ref("admin_trades/" + currentOpenTrade.traderId).push(tradeData)
.then(() => {
    addToLog(tradeData);
    showToast(`Trade Closed. Copiers will be paid $${profit}`, 'success');
    document.getElementById('openTradeBox').style.display = 'none';
    currentOpenTrade = null;
  });
}

function addToLog(trade){
  const log = document.getElementById('tradeLog');
  const profitClass = trade.profit >= 0 ? 'profit' : 'loss';
  log.innerHTML = `
    <div class="trade-item">
      <div>
        <b>${trade.symbol} ${trade.type}</b><br>
        <small>${traders.find(t=>t.id==trade.traderId).name}</small>
      </div>
      <div class="${profitClass}">${trade.profit >= 0 ? '+' : ''}$${trade.profit}</div>
    </div>
  ` + log.innerHTML;
}

function showToast(message){
  const toast = document.getElementById('toast');
  toast.innerText = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

loadTraders();
</script>
</body>
  </html>
