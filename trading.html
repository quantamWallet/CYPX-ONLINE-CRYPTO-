<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYPX TRADE - Trading</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<style>
:root{--bg:#0b1120;--card:#121a2b;--card2:#1a2440;--brand:#2563eb;--ok:#16a34a;--bad:#dc2626;--warn:#f59e0b;--text:#e2e8f0;--muted:#94a3b8;--line:#24324f}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:var(--bg);color:var(--text)}
.container{max-width:1200px;margin:0 auto;padding:12px}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 0}
.logo{font-weight:700;font-size:20px;color:var(--brand)}
.balance-card{background:var(--card);padding:12px;border-radius:14px;display:flex;gap:20px}
.balance-card div{line-height:1.4}
.bal-label{font-size:12px;color:var(--muted)}
.bal-value{font-size:18px;font-weight:600}
.grid{display:grid;grid-template-columns:1fr 340px;gap:12px;margin-top:12px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);border-radius:16px;padding:14px;border:1px solid var(--line)}
.pair-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.pair-price{font-size:26px;font-weight:700}
.pair-change{font-size:14px}
.pair-change.up{color:var(--ok)}.pair-change.down{color:var(--bad)}
.chart{height:400px;background:var(--card2);border-radius:10px;overflow:hidden}
.order-panel h3{margin-bottom:10px}
.tabs{display:flex;background:var(--card2);border-radius:10px;padding:4px;margin-bottom:10px}
.tab{flex:1;text-align:center;padding:8px;border-radius:8px;cursor:pointer;font-weight:600}
.tab.active{background:var(--brand)}
.input-group{margin-bottom:10px}
.input-group label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
.input-group input{width:100%;padding:12px;background:var(--card2);border:1px solid var(--line);border-radius:10px;color:var(--text);font-size:16px;outline:none}
.btn-buy{width:100%;padding:14px;background:var(--ok);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:16px;cursor:pointer;margin-top:4px}
.btn-sell{width:100%;padding:14px;background:var(--bad);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:16px;cursor:pointer;margin-top:4px}
.btn-signal{width:100%;padding:14px;background:var(--warn);border:none;border-radius:10px;color:#000;font-weight:700;font-size:16px;cursor:pointer;margin-top:8px}
.btn-buy:disabled,.btn-sell:disabled{opacity:.4;cursor:not-allowed}
.positions table{width:100%;border-collapse:collapse;font-size:12px}
.positions th{text-align:left;color:var(--muted);padding:8px 4px;border-bottom:1px solid var(--line)}
.positions td{padding:8px 4px}
.badge-side{padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600}
.badge-side.buy{background:rgba(22,163,74,.2);color:var(--ok)}
.badge-side.sell{background:rgba(220,38,38,.2);color:var(--bad)}
.badge-signal{background:rgba(245,158,11,.2);color:var(--warn);font-size:10px;padding:2px 4px;border-radius:4px;margin-left:4px}
.pnl.up{color:var(--ok)}.pnl.down{color:var(--bad)}
.close-btn{background:var(--line);border:none;color:var(--text);padding:4px 8px;border-radius:6px;cursor:pointer;font-size:11px}
.close-btn:hover{background:var(--bad)}
.notif-bell{position:relative;cursor:pointer;font-size:20px}
.badge{position:absolute;top:-6px;right:-6px;background:var(--bad);color:#fff;font-size:10px;padding:2px 5px;border-radius:99px}
.notif-panel{position:absolute;top:40px;right:0;width:320px;background:var(--card2);border:1px solid var(--line);border-radius:12px;display:none;z-index:99;max-height:400px;overflow-y:auto}
.notif-panel.show{display:block}
.notif-item{padding:10px;border-bottom:1px solid var(--line);font-size:13px}
.notif-item.time{font-size:11px;color:var(--muted)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card2);padding:12px 16px;border-radius:12px;border-left:4px solid var(--brand);display:none;z-index:999}
.toast.show{display:block;animation:slide.3s}
@keyframes slide{from{transform:translateX(100%)}to{transform:translateX(0)}}
.center-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card2);padding:20px 30px;border-radius:16px;border:2px solid var(--brand);font-size:18px;font-weight:700;display:none;z-index:1000;box-shadow:0 0 30px rgba(0,0,0,.5);text-align:center}
.center-toast.show{display:block;animation:pop.3s}
@keyframes pop{0%{transform:translate(-50%,-50%) scale(.8)}100%{transform:translate(-50%,-50%) scale(1)}}
.loading{opacity:.5;pointer-events:none}
.last-updated{font-size:11px;color:var(--muted);margin-left:8px}
.divider{height:1px;background:var(--line);margin:14px 0}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo"><i class="fa-solid fa-chart-line"></i> CYPX TRADE</div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="balance-card" id="balCard">
        <div><div class="bal-label">Balance</div><div class="bal-value" id="balance">--</div></div>
        <div><div class="bal-label">Equity</div><div class="bal-value" id="equity">--</div></div>
      </div>
      <div style="position:relative">
        <i class="fa-solid fa-bell notif-bell" id="bell"></i>
        <span class="badge" id="notifCount" style="display:none">0</span>
        <div class="notif-panel" id="notifPanel"></div>
      </div>
    </div>
  </div>

  <div class="grid">
    <div>
      <div class="card">
        <div class="pair-header">
          <select id="pairSelect" style="background:var(--card2);border:1px solid var(--line);color:var(--text);padding:6px;border-radius:8px">
            <optgroup label="Crypto">
              <option>BTC/USDT</option><option>ETH/USDT</option><option>SOL/USDT</option>
              <option>BNB/USDT</option><option>XRP/USDT</option><option>DOGE/USDT</option>
              <option>ADA/USDT</option><option>TON/USDT</option>
            </optgroup>
            <optgroup label="Forex">
              <option>EUR/USD</option><option>GBP/USD</option><option>USD/JPY</option>
              <option>USD/CHF</option><option>AUD/USD</option><option>NZD/USD</option>
              <option>USD/CAD</option><option>EUR/GBP</option>
            </optgroup>
          </select>
          <div class="pair-price" id="pairPrice">$0.00</div>
          <div class="pair-change up" id="pairChange">0.00%</div>
          <div class="last-updated" id="lastUpdated"></div>
        </div>
        <div class="chart" id="tradingview_chart"></div>
      </div>

      <div class="card positions" style="margin-top:12px">
        <h3>Open Positions</h3>
        <table>
          <thead><tr><th>Pair</th><th>Side</th><th>Qty</th><th>Entry</th><th>P&L</th><th>TP/SL</th><th></th></tr></thead>
          <tbody id="positionsBody">
            <tr><td colspan="7" style="text-align:center;color:var(--muted);padding:20px">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card order-panel">
      <h3>Place Order</h3>
      <div class="tabs">
        <div class="tab active" data-type="buy">Buy</div>
        <div class="tab" data-type="sell">Sell</div>
      </div>
      <div class="input-group">
        <label>Amount USDT <span style="color:var(--warn)">Min $50</span></label>
        <input type="number" id="orderAmount" placeholder="100" value="100" min="50" step="0.01">
      </div>
      <div class="input-group">
        <label>Take Profit %</label>
        <input type="number" id="tp" placeholder="2" value="2" min="0.1" step="0.1">
      </div>
      <div class="input-group">
        <label>Stop Loss %</label>
        <input type="number" id="sl" placeholder="1" value="1" min="0.1" step="0.1">
      </div>
      <button class="btn-buy" id="buyBtn" disabled>Buy BTC</button>
      <button class="btn-sell" id="sellBtn" style="display:none" disabled>Sell BTC</button>

      <div class="divider"></div>

      <h3><i class="fa-solid fa-key"></i> Signal Code</h3>
      <div class="input-group">
        <label>Enter Signal Code</label>
        <input type="text" id="signalCode" placeholder="SIGNAL-BTC-001" style="text-transform:uppercase">
      </div>
      <div class="input-group">
        <label>Amount to Risk <span style="color:var(--warn)">Min $50</span></label>
        <input type="number" id="signalAmount" placeholder="100" value="100" min="50">
      </div>
      <button class="btn-signal" onclick="activateSignal()">Activate Signal</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="center-toast" id="centerToast"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, onValue, push, remove, serverTimestamp, runTransaction, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.appspot.com",
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
  measurementId: "G-4RSQXZJX44"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const MIN_TRADE = 50;
const LEVERAGE = 200;
let uid = null;
let balance = null;
let positions = {};
let currentPair = "BTC/USDT";
let prices = {};
let prevPrices = {};
let orderType = "buy";
let notifs = JSON.parse(localStorage.getItem("cypx_notifs") || "[]");

const toast = document.getElementById("toast");
const centerToast = document.getElementById("centerToast");
const notifPanel = document.getElementById("notifPanel");
const notifCount = document.getElementById("notifCount");

// ===== ASSETS CONFIG =====
const ASSETS = {
  "BTC/USDT": {tv: "BINANCE:BTCUSDT", api: "BTCUSDT"},
  "ETH/USDT": {tv: "BINANCE:ETHUSDT", api: "ETHUSDT"},
  "SOL/USDT": {tv: "BINANCE:SOLUSDT", api: "SOLUSDT"},
  "BNB/USDT": {tv: "BINANCE:BNBUSDT", api: "BNBUSDT"},
  "XRP/USDT": {tv: "BINANCE:XRPUSDT", api: "XRPUSDT"},
  "DOGE/USDT": {tv: "BINANCE:DOGEUSDT", api: "DOGEUSDT"},
  "ADA/USDT": {tv: "BINANCE:ADAUSDT", api: "ADAUSDT"},
  "TON/USDT": {tv: "BINANCE:TONUSDT", api: "TONUSDT"},
  "EUR/USD": {tv: "FX:EURUSD", api: null},
  "GBP/USD": {tv: "FX:GBPUSD", api: null},
  "USD/JPY": {tv: "FX:USDJPY", api: null},
  "USD/CHF": {tv: "FX:USDCHF", api: null},
  "AUD/USD": {tv: "FX:AUDUSD", api: null},
  "NZD/USD": {tv: "FX:NZDUSD", api: null},
  "USD/CAD": {tv: "FX:USDCAD", api: null},
  "EUR/GBP": {tv: "FX:EURGBP", api: null},
}

function saveNotifs(){ localStorage.setItem("cypx_notifs", JSON.stringify(notifs)); }
function pushNotif(msg, type="info"){
  const time = new Date().toLocaleTimeString();
  notifs.unshift({msg, time}); if(notifs.length > 50) notifs.pop(); saveNotifs();
  notifCount.textContent = notifs.length; notifCount.style.display = notifs.length? 'block' : 'none';
  toast.textContent = msg; toast.style.borderLeftColor = type==="ok"? "var(--ok)" : type==="bad"? "var(--bad)" : "var(--brand)";
  toast.classList.add("show"); setTimeout(()=>toast.classList.remove("show"), 3000); renderNotifs();
}
function showCenterToast(msg, type="ok"){
  centerToast.innerHTML = msg.replace('\n','<br>');
  centerToast.style.borderColor = type==="ok"? "var(--ok)" : "var(--bad)";
  centerToast.style.color = type==="ok"? "var(--ok)" : "var(--bad)";
  centerToast.classList.add("show"); setTimeout(()=>centerToast.classList.remove("show"), 2500);
}
function renderNotifs(){
  notifPanel.innerHTML = notifs.length? notifs.map(n=>`<div class="notif-item">${n.msg}<div class="time">${n.time}</div></div>`).join('') : `<div class="notif-item">No notifications</div>`;
}
document.getElementById("bell").onclick = ()=>notifPanel.classList.toggle("show"); renderNotifs();

function loadChart(symbol){
  document.getElementById("tradingview_chart").innerHTML = "";
  const tvSymbol = ASSETS[symbol]?.tv || "BINANCE:BTCUSDT";
  new TradingView.widget({"width": "100%", "height": 400, "symbol": tvSymbol, "interval": "15", "theme": "dark", "style": "1", "toolbar_bg": "#1a2440", "enable_publishing": false, "hide_top_toolbar": false, "container_id": "tradingview_chart"});
}

async function fetchPrices(){
  try{
    const res = await fetch("https://api.binance.com/api/v3/ticker/24hr");
    const data = await res.json(); prevPrices = {...prices};
    Object.values(ASSETS).forEach(asset=>{
      if(asset.api){
        const item = data.find(d=>d.symbol===asset.api);
        if(item){ const pairName = Object.keys(ASSETS).find(k=>ASSETS[k].api===asset.api); prices[pairName] = parseFloat(item.lastPrice); }
      }
    });
    document.getElementById("lastUpdated").textContent = "Updated " + new Date().toLocaleTimeString(); updateUI();
  }catch(e){ console.error("Price fetch failed", e); }
}

function updateUI(){
  const price = prices[currentPair]; if(!price) return;
  const prev = prevPrices[currentPair] || price; const change = prev? ((price - prev) / prev) * 100 : 0;
  document.getElementById("pairPrice").textContent = "$" + price.toLocaleString(undefined,{minimumFractionDigits:4,maximumFractionDigits:4});
  const changeEl = document.getElementById("pairChange"); changeEl.textContent = change.toFixed(2) + "%";
  changeEl.className = "pair-change " + (change >= 0? "up" : "down");
  document.getElementById("buyBtn").textContent = `Buy ${currentPair.split('/')[0]}`;
  document.getElementById("sellBtn").textContent = `Sell ${currentPair.split('/')[0]}`;
  checkTP_SL(); updateEquity();
}
setInterval(fetchPrices, 3000);

function calcPnL(p, currentPrice){
  const qty = p.amount / p.entry; const priceDiff = p.side==="buy"? currentPrice - p.entry : p.entry - currentPrice;
  const pnl = priceDiff * qty * LEVERAGE; const pnlPct = p.amount > 0? (pnl / p.amount) * 100 : 0;
  return {pnl, pnlPct};
}

onAuthStateChanged(auth, (user)=>{
  if(!user){ window.location.href="auth.html"; return; }
  uid = user.uid; document.getElementById("balCard").classList.add("loading"); loadChart(currentPair); fetchPrices();
  const userBalRef = ref(db, `users/${uid}/balance`); const positionsRef = ref(db, `trade/${uid}/positions`);
  onValue(userBalRef, (snap)=>{ balance = snap.exists()? parseFloat(snap.val()) : 0; updateEquity(); toggleButtons(); document.getElementById("balCard").classList.remove("loading"); });
  onValue(positionsRef, (snap)=>{ positions = snap.val() || {}; renderPositions(); updateEquity(); });
});

function toggleButtons(){ const disabled = balance === null; document.getElementById("buyBtn").disabled = disabled; document.getElementById("sellBtn").disabled = disabled; }

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{ document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active")); t.classList.add("active"); orderType = t.dataset.type; document.getElementById("buyBtn").style.display = orderType==="buy"?"block":"none"; document.getElementById("sellBtn").style.display = orderType==="sell"?"block":"none"; });

// ===== MANUAL ORDER =====
async function placeOrder(){
  if(balance === null) return pushNotif("Balance loading...", "bad");
  const amount = parseFloat(document.getElementById("orderAmount").value); const tp = parseFloat(document.getElementById("tp").value); const sl = parseFloat(document.getElementById("sl").value); const price = prices[currentPair];
  if(!price) return pushNotif("Price not loaded yet", "bad"); if(isNaN(amount) || amount < MIN_TRADE) return pushNotif(`Minimum order $${MIN_TRADE}`, "bad"); if(amount > balance){ return pushNotif("Insufficient balance", "bad"); }
  const qty = amount / price; const fee = amount * 0.001;
  await runTransaction(ref(db, `users/${uid}/balance`), (current)=>{ const curr = parseFloat(current) || 0; return curr - amount - fee; });
  await push(ref(db, `trade/${uid}/positions`), { pair: currentPair, side: orderType, qty: qty, entry: price, amount: amount, tp: tp, sl: sl, type: "manual", openedAt: serverTimestamp() });
  pushNotif(`${orderType.toUpperCase()} ${currentPair} $${amount} @ ${LEVERAGE}x`, "ok");
}
document.getElementById("buyBtn").onclick = placeOrder; document.getElementById("sellBtn").onclick = placeOrder;

// ===== SIGNAL CODE =====
window.activateSignal = async function(){
  const code = document.getElementById("signalCode").value.trim().toUpperCase(); const userAmount = parseFloat(document.getElementById("signalAmount").value);
  if(!code) return pushNotif("Enter a signal code", "bad"); if(userAmount < MIN_TRADE) return pushNotif(`Minimum amount $${MIN_TRADE}`, "bad"); if(userAmount > balance) return pushNotif("Insufficient balance", "bad");
  const signalRef = ref(db, `signals/${code}`); const snap = await get(signalRef); if(!snap.exists()) return pushNotif("Invalid signal code", "bad"); const signal = snap.val(); const now = Date.now();
  if(now > signal.expiresAt) return pushNotif("This signal has expired", "bad"); if(signal.usedBy && signal.usedBy[uid]) return pushNotif("You already used this signal", "bad");
  const price = prices[signal.pair]; if(!price) return pushNotif("Price not loaded", "bad");
  const tpPct = (signal.tp_pips * signal.pipValue / price) * 100; const slPct = (signal.sl_pips * signal.pipValue / price) * 100;
  await runTransaction(ref(db, `users/${uid}/balance`), (current)=> (parseFloat(current)||0) - userAmount);
  await push(ref(db, `trade/${uid}/positions`), { pair: signal.pair, side: signal.side, qty: userAmount/price, entry: price, amount: userAmount, tp: tpPct, sl: slPct, type: "signal", openedAt: now, expiresAt: now + 600000, code });
  await update(signalRef, { [`usedBy/${uid}`]: true }); pushNotif(`Signal Activated: ${signal.side.toUpperCase()} ${signal.pair} - $${userAmount} @ ${LEVERAGE}x`, "ok"); document.getElementById("signalCode").value = "";
}

// ===== TP/SL AUTO CLOSE =====
function checkTP_SL(){
  Object.keys(positions).forEach(id=>{ const p = positions[id]; const price = prices[p.pair]; if(!price) return; const {pnl, pnlPct} = calcPnL(p, price);
    let shouldClose = false; let reason = ""; let type="info";
    if(pnlPct >= p.tp){ shouldClose = true; reason = `TAKE PROFIT +${pnlPct.toFixed(2)}%`; type="ok"; }
    else if(pnlPct <= -p.sl){ shouldClose = true; reason = `STOP LOSS ${pnlPct.toFixed(2)}%`; type="bad"; }
    else if(p.expiresAt && Date.now() >= p.expiresAt){ shouldClose = true; reason = `TIME EXPIRED`; type="bad"; }
    if(shouldClose) closePosition(id, `${reason}\nP&L: $${pnl.toFixed(2)}`, type);
  });
}

// ===== CLOSE POSITION =====
window.closePosition = async function(id, reason="Manual Close", type="info"){
  const p = positions[id]; if(!p) return; const price = prices[p.pair]; if(!price) return pushNotif("Price not loaded", "bad"); const {pnl} = calcPnL(p, price);
  const returnAmount = p.amount + pnl; await runTransaction(ref(db, `users/${uid}/balance`), (current)=> (parseFloat(current)||0) + returnAmount);
  await remove(ref(db, `trade/${uid}/positions/${id}`)); showCenterToast(`${reason}\nP&L: $${pnl.toFixed(2)}`, type); pushNotif(`Closed ${p.pair}. P&L: $${pnl.toFixed(2)}`, type);
}

// ===== RENDER POSITIONS =====
function renderPositions(){
  const tbody = document.getElementById("positionsBody"); const arr = Object.entries(positions);
  if(!arr.length){ tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:20px">No open positions</td></tr>`; return; }
  tbody.innerHTML = arr.map(([id, p])=>{ const price = prices[p.pair] || p.entry; const {pnl, pnlPct} = calcPnL(p, price); const timeLeft = p.expiresAt? Math.max(0, p.expiresAt - Date.now()) : null; const pnlClass = pnl >= 0? "up" : "down";
    return `<tr class="pos"><td>${p.pair} ${p.type==="signal"?'<span class="badge-signal">SIGNAL</span>':''}</td><td><span class="badge-side ${p.side}">${p.side.toUpperCase()}</span></td><td>${(p.amount / p.entry).toFixed(6)}</td><td>$${p.entry.toFixed(4)}</td><td class="pnl ${pnlClass}">$${pnl.toFixed(2)} <span style="font-size:10px">(${pnlPct.toFixed(2)}%)</span></td><td>${p.tp}% / ${p.sl}% ${timeLeft?`<br><span style="font-size:10px">${Math.floor(timeLeft/60000)}:${((timeLeft%60000)/1000).toFixed(0).padStart(2,'0')}</span>`:''}</td><td><button class="close-btn" onclick="closePosition('${id}')"><i class="fa-solid fa-xmark"></i></button></td></tr>`;
  }).join('');
}

// ===== EQUITY =====
function updateEquity(){
  if(balance === null){ document.getElementById("balance").textContent = "--"; document.getElementById("equity").textContent = "--"; return; }
  const floatingPnL = Object.values(positions).reduce((sum,p)=>{ const price = prices[p.pair] || p.entry; const {pnl} = calcPnL(p, price); return sum + pnl; }, 0);
  const equity = balance + floatingPnL; document.getElementById("balance").textContent = "$" + balance.toFixed(2); document.getElementById("equity").textContent = "$" + equity.toFixed(2);
}

document.getElementById("pairSelect").onchange = e=>{ currentPair = e.target.value; loadChart(currentPair); updateUI(); }

if(!sessionStorage.getItem("cypx_welcomed")){ pushNotif("Connected to CYPX TRADE 200x", "info"); sessionStorage.setItem("cypx_welcomed", "true"); }
</script>
</body>
</html>
