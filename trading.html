<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYPX TRADE - Trading</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<style>
:root{--bg:#0b1120;--card:#121a2b;--card2:#1a2440;--brand:#2563eb;--ok:#16a34a;--bad:#dc2626;--warn:#f59e0b;--text:#e2e8f0;--muted:#94a3b8;--line:#24324f}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:var(--bg);color:var(--text)}
.container{max-width:1200px;margin:0 auto;padding:12px}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 0}
.logo{font-weight:700;font-size:20px;color:var(--brand)}
.balance-card{background:var(--card);padding:12px;border-radius:14px;display:flex;gap:20px}
.balance-card div{line-height:1.4}
.bal-label{font-size:12px;color:var(--muted)}
.bal-value{font-size:18px;font-weight:600}
.grid{display:grid;grid-template-columns:1fr 340px;gap:12px;margin-top:12px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);border-radius:16px;padding:14px;border:1px solid var(--line)}
.pair-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.pair-price{font-size:26px;font-weight:700}
.pair-change{font-size:14px}
.pair-change.up{color:var(--ok)}.pair-change.down{color:var(--bad)}
.chart{height:400px;background:var(--card2);border-radius:10px;overflow:hidden}
.order-panel h3{margin-bottom:10px}
.tabs{display:flex;background:var(--card2);border-radius:10px;padding:4px;margin-bottom:10px}
.tab{flex:1;text-align:center;padding:8px;border-radius:8px;cursor:pointer;font-weight:600}
.tab.active{background:var(--brand)}
.input-group{margin-bottom:10px}
.input-group label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
.input-group input{width:100%;padding:12px;background:var(--card2);border:1px solid var(--line);border-radius:10px;color:var(--text);font-size:16px;outline:none}
.btn-buy{width:100%;padding:14px;background:var(--ok);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:16px;cursor:pointer;margin-top:4px}
.btn-sell{width:100%;padding:14px;background:var(--bad);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:16px;cursor:pointer;margin-top:4px}
.btn-buy:disabled,.btn-sell:disabled{opacity:.4;cursor:not-allowed}
.positions table{width:100%;border-collapse:collapse;font-size:12px}
.positions th{text-align:left;color:var(--muted);padding:8px 4px;border-bottom:1px solid var(--line)}
.positions td{padding:8px 4px}
.badge-side{padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600}
.badge-side.buy{background:rgba(22,163,74,.2);color:var(--ok)}
.badge-side.sell{background:rgba(220,38,38,.2);color:var(--bad)}
.pos.pnl.up{color:var(--ok)}.pos.pnl.down{color:var(--bad)}
.close-btn{background:var(--line);border:none;color:var(--text);padding:4px 8px;border-radius:6px;cursor:pointer;font-size:11px}
.close-btn:hover{background:var(--bad)}
.notif-bell{position:relative;cursor:pointer;font-size:20px}
.badge{position:absolute;top:-6px;right:-6px;background:var(--bad);color:#fff;font-size:10px;padding:2px 5px;border-radius:99px}
.notif-panel{position:absolute;top:40px;right:0;width:320px;background:var(--card2);border:1px solid var(--line);border-radius:12px;display:none;z-index:99;max-height:400px;overflow-y:auto}
.notif-panel.show{display:block}
.notif-item{padding:10px;border-bottom:1px solid var(--line);font-size:13px}
.notif-item.time{font-size:11px;color:var(--muted)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card2);padding:12px 16px;border-radius:12px;border-left:4px solid var(--brand);display:none;z-index:999}
.toast.show{display:block;animation:slide.3s}
@keyframes slide{from{transform:translateX(100%)}to{transform:translateX(0)}}
.loading{opacity:.5;pointer-events:none}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo"><i class="fa-solid fa-chart-line"></i> CYPX TRADE</div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="balance-card" id="balCard">
        <div><div class="bal-label">Balance</div><div class="bal-value" id="balance">--</div></div>
        <div><div class="bal-label">Equity</div><div class="bal-value" id="equity">--</div></div>
      </div>
      <div style="position:relative">
        <i class="fa-solid fa-bell notif-bell" id="bell"></i>
        <span class="badge" id="notifCount" style="display:none">0</span>
        <div class="notif-panel" id="notifPanel"></div>
      </div>
    </div>
  </div>

  <div class="grid">
    <div>
      <div class="card">
        <div class="pair-header">
          <select id="pairSelect" style="background:var(--card2);border:1px solid var(--line);color:var(--text);padding:6px;border-radius:8px">
            <option>BTC/USDT</option><option>ETH/USDT</option><option>SOL/USDT</option>
            <option>BNB/USDT</option><option>XRP/USDT</option><option>DOGE/USDT</option>
            <option>ADA/USDT</option><option>TON/USDT</option>
          </select>
          <div class="pair-price" id="pairPrice">$0.00</div>
          <div class="pair-change up" id="pairChange">0.00%</div>
        </div>
        <div class="chart" id="tradingview_chart"></div>
      </div>

      <div class="card positions" style="margin-top:12px">
        <h3>Open Positions</h3>
        <table>
          <thead><tr><th>Pair</th><th>Side</th><th>Qty</th><th>Entry</th><th>P&L</th><th>TP/SL</th><th></th></tr></thead>
          <tbody id="positionsBody">
            <tr><td colspan="7" style="text-align:center;color:var(--muted);padding:20px">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card order-panel">
      <h3>Place Order</h3>
      <div class="tabs">
        <div class="tab active" data-type="buy">Buy</div>
        <div class="tab" data-type="sell">Sell</div>
      </div>
      <div class="input-group">
        <label>Amount USDT</label>
        <input type="number" id="orderAmount" placeholder="100" value="100">
      </div>
      <div class="input-group">
        <label>Take Profit %</label>
        <input type="number" id="tp" placeholder="2" value="2">
      </div>
      <div class="input-group">
        <label>Stop Loss %</label>
        <input type="number" id="sl" placeholder="1" value="1">
      </div>
      <button class="btn-buy" id="buyBtn" disabled>Buy BTC</button>
      <button class="btn-sell" id="sellBtn" style="display:none" disabled>Sell BTC</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, onValue, push, remove, serverTimestamp, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.app",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.appspot.com", // FIXED THIS
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
  measurementId: "G-4RSQXZJX44"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let uid = null;
let balance = null;
let positions = {};
let currentPair = "BTC/USDT";
let prices = {
  "BTC/USDT": 68420.50, "ETH/USDT": 3500.20, "SOL/USDT": 150.80,
  "BNB/USDT": 580.30, "XRP/USDT": 0.52, "DOGE/USDT": 0.14,
  "ADA/USDT": 0.45, "TON/USDT": 5.20
};
let orderType = "buy";

const toast = document.getElementById("toast");
function pushNotif(msg, type="info"){
  toast.textContent = msg;
  toast.style.borderLeftColor = type==="ok"? "var(--ok)" : type==="bad"? "var(--bad)" : "var(--brand)";
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"), 3000);
}

function loadChart(symbol){
  document.getElementById("tradingview_chart").innerHTML = "";
  new TradingView.widget({
    "width": "100%", "height": 400, "symbol": "BINANCE:" + symbol.replace("/", ""),
    "interval": "15", "theme": "dark", "container_id": "tradingview_chart"
  });
}

function updatePrice(){
  const newPrices = {...prices};
  Object.keys(newPrices).forEach(pair=>{
    newPrices += (Math.random() - 0.5) * (pair.includes("BTC")?50:1);
  });
  prices = newPrices;
  document.getElementById("pairPrice").textContent = "$" + prices[currentPair].toFixed(2);
  updateEquity();
}
setInterval(updatePrice, 2000);

/* CRITICAL FIX: Check both trade/ and users/ */
onAuthStateChanged(auth, (user)=>{
  if(!user){
    pushNotif("Not logged in", "bad");
    window.location.href="auth.html";
    return;
  }
  uid = user.uid;
  pushNotif("Logged in: " + uid.substring(0,6));
  document.getElementById("balCard").classList.add("loading");
  loadChart(currentPair);

  const tradeBalRef = ref(db, `trade/${uid}/balance`);
  const userBalRef = ref(db, `users/${uid}/balance`);
  const positionsRef = ref(db, `trade/${uid}/positions`);

  // Try trade balance first
  onValue(tradeBalRef, (snap)=>{
    if(snap.exists()){
      balance = parseFloat(snap.val());
    } else {
      // Fallback to users balance
      onValue(userBalRef, (uSnap)=>{
        balance = uSnap.exists()? parseFloat(uSnap.val()) : null;
        if(balance === null) pushNotif("No balance found in DB", "bad");
      });
    }
    updateEquity();
    document.getElementById("buyBtn").disabled = balance === null;
    document.getElementById("sellBtn").disabled = balance === null;
    document.getElementById("balCard").classList.remove("loading");
  });

  onValue(positionsRef, (snap)=>{
    positions = snap.val() || {};
    renderPositions();
    updateEquity();
  });
});

async function placeOrder(){
  if(balance === null) return pushNotif("Balance not loaded", "bad");
  const amount = parseFloat(document.getElementById("orderAmount").value);
  if(amount > balance) return pushNotif("Insufficient balance", "bad");
  const price = prices[currentPair];
  const qty = amount / price;
  const fee = amount * 0.001;

  await runTransaction(ref(db, `trade/${uid}/balance`), (current)=>{
    const curr = parseFloat(current) || balance || 0;
    return curr - amount - fee;
  });
  await push(ref(db, `trade/${uid}/positions`), {
    pair: currentPair, side: orderType, qty: qty, entry: price,
    tp: parseFloat(document.getElementById("tp").value),
    sl: parseFloat(document.getElementById("sl").value),
    openedAt: serverTimestamp()
  });
  pushNotif("Order placed", "ok");
}

async function closePosition(id){
  const p = positions[id];
  const price = prices[p.pair];
  const pnl = p.side==="buy"? (price - p.entry)*p.qty : (p.entry - price)*p.qty;
  await runTransaction(ref(db, `trade/${uid}/balance`), (current)=> (parseFloat(current)||0) + (p.qty*price) + pnl);
  await remove(ref(db, `trade/${uid}/positions/${id}`));
}

function renderPositions(){
  const tbody = document.getElementById("positionsBody");
  const arr = Object.entries(positions);
  tbody.innerHTML = arr.length? arr.map(([id,p])=>{
    const pnl = (prices[p.pair]-p.entry)*p.qty;
    return `<tr><td>${p.pair}</td><td><span class="badge-side ${p.side}">${p.side.toUpperCase()}</span></td><td>${p.qty.toFixed(4)}</td><td>$${p.entry.toFixed(2)}</td><td class="pnl ${pnl>=0?'up':'down'}">$${pnl.toFixed(2)}</td><td>${p.tp}%/${p.sl}%</td><td><button class="close-btn" onclick="closePosition('${id}')"><i class="fa-solid fa-xmark"></i></button></td></tr>`
  }).join('') : `<tr><td colspan="7">No open positions</td></tr>`;
}

function updateEquity(){
  if(balance === null){
    document.getElementById("balance").textContent = "--";
    document.getElementById("equity").textContent = "--";
    return;
  }
  const totalPnL = Object.values(positions).reduce((s,p)=> s + (prices[p.pair]-p.entry)*p.qty, 0);
  document.getElementById("balance").textContent = "$" + balance.toFixed(2);
  document.getElementById("equity").textContent = "$" + (balance + totalPnL).toFixed(2);
}

document.getElementById("pairSelect").onchange = e=>{currentPair=e.target.value;loadChart(currentPair)};
document.getElementById("buyBtn").onclick = placeOrder;
document.getElementById("sellBtn").onclick = placeOrder;
window.closePosition = closePosition;
</script>
</body>
          </html>
