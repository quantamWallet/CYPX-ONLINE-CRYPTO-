<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYPX Copy Trading</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, rgba(0,8,20,0.95), rgba(0,29,61,0.95)), url("Screenshot_20260701-191309.jpg");
      background-size: cover; background-attachment: fixed;
      color: white; padding-bottom: 100px; min-height: 100vh;
    }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.header { text-align: center; margin-bottom: 30px; }
    h1 { color: #ffd700; margin: 0 0 8px; font-size: 32px; font-weight: 800; letter-spacing: -0.5px; }
.subtitle { color: #a0aec0; font-size: 15px; }

.balance-card {
      background: linear-gradient(135deg,#007BFF 0%,#00C896 100%);
      padding: 22px; border-radius: 18px; margin-bottom: 24px; text-align: center;
      box-shadow: 0 8px 30px rgba(0,200,255,0.3); border: 1px solid rgba(255,255,255,0.1);
    }
.balance-label { font-size: 13px; color: rgba(255,255,255,0.9); text-transform: uppercase; letter-spacing: 1px; }
.balance-value { font-size: 30px; font-weight: 800; color: #ffd700; margin-top: 6px; }

.portfolio-card {
      background: rgba(0,26,51,0.6); backdrop-filter: blur(15px);
      padding: 24px; border-radius: 18px; margin-bottom: 30px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08);
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
    }
.portfolio-stat { text-align: center; }
.portfolio-label { font-size: 12px; color: #94e2cc; text-transform: uppercase; letter-spacing: 0.5px; }
.portfolio-value { font-size: 24px; font-weight: 800; margin-top: 6px; }
.portfolio-value.green { color: #00C896; }
.portfolio-value.red { color: #ef4444; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); gap: 20px; }

.trader-card {
    background: rgba(0,26,51,0.7); backdrop-filter: blur(15px);
    padding: 22px; border-radius: 18px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.08);
    transition: all 0.3s ease;
  }
.trader-card.copying { border-color: #00C896; box-shadow: 0 0 30px rgba(0,200,150,0.4); }
.trader-card:hover { transform: translateY(-5px); border-color: rgba(0,200,150,0.3); }

.trader-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }

.avatar {
    width: 56px; height: 56px; border-radius: 50%;
    overflow: hidden; flex-shrink: 0;
    border: 2px solid #00C896;
    box-shadow: 0 0 15px rgba(0, 245, 160, 0.5);
    background: #0a1f2e;
  }
.avatar img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }

.trader-name { font-weight: 700; font-size: 18px; color: #fff; }
.verified { background: linear-gradient(90deg,#00C896,#007A54); color: #000; font-size: 10px; padding: 4px 8px; border-radius: 6px; margin-left: 6px; font-weight: 800; }
.trader-bio { font-size: 14px; color: #cbd5e1; line-height: 1.6; margin-bottom: 16px; }

.stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 18px 0; }
.stat { background: rgba(255,255,255,0.05); padding: 14px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
.stat-label { font-size: 11px; color: #94e2cc; text-transform: uppercase; }
.stat-value { font-size: 17px; font-weight: 800; color: #fff; margin-top: 5px; }
.stat-value.green { color: #00C896; }
.stat-value.gold { color: #ffd700; }

.pnl-box { background: rgba(0,200,150,0.1); border: 1px solid rgba(0,200,150,0.3); padding: 16px; border-radius: 12px; margin: 16px 0; display: none; }
.pnl-box.active { display: block; }
.pnl-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 14px; }
.pnl-label { color: #94e2cc; }
.pnl-value { font-weight: 800; }

.copy-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(90deg,#00C896,#007A54);
    color: white; border: none; border-radius: 12px;
    font-weight: 800; cursor: pointer; font-size: 15px;
    transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,200,150,0.3);
  }
.copy-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,200,150,0.4); }
.copy-btn:disabled { background: #555; cursor: not-allowed; transform: none; }
.stop-btn { background: linear-gradient(90deg,#ef4444,#dc2626); box-shadow: 0 4px 15px rgba(239,68,68,0.3); }
.stop-btn:hover { box-shadow: 0 6px 20px rgba(239,68,68,0.4); }
.waiting-btn { background: linear-gradient(90deg,#f59e0b,#d97706); box-shadow: 0 4px 15px rgba(245,158,11,0.3); }
.waiting-btn:hover { transform: none; }

.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(8px); }
.modal.active { display: flex; }
.modal-content { background: #001d3d; padding: 32px; border-radius: 20px; max-width: 440px; width: 90%; border: 1px solid rgba(0,200,255,0.3); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
.modal-content h2 { margin-top: 0; color: #ffd700; margin-bottom: 12px; }
.modal-content label { font-size: 13px; color: #94e2cc; display: block; margin-bottom: 6px; }
.modal-content input { width: 100%; padding: 14px; margin: 8px 0 18px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: rgba(0,0,0,0.3); color: white; font-size: 15px; }
.modal-actions { display: flex; gap: 12px; }
.btn-secondary { background: #334155; box-shadow: none; }
.toast { position: fixed; top: 20px; right: 20px; background: #0A2540; color: white; padding: 16px 20px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.4); transform: translateX(400px); transition: transform 0.3s ease; z-index: 9999; font-weight: 600; }
.toast.show { transform: translateX(0); }
.toast.success { background: #00C896; }
.toast.error { background: #ef4444; }
.toast.info { background: #007BFF; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1><i class="fas fa-copy"></i> CYPX Copy Trading</h1>
    <p class="subtitle">Automatically copy trades from top CYPX traders. Start with as low as $50.</p>
  </div>

  <div class="balance-card">
    <div class="balance-label">Available Balance</div>
    <div class="balance-value" id="userBalance">$0.00</div>
  </div>

  <div class="portfolio-card">
    <div class="portfolio-stat"><div class="portfolio-label">Total Copied</div><div class="portfolio-value" id="totalCopied">$0.00</div></div>
    <div class="portfolio-stat"><div class="portfolio-label">Total P&L</div><div class="portfolio-value green" id="totalPnL">$0.00</div></div>
    <div class="portfolio-stat"><div class="portfolio-label">Active Traders</div><div class="portfolio-value" id="activeCount">0</div></div>
  </div>

  <div class="grid" id="tradersGrid"></div>
</div>

<div class="modal" id="copyModal">
  <div class="modal-content">
    <h2><i class="fas fa-rocket"></i> Start Copy Trading</h2>
    <p id="modalTraderName" style="color:#94e2cc; margin-bottom: 20px;"></p>
    <label>Amount to Copy <small>Min: $50</small></label>
    <input type="number" id="copyAmount" placeholder="500" min="50">
    <label>Max Daily Loss Limit</label>
    <input type="number" id="lossLimit" placeholder="100" min="10">
    <div class="modal-actions">
      <button class="copy-btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="copy-btn" onclick="confirmCopy()">Confirm Copy</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.firebasestorage.app",
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
  measurementId: "G-4RSQXZJX44"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const traders = [
  { id: 'kenyan_prince', name: 'Kenyan Prince', bio: 'Nairobi based. Specialist in Gold & Indices. 6+ years trading experience.', roi: '+142.3%', winRate: '78%', followers: '2.4k', risk: 'Medium', avatar: 'Kenyan Prince.jpg', profitShare: 20 },
  { id: 'alpha_trader', name: 'Alpha Snique', bio: 'Conservative trader. Low risk scalper on EURUSD & GBPUSD. Consistent monthly gains.', roi: '+98.7%', winRate: '82%', followers: '5.1k', risk: 'Low', avatar: 'alpha Snique.jpg', profitShare: 15 },
  { id: 'states_ke', name: 'States Ke', bio: 'High risk, high reward. NY session trader. Known for big wins on US30 & NAS100.', roi: '+210.5%', winRate: '71%', followers: '1.8k', risk: 'High', avatar: 'stateske.jpg', profitShare: 25 },
  { id: 'vidollar', name: 'Vidollar', bio: 'Mombasa trader. Swing trader on majors. Disciplined risk management and TP/SL.', roi: '+165.2%', winRate: '75%', followers: '3.2k', risk: 'Medium', avatar: 'vidollar.jpg', profitShare: 18 },
  { id: 'ziwa_fx', name: 'Ziwa Fx', bio: 'Kisumu based. Low risk strategy. 85% win rate on scalping London session.', roi: '+89.4%', winRate: '85%', followers: '4.7k', risk: 'Low', avatar: 'ziwa.jpg', profitShare: 12 },
  { id: 'pizzo_fx', name: 'Pizzo Fx', bio: 'Eldoret trader. Crypto + Forex hybrid. Aggressive but calculated entries.', roi: '+134.8%', winRate: '73%', followers: '2.9k', risk: 'Medium', avatar: 'pizzo.jpg', profitShare: 20 }
];

let selectedTrader = null;
let currentUser = null;
let userCopies = {};
let userBalance = 0;
let pnlInterval = null;

auth.onAuthStateChanged(user => {
  if(!user) return window.location.href = "signin.html";
  currentUser = user;
  loadUserBalance();
  renderTraders();
  loadUserCopies();
  startPnLSimulation();
});

function formatMoney(n){ return "$" + Number(n||0).toLocaleString("en-US",{minimumFractionDigits:2}) }

function loadUserBalance(){
  db.ref("users/" + currentUser.uid + "/balance").on("value", snap => {
    userBalance = Number(snap.val() || 0);
    document.getElementById('userBalance').innerText = formatMoney(userBalance);
  });
}

function loadUserCopies() {
  db.ref("copy_trading/" + currentUser.uid).on("value", snap => {
    const newData = snap.val() || {};

    for(let id in newData){
      const copy = newData[id];
      const oldCopy = userCopies[id];

      if(copy.status === "closed" && (!oldCopy || oldCopy.status!== "closed")){
        const profit = copy.pnl || 0;
        showToast(`${copy.traderName} trade closed. P&L: ${formatMoney(profit)}`, profit >= 0? "success" : "error");
        setTimeout(() => {
          db.ref("copy_trading/" + currentUser.uid + "/" + id).remove();
        }, 3000);
      }
    }

    userCopies = newData;
    updatePortfolioSummary();
    renderTraders();
  });
}

function updatePortfolioSummary() {
  let totalAmount = 0, totalPnL = 0, count = 0;
  for(let id in userCopies){
    if(userCopies[id].status === "active"){
      totalAmount += userCopies[id].amount;
      totalPnL += userCopies[id].pnl || 0;
      count++;
    }
  }
  document.getElementById('totalCopied').innerText = formatMoney(totalAmount);
  document.getElementById('totalPnL').innerText = formatMoney(totalPnL);
  document.getElementById('totalPnL').className = `portfolio-value ${totalPnL >= 0? 'green' : 'red'}`;
  document.getElementById('activeCount').innerText = count;
}

function renderTraders() {
  const grid = document.getElementById('tradersGrid');
  grid.innerHTML = traders.map(t => {
    const copyData = userCopies[t.id];
    const status = copyData?.status;
    const isCopying = status === "active";
    const isWaiting = status === "pending_close"; // NEW STATE
    const userPnL = isCopying? (copyData.pnl || 0) : 0;
    const traderEarned = userPnL > 0? (userPnL * t.profitShare / 100) : 0;
    return `
    <div class="trader-card ${isCopying? 'copying' : ''}">
      <div class="trader-header">
        <div class="avatar"><img src="${t.avatar}" alt="${t.name}" onerror="this.src='https://ui-avatars.com/api/?name=${t.name}&background=00C896&color=fff'"></div>
        <div>
          <div class="trader-name">${t.name} <span class="verified">VERIFIED</span></div>
          <div style="font-size:12px; color:#94e2cc">${t.followers} Copiers</div>
        </div>
      </div>

      <div class="trader-bio">${t.bio}</div>

      <div class="stats">
        <div class="stat"><div class="stat-label">30D ROI</div><div class="stat-value green">${t.roi}</div></div>
        <div class="stat"><div class="stat-label">Win Rate</div><div class="stat-value">${t.winRate}</div></div>
        <div class="stat"><div class="stat-label">Fee</div><div class="stat-value gold">${t.profitShare}%</div></div>
      </div>

      <div class="pnl-box ${isCopying? 'active' : ''}" id="pnl-box-${t.id}">
        <div class="pnl-row"><span class="pnl-label">Your P&L</span><span class="pnl-value ${userPnL >= 0? 'green' : 'red'}" id="pnl-${t.id}">${formatMoney(userPnL)}</span></div>
        <div class="pnl-row"><span class="pnl-label">Copied Amount</span><span class="pnl-value">${formatMoney(isCopying? copyData.amount : 0)}</span></div>
        <div class="pnl-row"><span class="pnl-label">Trader Earned</span><span class="pnl-value gold">${formatMoney(traderEarned)}</span></div>
      </div>

      <div class="btn-group">
        ${isCopying
? `<button class="copy-btn stop-btn" onclick="stopCopy('${t.id}')"><i class="fas fa-stop-circle"></i> Stop Copy Trading</button>` // STATE 2
          : isWaiting
? `<button class="copy-btn waiting-btn" disabled><i class="fas fa-hourglass-half"></i> Waiting for ${t.name} to close trade</button>` // STATE 3
          : `<button class="copy-btn" onclick="openModal('${t.id}')"><i class="fas fa-copy"></i> Copy Trader</button>` // STATE 1
        }
      </div>
    </div>
  `}).join('');
}

// FAKE PNL SIMULATION - 70% PROFIT BIAS
function startPnLSimulation(){
  if(pnlInterval) clearInterval(pnlInterval);
  pnlInterval = setInterval(() => {
    for(let id in userCopies){
      if(userCopies[id].status === "active"){
        const amount = userCopies[id].amount;
        const maxChange = amount * 0.02;

        const isProfit = Math.random() < 0.7;
        const change = (Math.random() * maxChange) * (isProfit? 1 : -1);

        const newPnL = (userCopies[id].pnl || 0) + change;
        const minPnL = -amount * 0.5;
        const finalPnL = Math.max(minPnL, newPnL);

        db.ref(`copy_trading/${currentUser.uid}/${id}/pnl`).set(finalPnL);
      }
    }
  }, 3000);
}

function openModal(traderId) {
  selectedTrader = traders.find(t => t.id === traderId);
  document.getElementById('modalTraderName').innerText = `Copy ${selectedTrader.name} | Trader takes ${selectedTrader.profitShare}% of your profits`;
  document.getElementById('copyModal').classList.add('active');
}

function closeModal() {
  document.getElementById('copyModal').classList.remove('active');
  document.getElementById('copyAmount').value = '';
  document.getElementById('lossLimit').value = '';
}

function confirmCopy() {
  const amount = Number(document.getElementById('copyAmount').value);
  const lossLimit = Number(document.getElementById('lossLimit').value);

  if(!amount || amount < 50) return showToast('Minimum copy amount is $50', 'error');
  if(!lossLimit) return showToast('Please set a loss limit', 'error');
  if(amount > userBalance) return showToast(`Insufficient Balance. You have ${formatMoney(userBalance)}`, 'error');

  db.ref("users/" + currentUser.uid + "/balance").transaction(current => (current||0) - amount)
.then(() => {
    return db.ref("copy_trading/" + currentUser.uid + "/" + selectedTrader.id).set({
      traderName: selectedTrader.name, amount: amount, lossLimit: lossLimit,
      profitShare: selectedTrader.profitShare, pnl: 0, status: "active", startedAt: Date.now()
    });
  }).then(() => {
    db.ref("copy_logs/" + currentUser.uid).push({ action: "START_COPY", traderId: selectedTrader.id, amount: amount, timestamp: Date.now() });
    showToast(`Now copying ${selectedTrader.name}`, 'success'); closeModal();
  }).catch(e => showToast("Error: " + e.message, "error"));
}

// NEW: User requests to stop
function stopCopy(traderId) {
  const copyInfo = userCopies[traderId];
  if(!copyInfo || copyInfo.status!== "active") return showToast("Already requested", "error");

  showToast(`Request sent. Waiting for ${copyInfo.traderName} to close trade`, 'info');

  db.ref(`copy_trading/${currentUser.uid}/${traderId}`).update({
    status: "pending_close",
    requestedAt: Date.now()
  }).then(() => {
    db.ref("copy_logs/" + currentUser.uid).push({ action: "REQUEST_STOP", traderId, timestamp: Date.now() });
  }).catch(e => showToast("Error: " + e.message, "error"));
}

function showToast(message, type = "info"){
  const toast = document.getElementById('toast');
  toast.className = `toast ${type} show`;
  toast.innerText = message;
  setTimeout(() => toast.classList.remove('show'), 3000);
}
</script>
</body>
</html>
