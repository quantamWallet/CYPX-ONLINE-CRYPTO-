<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYPX TRADE - Trading</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<style>
:root{--bg:#0b1120;--card:#121a2b;--card2:#1a2440;--brand:#2563eb;--ok:#16a34a;--bad:#dc2626;--warn:#f59e0b;--text:#e2e8f0;--muted:#94a3b8;--line:#24324f}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:var(--bg);color:var(--text)}
.container{max-width:1200px;margin:0 auto;padding:12px}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 0}
.logo{font-weight:700;font-size:20px;color:var(--brand)}
.header-right{display:flex;gap:10px;align-items:center}
.notif-btn{background:var(--card2);border:none;color:var(--text);padding:8px 12px;border-radius:10px;cursor:pointer;position:relative}
.notif-dot{position:absolute;top:4px;right:6px;width:8px;height:8px;background:var(--bad);border-radius:50%;display:none}
.balance-card{background:var(--card);padding:16px;border-radius:14px;display:flex;gap:30px;margin-bottom:12px;border:1px solid var(--line)}
.bal-item.bal-label{font-size:12px;color:var(--muted)}
.bal-item.bal-value{font-size:20px;font-weight:700}
.grid{display:grid;grid-template-columns:1fr 340px;gap:12px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);border-radius:16px;padding:14px;border:1px solid var(--line)}
.copy-btn-link{width:100%;padding:10px;background:var(--brand);border:none;border-radius:10px;color:#fff;font-weight:600;cursor:pointer;margin-bottom:12px}
.signal-box input{width:100%;padding:12px;background:var(--card2);border:1px solid var(--line);border-radius:10px;color:var(--text);margin-bottom:8px}
.signal-box button{width:100%;padding:12px;background:var(--warn);border:none;border-radius:10px;color:#000;font-weight:700;cursor:pointer}
.active-signal{background:var(--card2);padding:12px;border-radius:12px;margin-top:10px;border-left:3px solid var(--brand)}
.active-signal.row{display:flex;justify-content:space-between;font-size:13px;margin:4px 0}
.pair-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.pair-price{font-size:26px;font-weight:700}
.pair-change.up{color:var(--ok)}.pair-change.down{color:var(--bad)}
.chart{height:400px;background:var(--card2);border-radius:10px;overflow:hidden}
.tabs{display:flex;background:var(--card2);border-radius:10px;padding:4px;margin-bottom:10px}
.tab{flex:1;text-align:center;padding:8px;border-radius:8px;cursor:pointer;font-weight:600}
.tab.active{background:var(--brand)}
.input-group{margin-bottom:10px}
.input-group input{width:100%;padding:12px;background:var(--card2);border:1px solid var(--line);border-radius:10px;color:var(--text)}
.btn-buy{width:100%;padding:14px;background:var(--ok);border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer}
.btn-sell{width:100%;padding:14px;background:var(--bad);border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer}
.position-item{background:var(--card2);padding:10px;border-radius:10px;margin-bottom:8px;font-size:13px}
.pos-row{display:flex;justify-content:space-between;margin:3px 0}
.close-btn{width:100%;padding:6px;background:var(--bad);border:none;border-radius:6px;color:#fff;cursor:pointer;margin-top:5px;font-size:12px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card2);padding:12px 16px;border-radius:12px;border-left:4px solid var(--brand);display:none;z-index:999}
.toast.show{display:block}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo"><i class="fa-solid fa-chart-line"></i> CYPX TRADE</div>
    <div class="header-right">
      <button class="notif-btn" onclick="pushNotif('No new notifications')"><i class="fa-solid fa-bell"></i><span class="notif-dot" id="notifDot"></span></button>
      <button class="copy-btn-link" style="width:auto;padding:10px 16px" onclick="window.location.href='copy.html'"><i class="fa-solid fa-copy"></i> Copy</button>
    </div>
  </div>

  <div class="balance-card">
    <div class="bal-item"><div class="bal-label">Main Balance</div><div class="bal-value" id="mainBalance">$0.00</div></div>
    <div class="bal-item"><div class="bal-label">Equity</div><div class="bal-value" id="equityBalance">$0.00</div></div>
  </div>

  <div class="grid">
    <div>
      <div class="card">
        <div class="pair-header">
          <select id="pairSelect" style="background:var(--card2);border:1px solid var(--line);color:var(--text);padding:6px;border-radius:8px">
            <option>BTC/USDT</option><option>ETH/USDT</option><option>SOL/USDT</option>
          </select>
          <div class="pair-price" id="pairPrice">$0.00</div>
          <div class="pair-change up" id="pairChange">0.00%</div>
        </div>
        <div class="chart" id="tradingview_chart"></div>
      </div>

      <div class="card">
        <h3><i class="fa-solid fa-list"></i> Open Positions</h3>
        <div id="openPositionsList">No open positions</div>
      </div>
    </div>

    <div>
      <div class="card signal-box">
        <h3><i class="fa-solid fa-key"></i> Enter Signal Code</h3>
        <input type="text" id="signalCode" placeholder="SIGNAL-BTC-001" style="text-transform:uppercase">
        <input type="number" id="signalAmount" placeholder="Min $50 to risk" value="100" min="50">
        <button onclick="activateSignal()">Activate Signal</button>
        <div id="activeSignalBox"></div>
      </div>

      <div class="card">
        <h3>Place Manual Order</h3>
        <div class="tabs">
          <div class="tab active" data-type="buy">Buy</div>
          <div class="tab" data-type="sell">Sell</div>
        </div>
        <div class="input-group"><input type="number" id="orderAmount" placeholder="Min $50 USDT" value="100" min="50"></div>
        <div class="input-group"><input type="number" id="tp" placeholder="TP %" value="2"></div>
        <div class="input-group"><input type="number" id="sl" placeholder="SL %" value="1"></div>
        <button class="btn-buy" id="buyBtn" onclick="placeOrder('buy')">Buy</button>
        <button class="btn-sell" id="sellBtn" style="display:none" onclick="placeOrder('sell')">Sell</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, get, set, push, update, runTransaction, serverTimestamp, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.firebasestorage.app",
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
  measurementId: "G-4RSQXZJX44"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const MIN_TRADE = 50; // $50 minimum
let uid = null;
let balance = 0;
let equity = 0;
let prices = {};
let orderType = "buy";
let allPositions = {};

function pushNotif(msg, type="info"){
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.style.borderLeftColor = type==="ok"? "var(--ok)" : type==="bad"? "var(--bad)" : "var(--brand)";
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"), 3000);
}

onAuthStateChanged(auth, (user)=>{
  if(!user){ window.location.href="auth.html"; return; }
  uid = user.uid;
  loadChart("BTC/USDT");
  fetchPrices();
  onValue(ref(db, `users/${uid}/balance`), snap=>{
    balance = snap.val() || 0;
    document.getElementById("mainBalance").textContent = "$" + balance.toFixed(2);
    updateEquity();
  });
  loadAllPositions();
});

function updateEquity(){
  let pnl = 0;
  Object.values(allPositions).forEach(p=>{
    if(prices[p.pair]){
      const current = prices[p.pair];
      const diff = p.side === "buy"? current - p.entry : p.entry - current;
      if(p.type === "signal") pnl += (diff / p.pipValue) * p.amount;
      else pnl += (diff / p.entry) * p.amount;
    }
  });
  equity = balance + pnl;
  document.getElementById("equityBalance").textContent = "$" + equity.toFixed(2);
}

function loadChart(symbol){
  document.getElementById("tradingview_chart").innerHTML = "";
  new TradingView.widget({
    "width": "100%", "height": 400, "symbol": "BINANCE:" + symbol.replace("/", ""),
    "interval": "15", "theme": "dark", "container_id": "tradingview_chart"
  });
}

async function fetchPrices(){
  const res = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
  const data = await res.json();
  prices["BTC/USDT"] = parseFloat(data.price);
  document.getElementById("pairPrice").textContent = "$" + prices["BTC/USDT"].toFixed(2);
  checkAllPositions();
  updateEquity();
}
setInterval(fetchPrices, 3000);

// TAB SWITCH
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  orderType = t.dataset.type;
  document.getElementById("buyBtn").style.display = orderType==="buy"?"block":"none";
  document.getElementById("sellBtn").style.display = orderType==="sell"?"block":"none";
});

// ===== MANUAL BUY/SELL =====
window.placeOrder = async function(side){
  const amount = parseFloat(document.getElementById("orderAmount").value);
  const tp = parseFloat(document.getElementById("tp").value);
  const sl = parseFloat(document.getElementById("sl").value);
  const pair = document.getElementById("pairSelect").value;
  const price = prices[pair];

  if(amount < MIN_TRADE) return pushNotif(`Minimum trade is $${MIN_TRADE}`, "bad");
  if(amount > balance) return pushNotif("Insufficient balance", "bad");
  if(!price) return pushNotif("Price not loaded", "bad");

  const qty = amount / price;
  await runTransaction(ref(db, `users/${uid}/balance`), b => (b||0) - amount);
  await push(ref(db, `trade/${uid}/positions`), {
    pair, side, qty, entry: price, amount, tp, sl, type: "manual", openedAt: Date.now()
  });
  pushNotif(`${side.toUpperCase()} ${pair} Opened - $${amount}`, "ok");
}

// ===== SIGNAL CODE SYSTEM =====
window.activateSignal = async function(){
  const code = document.getElementById("signalCode").value.trim().toUpperCase();
  const userAmount = parseFloat(document.getElementById("signalAmount").value);
  if(!code) return pushNotif("Enter a signal code", "bad");
  if(userAmount < MIN_TRADE) return pushNotif(`Minimum amount is $${MIN_TRADE}`, "bad");
  if(userAmount > balance) return pushNotif("Insufficient balance", "bad");

  const signalRef = ref(db, `signals/${code}`);
  const snap = await get(signalRef);
  if(!snap.exists()) return pushNotif("Invalid signal code", "bad");

  const signal = snap.val();
  const now = Date.now();
  if(now > signal.expiresAt) return pushNotif("This signal has expired", "bad");
  if(signal.usedBy && signal.usedBy[uid]) return pushNotif("You already used this signal", "bad");

  const price = prices[signal.pair];
  if(!price) return pushNotif("Price not loaded", "bad");

  const qty = userAmount / price;
  const tpPrice = signal.side === "buy"? price + (signal.tp_pips * signal.pipValue) : price - (signal.tp_pips * signal.pipValue);
  const slPrice = signal.side === "buy"? price - (signal.sl_pips * signal.pipValue) : price + (signal.sl_pips * signal.pipValue);

  await runTransaction(ref(db, `users/${uid}/balance`), b => (b||0) - userAmount);
  await push(ref(db, `trade/${uid}/positions`), {
    pair: signal.pair, side: signal.side, qty, entry: price, amount: userAmount,
    tp_pips: signal.tp_pips, sl_pips: signal.sl_pips, pipValue: signal.pipValue,
    tpPrice, slPrice, type: "signal", openedAt: now, expiresAt: now + 600000, code, source: code
  });
  await update(signalRef, { [`usedBy/${uid}`]: true });
  pushNotif(`Signal Activated: ${signal.side.toUpperCase()} ${signal.pair} - $${userAmount}`, "ok");
  document.getElementById("signalCode").value = "";
}

// ===== LOAD + RENDER ALL POSITIONS =====
function loadAllPositions(){
  onValue(ref(db, `trade/${uid}/positions`), snap=>{
    allPositions = snap.val() || {};
    renderPositions();
  });
}

function renderPositions(){
  const box = document.getElementById("openPositionsList");
  if(Object.keys(allPositions).length === 0){ box.innerHTML = "No open positions"; return; }

  let html = "";
  Object.entries(allPositions).forEach(([key, p])=>{
    const current = prices[p.pair] || p.entry;
    const diff = p.side === "buy"? current - p.entry : p.entry - current;
    const pnl = p.type === "signal"? (diff / p.pipValue) * p.amount : (diff / p.entry) * p.amount;
    const timeLeft = p.expiresAt? Math.max(0, p.expiresAt - Date.now()) : null;

    html += `<div class="position-item">
      <div class="pos-row"><b>${p.side.toUpperCase()} ${p.pair}</b><span style="color:${pnl>=0?'var(--ok)':'var(--bad)'}">${pnl>=0?'+':''}$${pnl.toFixed(2)}</span></div>
      <div class="pos-row"><span>Entry:</span><span>$${p.entry.toFixed(2)}</span></div>
      <div class="pos-row"><span>Amount:</span><span>$${p.amount}</span></div>
      ${p.type==="signal"? `<div class="pos-row"><span>TP/SL:</span><span>$${p.tpPrice.toFixed(0)}/$${p.slPrice.toFixed(0)}</span></div>
      <div class="pos-row"><span>Time:</span><span>${Math.floor(timeLeft/60000)}:${((timeLeft%60000)/1000).toFixed(0).padStart(2,'0')}</span></div>` :
      `<div class="pos-row"><span>TP/SL:</span><span>${p.tp}% / ${p.sl}%</span></div>`}
      <button class="close-btn" onclick="closePosition('${key}')">Close Position</button>
    </div>`;
  });
  box.innerHTML = html;
}

// ===== CLOSE POSITION MANUALLY =====
window.closePosition = async function(key){
  const p = allPositions[key];
  const current = prices[p.pair];
  const diff = p.side === "buy"? current - p.entry : p.entry - current;
  const pnl = p.type === "signal"? (diff / p.pipValue) * p.amount : (diff / p.entry) * p.amount;
  await runTransaction(ref(db, `users/${uid}/balance`), b => (b||0) + p.amount + pnl);
  await remove(ref(db, `trade/${uid}/positions/${key}`));
  pushNotif(`Closed: ${pnl >= 0? '+' : ''}$${pnl.toFixed(2)}`, pnl >= 0? "ok" : "bad");
}

// ===== AUTO CLOSE TP/SL/10MIN =====
function checkAllPositions(){
  Object.entries(allPositions).forEach(([key, p])=>{
    if(!prices[p.pair]) return;
    const current = prices[p.pair];
    let shouldClose = false;

    if(p.type === "signal"){
      if(p.side === "buy" && current >= p.tpPrice){ shouldClose = true; }
      if(p.side === "sell" && current <= p.tpPrice){ shouldClose = true; }
      if(p.side === "buy" && current <= p.slPrice){ shouldClose = true; }
      if(p.side === "sell" && current >= p.slPrice){ shouldClose = true; }
      if(Date.now() >= p.expiresAt){ shouldClose = true; }
    } else {
      const tpPrice = p.side === "buy"? p.entry * (1 + p.tp/100) : p.entry * (1 - p.tp/100);
      const slPrice = p.side === "buy"? p.entry * (1 - p.sl/100) : p.entry * (1 + p.sl/100);
      if(p.side === "buy" && current >= tpPrice){ shouldClose = true; }
      if(p.side === "sell" && current <= tpPrice){ shouldClose = true; }
      if(p.side === "buy" && current <= slPrice){ shouldClose = true; }
      if(p.side === "sell" && current >= slPrice){ shouldClose = true; }
    }

    if(shouldClose) closePosition(key);
  });
}
</script>
</body>
                                                              </html>
