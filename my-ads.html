<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>My Advertisements - CYPX Merchant</title>

<meta name="theme-color" content="#007a54">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#08172d;
color:#fff;
padding-bottom:80px;
}

header{
background:linear-gradient(135deg,#007a54,#003b74);
padding:22px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,.35);
}

header h2{
font-size:24px;
font-weight:700;
}

header p{
margin-top:6px;
font-size:14px;
opacity:.9;
}

.container{
width:95%;
max-width:900px;
margin:25px auto;
}

.card{
background:#102b4d;
border-radius:18px;
padding:20px;
margin-bottom:20px;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.loading{
text-align:center;
padding:60px 20px;
color:#bfcfe2;
font-size:15px;
}

.ad-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.ad-type{
font-size:22px;
font-weight:700;
}

.status{
padding:6px 14px;
border-radius:20px;
font-size:13px;
font-weight:600;
}

.active{
background:#00c853;
}

.paused{
background:#ff9800;
}

.details{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin:18px 0;
}

.detail-box{
background:#0d2345;
padding:15px;
border-radius:12px;
text-align:center;
}

.detail-box h4{
font-size:13px;
color:#9fc8ff;
margin-bottom:8px;
}

.detail-box span{
font-size:18px;
font-weight:700;
}

.actions{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:20px;
}

.btn{
padding:14px;
border:none;
border-radius:12px;
font-weight:600;
cursor:pointer;
color:#fff;
}

.edit{
background:#1976d2;
}

.pause{
background:#ff9800;
}

.delete{
background:#e53935;
}

.empty{
text-align:center;
padding:70px 20px;
color:#bfcfe2;
}

.toast{
position:fixed;
top:20px;
right:20px;
background:#00c853;
padding:15px 18px;
border-radius:12px;
display:none;
font-weight:600;
z-index:9999;
}

.toast.error{
background:#e53935;
}

@media(max-width:650px){

.details{
grid-template-columns:1fr;
}

.actions{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>

<h2>
<i class="fas fa-bullhorn"></i>
My Advertisements
</h2>

<p>
Manage your BUY and SELL advertisements.
</p>

</header>

<div class="container">

<div id="adsContainer">

<div class="loading">

<i class="fas fa-spinner fa-spin"></i>

<br><br>

Loading advertisements...

</div>

</div>

</div>

<div id="toast" class="toast"></div>
<script>
// Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.firebasestorage.app",
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
  measurementId: "G-4RSQXZJX44"
};
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;
let merchant = null;

function showToast(message,type="success"){

const toast=document.getElementById("toast");

toast.innerHTML=message;

toast.className="toast";

if(type==="error"){
toast.classList.add("error");
}

toast.style.display="block";

setTimeout(()=>{
toast.style.display="none";
},3000);

}

auth.onAuthStateChanged(async(user)=>{

if(!user){

location.href="auth.html";
return;

}

currentUser=user;

try{

const merchantSnap=await db.ref("merchantApplications/"+user.uid).once("value");

if(!merchantSnap.exists()){

location.href="merchant-apply.html";
return;

}

merchant=merchantSnap.val();

if(merchant.status!=="approved"){

location.href="merchant-apply.html";
return;

}

loadMyAdvertisements();

}catch(err){

showToast(err.message,"error");

}

});
function loadMyAdvertisements(){

const container=document.getElementById("adsContainer");

db.ref("p2pAds")
.orderByChild("merchantUid")
.equalTo(currentUser.uid)
.on("value",(snapshot)=>{

container.innerHTML="";

if(!snapshot.exists()){

container.innerHTML=`
<div class="empty">
<i class="fas fa-folder-open" style="font-size:55px;color:#00d4ff;"></i>
<br><br>
<h3>No Advertisements</h3>
<p>Create your first BUY or SELL advertisement.</p>
</div>
`;

return;

}

const ads=[];

snapshot.forEach(child=>{

ads.unshift({

id:child.key,

...child.val()

});

});

ads.forEach(ad=>{

const statusClass=
ad.status==="active"
?
"active"
:
"paused";

const statusText=
ad.status==="active"
?
"ACTIVE"
:
"PAUSED";

const buttonText=
ad.status==="active"
?
"Pause"
:
"Resume";

const card=document.createElement("div");

card.className="card";

card.innerHTML=`

<div class="ad-header">

<div class="ad-type">

${ad.type.toUpperCase()} USDT

</div>

<div class="status ${statusClass}">

${statusText}

</div>

</div>

<div class="details">

<div class="detail-box">
<h4>Rate</h4>
<span>KES ${Number(ad.rate).toFixed(2)}</span>
</div>

<div class="detail-box">
<h4>Available</h4>
<span>$${Number(ad.availableUSD).toLocaleString()}</span>
</div>

<div class="detail-box">
<h4>Limits</h4>
<span>$${ad.minTrade} - $${ad.maxTrade}</span>
</div>

<div class="detail-box">
<h4>Orders</h4>
<span>${ad.totalOrders || 0}</span>
</div>

</div>

<div class="actions">

<button
class="btn edit"
onclick="editAdvertisement('${ad.id}')">

<i class="fas fa-pen"></i>

Edit

</button>

<button
class="btn pause"
onclick="toggleAdvertisement('${ad.id}','${ad.status}')">

<i class="fas fa-power-off"></i>

${buttonText}

</button>

<button
class="btn delete"
onclick="deleteAdvertisement('${ad.id}')">

<i class="fas fa-trash"></i>

Delete

</button>

</div>

`;

container.appendChild(card);

});

});

}

// ==========================
// EDIT ADVERTISEMENT
// ==========================

function editAdvertisement(adId){

localStorage.setItem("editAdvertisementId", adId);

window.location.href = "edit-advertisement.html";

}

// ==========================
// PAUSE / RESUME ADVERTISEMENT
// ==========================

async function toggleAdvertisement(adId,currentStatus){

try{

const newStatus =
currentStatus === "active"
?
"paused"
:
"active";

await db.ref("p2pAds/"+adId).update({
status:newStatus
});

// Update active ads count
const statsRef = db.ref("merchantStats/"+currentUser.uid);

const statsSnap = await statsRef.once("value");

const stats = statsSnap.val() || {};

let activeAds = Number(stats.activeAds || 0);

if(newStatus==="active"){
activeAds++;
}else{
activeAds=Math.max(0,activeAds-1);
}

await statsRef.update({
activeAds:activeAds
});

// Activity Log
const activityId = db.ref().push().key;

await db.ref("merchantActivity/"+currentUser.uid+"/"+activityId).set({

type:"advert",

title:
newStatus==="active"
?
"Advertisement Resumed"
:
"Advertisement Paused",

message:
"Your advertisement has been "+
newStatus.toUpperCase()+".",

time:new Date().toLocaleString(),

timestamp:Date.now()

});

showToast("Advertisement "+newStatus+".");

}catch(err){

console.error(err);

showToast(err.message,"error");

}

}

// ==========================
// DELETE ADVERTISEMENT
// ==========================

async function deleteAdvertisement(adId){

if(!confirm("Delete this advertisement?")){
return;
}

try{

const adSnap = await db.ref("p2pAds/"+adId).once("value");

const ad = adSnap.val();

if(ad){

await db.ref("p2pAds/"+adId).remove();

// Update merchant statistics
const statsRef = db.ref("merchantStats/"+currentUser.uid);

const statsSnap = await statsRef.once("value");

const stats = statsSnap.val() || {};

let activeAds = Number(stats.activeAds || 0);

if(ad.status==="active"){
activeAds=Math.max(0,activeAds-1);
}

await statsRef.update({
activeAds:activeAds
});

// Activity
const activityId = db.ref().push().key;

await db.ref("merchantActivity/"+currentUser.uid+"/"+activityId).set({

type:"advert",

title:"Advertisement Deleted",

message:
"You deleted a "+
ad.type.toUpperCase()+
" advertisement.",

time:new Date().toLocaleString(),

timestamp:Date.now()

});

}

showToast("Advertisement deleted.");

}catch(err){

console.error(err);

showToast(err.message,"error");

}

}
</script>

</body>
</html>
