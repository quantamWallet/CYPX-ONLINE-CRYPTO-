<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CYPX HOLDINGS Team</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-compat.js"></script>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#000814,#001d3d);
  color:white;
  padding-bottom:80px;
}

header{
  padding:15px;
  display:flex;
  align-items:center;
  gap:10px;
  background:linear-gradient(90deg,#001d3d,#003566);
}

header img{height:30px;}

.card{
  margin:15px;
  padding:15px;
  border-radius:16px;
  background:linear-gradient(145deg,#001f3f,#003566);
}

.ref-box input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#0a2540;
  color:#fff;
}

.stats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.stat{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:10px;
  text-align:center;
}

.stat span{
  color:#00e5ff;
  font-weight:bold;
  font-size:18px;
}

.level-title{
  text-align:center;
  margin-top:10px;
  color:#00e5ff;
  font-weight:bold;
}

.level-box{
  margin:10px 15px;
  padding:15px;
  border-radius:12px;
  background:linear-gradient(145deg,#002b5c,#001f3f);
}

.ref-item{
  padding:8px;
  margin:5px 0;
  border-radius:8px;
  background:rgba(255,255,255,0.05);
  font-size:13px;
}

nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#002244;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

nav a{
  color:white;
  text-decoration:none;
  text-align:center;
}

nav i{font-size:20px;}

.info-box{
  margin:15px;
  padding:15px;
  border-radius:12px;
  background:#002b5c;
  font-size:14px;
  color:#cfe6ff;
}
</style>
</head>

<body>

<header>
  <img src="file_0000000060cc71f5ae523b84facdb23d.png">
  <h3>Team & Referrals</h3>
</header>

<div class="card ref-box">
  <p>Your Referral Link</p>
  <input type="text" id="ref-link" readonly>
</div>

<div class="card stats">
  <div class="stat">Team Size<br><span id="team-size">0</span></div>
  <div class="stat">Referrals Earned<br><span id="refCount">0</span></div>
  <div class="stat">Team Deposit<br><span id="team-deposit">0</span></div>
  <div class="stat">First Deposits<br><span id="first-deposit">0</span></div>
  <div class="stat">Total Bonus<br><span id="team-bonus">0</span></div>
</div>

<div class="level-title">LEVEL 1 – 17%</div>
<div class="level-box">
  <div id="lev1-total">Total: KSh 0</div>
  <div id="lev1-list"></div>
</div>

<div class="level-title">LEVEL 2 – 2%</div>
<div class="level-box">
  <div id="lev2-total">Total: KSh 0</div>
  <div id="lev2-list"></div>
</div>

<div class="level-title">LEVEL 3 – 1%</div>
<div class="level-box">
  <div id="lev3-total">Total: KSh 0</div>
  <div id="lev3-list"></div>
</div>

<div class="info-box">
<strong>Invite friends to earn commissions</strong>
</div>

<nav>
  <a href="dashboard.html"><i class="fas fa-home"></i><br>Home</a>
  <a href="task.html"><i class="fas fa-tasks"></i><br>Task</a>
  <a href="team.html"><i class="fas fa-users"></i><br>Team</a>
  <a href="vip.html"><i class="fas fa-crown"></i><br>VIP</a>
  <a href="profile.html"><i class="fas fa-user"></i><br>Me</a>
</nav>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio",
  storageBucket: "quantum-rio.firebasestorage.app",
  messagingSenderId: "805433999377",
  appId: "1:805433999377:web:d0efa8c46ec4a0fa30f1b0",
  measurementId: "G-4RSQXZJX44"
};

firebase.initializeApp(firebaseConfig);
document.addEventListener('backbutton', function (e) {
    if (window.history.length > 1) {
        window.history.back();
    } else {
        e.preventDefault();
    }
}, false);
const database = firebase.database();
const auth = firebase.auth();

auth.onAuthStateChanged(user => {

  if (!user) {
    location.href = "landing.html";
    return;
  }

  const uid = user.uid;

  let purchasedReferralDeposits = 0;
  let purchasedReferralCount = 0;

  // REF LINK
  database.ref("users/" + uid + "/username")
  .once("value")
  .then(snap => {

    let uname = snap.exists()
      ? snap.val()
      : (user.email ? user.email.split("@")[0] : "user");

    const refLink =
    `https://quantamwallet.github.io/CYPX-ONLINE-CRYPTO-/signup.html?ref=${encodeURIComponent(uname)}`;

    const input = document.getElementById("ref-link");
    input.value = refLink;

    input.onclick = async () => {
      try {
        await navigator.clipboard.writeText(refLink);
      } catch (e) {
        input.select();
        document.execCommand("copy");
      }
    };
  });

  // PURCHASED REFERRALS
  database.ref("referralPurchases/" + uid)
  .on("value", snap => {

    const data = snap.val() || {};

    purchasedReferralCount = 0;
    purchasedReferralDeposits = 0;

    Object.values(data).forEach(item => {

      const status = (item.status || "").toLowerCase();

      if (status === "approved") {

        const group = item.group || "";
        let refs = 0;

        if (group === "Group 1") refs = 2;
        if (group === "Group 2") refs = 4;
        if (group === "Group 3") refs = 8;

        purchasedReferralCount += refs;

        // each purchased referral counts as deposited 3000
        purchasedReferralDeposits += (refs * 3000);
      }
    });

    document.getElementById("refCount").innerText =
      purchasedReferralCount;

    document.getElementById("team-size").innerText =
      purchasedReferralCount;
  });
  // ================================
  // USERS TREE + PURCHASED REFERRALS
  // ================================
  database.ref("users").on("value", snap => {

    const users = snap.val() || {};

    let lev1 = [],
        lev2 = [],
        lev3 = [];

    let totalDeposit = purchasedReferralDeposits;
    let bonus = 0;

    // Purchased referrals count as already deposited
    let firstDeposit = purchasedReferralCount;

    Object.entries(users).forEach(([id, u]) => {

      if (!u.referredBy) return;

      // LEVEL 1
      if (u.referredBy === uid) {
        lev1.push(u);
      }

      // LEVEL 2
      if (
        users[u.referredBy] &&
        users[u.referredBy].referredBy === uid
      ) {
        lev2.push(u);
      }

      // LEVEL 3
      if (
        users[u.referredBy] &&
        users[users[u.referredBy].referredBy] &&
        users[users[u.referredBy].referredBy].referredBy === uid
      ) {
        lev3.push(u);
      }
    });

    function render(list, container, percent) {

      let total = 0;
      const el = document.getElementById(container);
      el.innerHTML = "";

      list.forEach(u => {

        const deposit =
          parseFloat(u.totalDeposit || 0);

        // ONLY referred users who actually deposited
        if (deposit > 0) {
          total += deposit * percent;
          totalDeposit += deposit;
          firstDeposit++;
        }

        const div = document.createElement("div");
        div.className = "ref-item";

        div.textContent =
          `${u.email || "User"} - KSh ${deposit.toFixed(2)}`;

        el.appendChild(div);
      });

      return total;
    }

    const b1 = render(lev1, "lev1-list", 0.17);
    const b2 = render(lev2, "lev2-list", 0.02);
    const b3 = render(lev3, "lev3-list", 0.01);

    document.getElementById("lev1-total").innerText =
      "Total: KSh " + b1.toFixed(2);

    document.getElementById("lev2-total").innerText =
      "Total: KSh " + b2.toFixed(2);

    document.getElementById("lev3-total").innerText =
      "Total: KSh " + b3.toFixed(2);

    bonus = b1 + b2 + b3;

    // Add bonus from purchased referrals
    bonus += purchasedReferralDeposits * 0.17;

    document.getElementById("team-deposit").innerText =
      totalDeposit.toFixed(2);

    document.getElementById("first-deposit").innerText =
      firstDeposit;

    document.getElementById("team-bonus").innerText =
      bonus.toFixed(2);
  });

});
</script>

</body>
</html>
