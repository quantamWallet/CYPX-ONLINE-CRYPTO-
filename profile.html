<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CYPX - Profile</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: linear-gradient(180deg,#000814,#001d3d);
  color:white;
  padding-bottom:80px;
}

/* HEADER */
.top-bar {
  padding:15px;
  background: linear-gradient(90deg,#001d3d,#003566);
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
}

/* PROFILE CARD */
.profile-card {
  margin:15px;
  padding:15px;
  border-radius:16px;
  background: linear-gradient(145deg,#001f3f,#003566);
  box-shadow: 0 0 20px rgba(0,150,255,0.25);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.vip {
  padding:4px 12px;
  border-radius:10px;
  font-size:13px;
  margin-top:5px;
  display:inline-block;
}

.vip.vip0 { background:#777; }
.vip.vip1 { background:linear-gradient(90deg,#d6d6d6,#bfbfbf); color:#000;}
.vip.vip2 { background:linear-gradient(90deg,#ffd700,#ffcc00); color:#000;}
.vip.vip3 { background:linear-gradient(90deg,#7c54ff,#3ad1d1);}
.vip.vip4 { background:linear-gradient(90deg,#ff7a7a,#ff3d3d);}

.vip.glow {
  box-shadow:0 0 20px #ffd700;
  transform:scale(1.1);
}

/* BALANCE CARD */
.balance-card {
  margin:15px;
  padding:20px;
  border-radius:16px;
  background: linear-gradient(145deg,#002b5c,#001f3f);
  box-shadow: 0 0 25px rgba(0,200,255,0.25);
}

.balance-main {
  font-size:28px;
  color:#ffd700;
  margin-bottom:15px;
}

.balance-grid {
  display:flex;
  gap:10px;
}

.balance-grid div {
  flex:1;
  background: rgba(255,255,255,0.05);
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* MENU */
.menu {
  margin:15px;
  border-radius:16px;
  overflow:hidden;
}

.menu-item {
  display:flex;
  align-items:center;
  padding:15px;
  background:#001a33;
  border-bottom:1px solid rgba(255,255,255,0.05);
  text-decoration:none;
  color:white;
}

.menu-item:hover {
  background:#002b5c;
}

.menu-item i {
  width:25px;
  margin-right:10px;
}

nav {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#002244;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

nav a {
  color:white;
  text-decoration:none;
  text-align:center;
}

nav i { font-size:20px; }
</style>
</head>

<body>

<div class="top-bar">
  <i class="fas fa-user"></i> Profile
</div>

<div class="profile-card">
  <div>
    <div id="user-email">user@email.com</div>
    <div id="user-vip" class="vip">VIP0</div>
  </div>
  <i class="fas fa-user-circle" style="font-size:50px;"></i>
</div>

<div class="balance-card">
  <div class="balance-main">KSh <span id="balance">0.00</span></div>

  <div class="balance-grid">
    <div>
      <small>Total Deposit</small>
      <div id="deposit">0.00</div>
    </div>
    <div>
      <small>Total Earnings</small>
      <div id="earnings">0.00</div>
    </div>
  </div>
</div>

<div class="menu">
  <a href="recharge.html" class="menu-item"><i class="fas fa-wallet"></i>Deposit</a>
  <a href="withdraw.html" class="menu-item"><i class="fas fa-money-bill"></i>Withdraw</a>
  <a href="financial.html" class="menu-item"><i class="fas fa-file"></i>Records</a>
  <a href="#" class="menu-item" onclick="logout()"><i class="fas fa-sign-out"></i>Logout</a>
</div>

<nav>
  <a href="dashboard.html"><i class="fas fa-home"></i><br>Home</a>
  <a href="task.html"><i class="fas fa-tasks"></i><br>Task</a>
  <a href="team.html"><i class="fas fa-users"></i><br>Team</a>
  <a href="vip.html"><i class="fas fa-crown"></i><br>VIP</a>
  <a href="profile.html"><i class="fas fa-user"></i><br>Me</a>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCCW4G9JlVu_xb0bGjlKmsi5mdqXSwvFak",
  authDomain: "quantum-rio.firebaseapp.com",
  databaseURL: "https://quantum-rio-default-rtdb.firebaseio.com",
  projectId: "quantum-rio"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.database();

/* ✅ ACCURATE VIP DETECTION */
function getVip(data){
  let max = 0;

  if(data.vipLevels){
    Object.keys(data.vipLevels).forEach(k=>{
      if(data.vipLevels[k]){
        const lvl = parseInt(k);
        if(lvl > max) max = lvl;
      }
    });
  }

  return "VIP" + max;
}

/* ✅ WAIT FOR AUTH (NO REDIRECT) */
auth.onAuthStateChanged(user => {

  if (!user) {
    console.log("User not ready yet...");
    return; // ❌ NO redirect
  }

  document.getElementById("user-email").textContent = user.email;

  db.ref("users/" + user.uid).on("value", snap => {
    const d = snap.val() || {};

    /* ✅ SAFE NUMBERS (NO DOUBLE CREDIT BUG) */
    const balance = Number(d.balance || 0);
    const deposit = Number(d.totalDeposit || 0);
    const earnings = Number(d.totalEarnings || 0);

    document.getElementById("balance").textContent = balance.toFixed(2);
    document.getElementById("deposit").textContent = deposit.toFixed(2);
    document.getElementById("earnings").textContent = earnings.toFixed(2);

    /* ✅ VIP */
    const vip = getVip(d);
    const el = document.getElementById("user-vip");

    el.className = "vip " + vip.toLowerCase();
    el.textContent = vip;

    el.classList.add("glow");
    setTimeout(() => el.classList.remove("glow"), 1000);
  });

});

function logout(){
  auth.signOut().then(()=>{
    window.location.href = "signin.html";
  });
}
</script>
</body>
</html>
